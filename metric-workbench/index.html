            </div>
          </div>
        </section>
      `;
    }

    function renderMeasure(metric) {
      if (metric.calculationType === "derived") {
        return `
          <section class="panel">
            <div class="panel-head">
              <h3 class="section-title"><span class="step">2</span>计算定义</h3>
            </div>
            <div class="panel-body">
              ${renderDerivedDependencyEditor(metric)}
              <div class="form-grid">
                ${field("计算公式", metric.expression, "expression", "textarea", "使用上方依赖指标里的计算引用来写公式，例如：bpc_revenue / avg_accounts_receivable")}
              </div>
              <div class="field" style="margin-top: 12px;">
                <label>结果表达式</label>
                <div class="formula-line">${resultFormula(metric)}</div>
              </div>
            </div>
          </section>
        `;
      }
      return `
        <section class="panel">
          <div class="panel-head">
            <h3 class="section-title"><span class="step">2</span>取数结果</h3>
          </div>
          <div class="panel-body">
            <div class="form-grid">
              ${smartSelectField("业务表", metric.sourceTable, "sourceTable", tableOptions())}
              ${smartSelectField("统计字段", metric.measureField, "measureField", measureFieldOptions(metric))}
              ${smartSelectField("统计方式", metric.aggregation, "aggregation", [
                { value: "SUM", label: "求和 SUM" },
                { value: "COUNT", label: "计数 COUNT" },
                { value: "COUNT_DISTINCT", label: "去重计数 COUNT DISTINCT" },
                { value: "AVG", label: "平均 AVG" },
                { value: "MAX", label: "最大值 MAX" },
                { value: "MIN", label: "最小值 MIN" }
              ])}
              ${smartCoefficientField("整体结果系数", metricResultMultiplier(metric), "resultMultiplier")}
            </div>
            <div class="field" style="margin-top: 12px;">
              <label>系统将这样计算</label>
              <div class="formula-line">${resultFormula(metric)}</div>
            </div>
          </div>
        </section>
      `;
    }

    function ensureMatchRules(metric) {
      if (metric.matchRules) return metric.matchRules;

      if (metric.bpcRows) {
        metric.matchRules = metric.bpcRows.map(row => ({
          objectType: "科目",
          matchField: row.matchField || "account_path",
          matchType: normalizeMatchType(row.matchType || "LIKE"),
          matchValue: normalizeMatchValue(row.matchType || "PATH_CONTAINS", row.matchValue || row.accountCode),
          operator: row.operator || "+",
          resultMultiplier: Number(row.resultMultiplier ?? (row.reverse === "是" ? -1 : 1)),
          extraFilter: row.extraFilter || "无",
          note: "指标取数范围"
        }));
      } else if (metric.expenseRows) {
        metric.matchRules = metric.expenseRows.map(row => ({
          objectType: "费用科目",
          matchField: row.matchField || "racct",
          matchType: normalizeMatchType(row.matchType || "="),
          matchValue: row.subjectCode,
          operator: "+",
          resultMultiplier: Number(row.resultMultiplier ?? 1),
          extraFilter: "无",
          note: row.subjectName || "费用科目号"
        }));
      } else if (metric.inventoryRows) {
        metric.matchRules = metric.inventoryRows.map(row => ({
          objectType: row.objectType || "物料类型",
          matchField: row.field,
          matchType: normalizeMatchType(row.op || "="),
          matchValue: row.value,
          operator: "+",
          resultMultiplier: Number(row.resultMultiplier ?? 1),
          extraFilter: "无",
          note: row.note || ""
        }));
      } else {
        metric.matchRules = [];
      }
      return metric.matchRules;
    }

    function isCompositeMetric(metric) {
      return metric.calculationMode === "composite";
    }

    function effectiveFilterMode(metric) {
      return metric.filterMode || "simple";
    }

    function metricResultMultiplier(metric) {
      if (metric.resultMultiplier) return Number(metric.resultMultiplier);
      const rows = metric.bpcRows || [];
      if (!rows.length) return 1;
      return rows.every(row => row.reverse === "是" || row.reverse === true) ? -1 : 1;
    }

    function normalizedAggregation(metric) {
      const aggregation = String(metric.aggregation || "SUM").trim().toUpperCase();
      return aggregation;
    }

    function filtersFromExtraFilter(extraFilter, connector = "AND") {
      if (!extraFilter || extraFilter === "无") return [];
      const trimmed = extraFilter.trim();
      const eq = trimmed.match(/^([A-Za-z0-9_`.]+)\s*=\s*'([^']+)'$/);
      if (eq) {
        return [{
          connector,
          field: eq[1].replaceAll("`", ""),
          op: "=",
          value: eq[2],
          note: "来自特殊映射补充条件"
        }];
      }
      const inMatch = trimmed.match(/^([A-Za-z0-9_`.]+)\s+IN\s*\((.+)\)$/i);
      if (inMatch) {
        return [{
          connector,
          field: inMatch[1].replaceAll("`", ""),
          op: "IN",
          value: inMatch[2].replaceAll("'", "").replaceAll(" ", ""),
          note: "来自费用类型划分"
        }];
      }
      return [{
        connector,
        field: trimmed,
        op: "EXPR",
        value: "",
        note: "来自特殊映射补充条件"
      }];
    }

    function allFilters(metric) {
      const rules = ensureMatchRules(metric);
      const metricFilters = isCompositeMetric(metric) ? [] : rules.flatMap((row, index) => {
        const accountFilter = {
        type: row.type || (normalizeMatchType(row.matchType) === "EXPR" ? "expression" : "condition"),
        connector: row.connector || (index === 0 ? "" : "AND"),
        field: row.matchField,
        op: normalizeMatchType(row.matchType),
        value: row.matchValue,
        note: row.note,
        source: "rule"
        };
        return [
          accountFilter,
          ...filtersFromExtraFilter(row.extraFilter, "AND").map(filter => ({ ...filter, source: "extra" }))
        ];
      });
      const baseFilters = (metric.filters || []).map((row, index) => ({
        type: row.type || (normalizeOperator(row.op) === "EXPR" ? "expression" : "condition"),
        connector: row.connector || (metricFilters.length === 0 && index === 0 ? "" : "AND"),
        field: row.field,
        op: normalizeOperator(row.op),
        value: row.value,
        note: row.note || "",
        source: "base"
      }));
      return [...metricFilters, ...baseFilters];
    }

    function renderAllFilters(metric) {
      if (metric.calculationType === "derived") {
        const rows = (metric.dependencies || []).map((code, index) => `
          <tr>
            <td>${index + 1}</td>
            <td>${code}</td>
          </tr>
        `).join("");
        return `
          <section class="panel">
            <div class="panel-head">
              <h3 class="section-title"><span class="step">3</span>引用口径</h3>
            </div>
            <div class="panel-body">
              <div class="field" style="margin-top: 16px;">
                <label>公式</label>
                <textarea data-key="expression">${metric.expression || ""}</textarea>
              </div>
            </div>
            <div class="table-wrap">
              <table>
                <thead><tr><th>#</th><th>依赖指标编码</th></tr></thead>
                <tbody>${rows}</tbody>
              </table>
            </div>
          </section>
        `;
      }

      const filterMode = effectiveFilterMode(metric);
      const expressionOnly = !canUseSimpleFilterMode(metric);
      const modeSwitch = `
        <div class="mode-switch">
          <button class="mode-option ${filterMode === "simple" ? "active" : ""}" data-filter-mode-button="simple" ${expressionOnly ? "disabled" : ""}>条件卡片</button>
          <button class="mode-option ${filterMode === "expression" ? "active" : ""}" data-filter-mode-button="expression">高级 SQL</button>
        </div>
      `;
      if (filterMode === "expression") {
        return `
          <section class="panel">
            <div class="panel-head">
              <h3 class="section-title"><span class="step">3</span>过滤范围</h3>
              ${modeSwitch}
            </div>
            <div class="panel-body">
              <div class="field" style="margin-top: 16px;">
                <label>WHERE 表达式</label>
                <textarea data-filter-expression placeholder="只能填写 WHERE 后面的判断片段，不写 WHERE 关键字">${metric.filterExpression || expressionFromFilters(metric)}</textarea>
              </div>
              <div class="explain-box conversion-message" style="margin-top: 12px;">${filterConversionMessage(metric, "条件卡片")}</div>
            </div>
          </section>
        `;
      }

      const combinedFilters = allFilters(metric);
      const matchTypeOptions = [
        ["=", "="],
        ["!=", "!="],
        ["IN", "IN"],
        ["LIKE", "LIKE"],
        ["NOT LIKE", "NOT LIKE"],
        [">", ">"],
        [">=", ">="],
        ["<", "<"],
        ["<=", "<="]
      ];
      const fieldChoices = fieldOptions(metric.sourceTable);
      const rows = combinedFilters.map((row, index) => `
        <div class="condition-card">
          <div class="connector-field">
            <span class="mini-label">关系</span>
            <select data-filter-combined="${index}" data-field="connector">
              <option value="" ${!row.connector ? "selected" : ""}></option>
              <option value="AND" ${row.connector === "AND" ? "selected" : ""}>并且</option>
              <option value="OR" ${row.connector === "OR" ? "selected" : ""}>或者</option>
            </select>
          </div>
          <div>
            <span class="mini-label">字段</span>
            <select data-filter-combined="${index}" data-field="field">
              ${[{ value: "", label: "选择字段" }, { value: row.field || "", label: displayField(row.field || "", metric.sourceTable) }, ...fieldChoices]
                .filter((item, itemIndex, arr) => item.value === "" || arr.findIndex(x => x.value === item.value) === itemIndex)
                .map(item => `<option value="${item.value}" ${item.value === row.field ? "selected" : ""}>${item.label}</option>`).join("")}
            </select>
          </div>
          <div>
            <span class="mini-label">条件</span>
            <select data-filter-combined="${index}" data-field="op">
              ${matchTypeOptions.map(([value, label]) => `<option value="${value}" ${normalizeOperator(row.op) === value ? "selected" : ""}>${label}</option>`).join("")}
            </select>
          </div>
          <div>
            <span class="mini-label">值</span>
            <input value="${row.value || ""}" data-filter-combined="${index}" data-field="value">
          </div>
          <div class="condition-note">
            <span class="mini-label">说明</span>
            <input value="${row.note || ""}" data-filter-combined="${index}" data-field="note">
          </div>
        </div>
      `).join("") || `<div class="empty">暂无过滤条件。</div>`;

      return `
        <section class="panel">
          <div class="panel-head">
            <h3 class="section-title"><span class="step">3</span>过滤范围</h3>
            ${modeSwitch}
            <div class="panel-actions">
            <button class="btn" data-add="filters">新增过滤</button>
            </div>
          </div>
          <div class="panel-body">
            <div class="condition-list">${rows}</div>
          </div>
        </section>
      `;
    }

    function renderFilterDesign(metric) {
      return renderAllFilters(metric);
    }

    function normalizeOperator(op) {
      const map = {
        "等于": "=",
        "不等于": "!=",
        "包含": "LIKE",
        "不包含": "NOT LIKE",
        "不以前缀开头": "NOT LIKE",
        "NOT IN": "NOT IN",
        "IS NULL": "IS NULL",
        "IS NOT NULL": "IS NOT NULL"
      };
      return map[op] || op || "=";
    }

    function normalizeMatchType(matchType) {
      const map = {
        "=": "=",
        "EQ": "=",
        "等于": "=",
        "!=": "!=",
        "不等于": "!=",
        "IN": "IN",
        "NOT IN": "NOT IN",
        "IS NULL": "IS NULL",
        "IS NOT NULL": "IS NOT NULL",
        "属于": "IN",
        "包含": "LIKE",
        "CONTAINS": "LIKE",
        "路径包含": "LIKE",
        "PATH_CONTAINS": "LIKE",
        "LIKE": "LIKE",
        "模糊匹配": "LIKE",
        "NOT LIKE": "NOT LIKE",
        "不包含": "NOT LIKE"
      };
      return map[matchType] || matchType || "=";
    }

    function normalizeMatchValue(matchType, value) {
      const rawType = matchType || "";
      const rawValue = String(value || "");
      if ((rawType === "路径包含" || rawType === "PATH_CONTAINS") && !rawValue.includes("%")) {
        return `%/${rawValue}/%`;
      }
      if ((rawType === "包含" || rawType === "CONTAINS") && !rawValue.includes("%")) {
        return `%${rawValue}%`;
      }
      return rawValue;
    }

    function conditionFor(field, operator, value) {
      const op = normalizeMatchType(operator);
      const normalizedValue = normalizeMatchValue(operator, value);
      if (op === "EXPR") return field;
      if (op === "IN") {
        return `${field} IN (${splitValues(normalizedValue).map(v => `'${v}'`).join(", ")})`;
      }
      if (op === "NOT IN") {
        return `${field} NOT IN (${splitValues(normalizedValue).map(v => `'${v}'`).join(", ")})`;
      }
      if (op === "IS NULL" || op === "IS NOT NULL") {
        return `${field} ${op}`;
      }
      if (op === "LIKE" || op === "NOT LIKE") {
        const parts = splitValues(normalizedValue);
        if (parts.length > 1) {
          const joined = parts.map(v => `    ${field} LIKE '${v}'`).join("\n    OR\n");
          return op === "NOT LIKE" ? `NOT (\n${joined}\n  )` : `(\n${joined}\n  )`;
        }
        return `${field} ${op} '${normalizedValue}'`;
      }
      return `${field} ${op} '${normalizedValue}'`;
    }

    function expressionFromFilters(metric) {
      return modalFilterRows(metric)
        .filter(row => row.field)
        .map((row, index) => {
          const connector = index === 0 ? "" : (row.connector || "AND") + " ";
          return `${connector}${conditionFor(row.field, row.op, row.value)}`;
        })
        .join("\n");
    }

    function stripSqlStrings(sql) {
      return String(sql || "").replace(/'[^']*'/g, "''");
    }

    function filterConversionAnalysis(expression) {
      const sql = String(expression || "").trim();
      if (!sql) return { rows: [], reasons: [] };

      const checkSql = stripSqlStrings(sql).toUpperCase();
      const withoutInLists = checkSql.replace(/\b(?:NOT\s+)?IN\s*\([^)]*\)/g, "IN_LIST");
      const reasons = [];

      if (/\bOR\b/.test(checkSql)) reasons.push("包含 OR 关系，条件卡片只能无损承载 AND 串联");
      if (/\bNOT\s*\(/.test(checkSql)) reasons.push("包含 NOT (...) 分组");
      if (/[()]/.test(withoutInLists)) reasons.push("包含括号或嵌套分组，无法保证拆成平铺条件后语义不变");
      if (/\b(CASE|WHEN|THEN|ELSE|END)\b/.test(checkSql)) reasons.push("包含 CASE WHEN 条件表达式");
      if (/\b(EXISTS|SELECT)\b/.test(checkSql)) reasons.push("包含子查询或 EXISTS");
      if (/\b(JOIN|UNION)\b/.test(checkSql)) reasons.push("包含 JOIN 或 UNION，已超出单表 WHERE 条件范围");
      if (/\bBETWEEN\b/.test(checkSql)) reasons.push("包含 BETWEEN，当前条件卡片未提供区间操作符");
      if (/\b(REGEXP|RLIKE)\b/.test(checkSql)) reasons.push("包含正则匹配操作符");
      const functionNames = [...withoutInLists.matchAll(/\b([A-Z_][A-Z0-9_]*)\s*\(/g)]
        .map(match => match[1])
        .filter(name => !["NOT", "AND", "OR", "IN", "EXISTS"].includes(name));
      if (functionNames.length) reasons.push(`包含函数调用：${[...new Set(functionNames)].join("、")}`);

      if (reasons.length) return { rows: null, reasons };

      const segments = sql
        .split(/\s+AND\s+/i)
        .map((item, index) => item.replace(/^\s*AND\s+/i, "").trim())
        .filter(Boolean);

      const rows = [];
      for (const [index, segment] of segments.entries()) {
        const nullMatch = segment.match(/^`?([A-Za-z0-9_.]+)`?\s+(IS\s+NULL|IS\s+NOT\s+NULL)$/i);
        if (nullMatch) {
          rows.push({ connector: index === 0 ? "" : "AND", field: nullMatch[1], op: nullMatch[2].toUpperCase(), value: "", note: "" });
          continue;
        }

        const match = segment.match(/^`?([A-Za-z0-9_.]+)`?\s*(=|!=|>=|<=|>|<|LIKE|NOT\s+LIKE|IN|NOT\s+IN)\s*(.+)$/i);
        if (!match) {
          return {
            rows: null,
            reasons: [`第 ${index + 1} 条条件不是“字段 + 操作符 + 值”的简单结构：${segment}`]
          };
        }

        const op = match[2].replace(/\s+/g, " ").toUpperCase();
        let value = match[3].trim();
        if (op.includes("IN")) {
          value = value.replace(/^\(/, "").replace(/\)$/, "");
          value = value.split(",").map(item => item.trim().replace(/^'|'$/g, "")).join(",");
        } else {
          value = value.replace(/^'|'$/g, "");
        }
        rows.push({ connector: index === 0 ? "" : "AND", field: match[1], op, value, note: "" });
      }

      return { rows, reasons: [] };
    }

    function parseSimpleFilterExpression(expression) {
      const analysis = filterConversionAnalysis(expression);
      if (analysis.reasons.length) return null;
      return analysis.rows;
    }

    function filterConversionMessage(metric, targetLabel) {
      const analysis = filterConversionAnalysis(filterSqlText(metric));
      if (!analysis.reasons.length) {
        return `这段 WHERE 可以转换成${targetLabel}。切换后会生成条件行，高级表达式不再作为独立配置保存。`;
      }
      return [
        `这段 WHERE 不能无损转换成${targetLabel}，原因：`,
        ...analysis.reasons.map((reason, index) => `${index + 1}. ${reason}`)
      ].join("\n");
    }

    function filterConversionTitle(metric) {
      const analysis = filterConversionAnalysis(filterSqlText(metric));
      if (!analysis.reasons.length) return "可以转换";
      return "不能无损转换";
    }

    function filterConversionReasonList(metric) {
      return filterConversionAnalysis(filterSqlText(metric)).reasons;
    }

    function canUseSimpleFilterMode(metric) {
      if (effectiveFilterMode(metric) !== "expression") return true;
      return !filterConversionReasonList(metric).length;
    }

    function filterSqlText(metric) {
      const mode = effectiveFilterMode(metric);
      return mode === "expression"
        ? metric.filterExpression || expressionFromFilters(metric)
        : expressionFromFilters(metric);
    }

    function sqlWhereAppend(expression, indent = "  ") {
      const lines = String(expression || "")
        .split("\n")
        .map(line => line.trimEnd())
        .filter(line => line.trim());
      return lines.map((line, index) => {
        const trimmed = line.trimStart();
        if (index === 0 && /^(AND|OR)\b/i.test(trimmed)) return `${indent}${trimmed}`;
        if (index === 0) return `${indent}AND ${trimmed}`;
        return `${indent}${line}`;
      }).join("\n");
    }

    function filterStructured(metric) {
      const expression = filterSqlText(metric);
      return {
        expression_lines: expression
          .split("\n")
          .map(line => line.trimEnd())
        .filter(Boolean)
      };
    }

    function serializeExtraFilters(rows) {
      const parts = rows
        .filter(row => row.field)
        .map((row, index) => {
          const connector = index === 0 ? "" : `${row.connector || "AND"} `;
          return `${connector}${conditionFor(row.field, row.op, row.value)}`;
        });
      return parts.length ? parts.join(" ") : "无";
    }

    function updateModalFilterRow(metric, origin, index, extraIndex, key, value) {
      if (origin === "rule") {
        const rules = ensureMatchRules(metric);
        rules[index] = rules[index] || {};
        if (key === "connector") rules[index].connector = value;
        if (key === "field") rules[index].matchField = value;
        if (key === "op") rules[index].matchType = normalizeOperator(value);
        if (key === "value") rules[index].matchValue = value;
        return;
      }

      if (origin === "extra") {
        const rules = ensureMatchRules(metric);
        const rule = rules[index] || {};
        const rows = filtersFromExtraFilter(rule.extraFilter, "AND");
        rows[extraIndex] = rows[extraIndex] || { connector: "AND", field: "", op: "=", value: "" };
        rows[extraIndex][key] = value;
        rule.extraFilter = serializeExtraFilters(rows);
        rules[index] = rule;
        return;
      }

      metric.filters = metric.filters || [];
      metric.filters[index] = metric.filters[index] || { field: "", op: "=", value: "" };
      metric.filters[index][key] = value;
    }

    function removeModalFilterRow(metric, origin, index, extraIndex) {
      if (origin === "rule") {
        metric.matchRules = ensureMatchRules(metric).filter((_, rowIndex) => rowIndex !== index);
        return;
      }

      if (origin === "extra") {
        const rules = ensureMatchRules(metric);
        const rule = rules[index] || {};
        const rows = filtersFromExtraFilter(rule.extraFilter, "AND").filter((_, rowIndex) => rowIndex !== extraIndex);
        rule.extraFilter = serializeExtraFilters(rows);
        rules[index] = rule;
        return;
      }

      metric.filters = (metric.filters || []).filter((_, rowIndex) => rowIndex !== index);
    }

    function splitValues(value) {
      return String(value || "")
        .split(",")
        .map(item => item.trim())
        .filter(Boolean);
    }

    function renderOutput(metric) {
      const rows = metric.outputFields.map((row, index) => `
        <tr>
          <td>${index + 1}</td>
          <td><input value="${row[0]}" data-output-index="${index}" data-output-field="0"></td>
          <td><input value="${row[1]}" data-output-index="${index}" data-output-field="1"></td>
        </tr>
      `).join("") || `<tr><td colspan="3" class="empty">这个指标只需要汇总输出，暂无固定明细字段。</td></tr>`;
      return `
        <section class="panel">
          <div class="panel-head">
            <h3 class="section-title"><span class="step">4</span>输出模板</h3>
            <button class="btn" data-add-output>新增字段</button>
          </div>
          <div class="table-wrap">
            <table>
              <thead><tr><th>顺序</th><th>字段</th><th>输出名</th></tr></thead>
              <tbody>${rows}</tbody>
            </table>
          </div>
        </section>
      `;
    }

    function renderTest(metric) {
      return `
        <section class="panel">
          <div class="panel-head">
            <h3 class="section-title"><span class="step">5</span>问法测试</h3>
            <button class="btn primary" id="runTestBtn">生成预览 SQL</button>
          </div>
          <div class="panel-body">
            <div class="field">
              <label>用户原始问法</label>
              <textarea data-key="testQuestion">${metric.testQuestion}</textarea>
            </div>
          </div>
        </section>
      `;
    }

    function semanticEntryType(metric) {
      return metric.semanticType || "business_metric";
    }

    function semanticTypeLabel(metric) {
      const map = {
        business_metric: "业务指标",
        table_column_note: "表和列补充说明",
        logic_text: "业务规则",
        rule_injection: "业务规则",
        result_presentation: "结果展示要求",
        standard_qa: "标准问答",
        sql_resultset: "SQL结果集",
        sql_result_set: "SQL结果集"
      };
      return map[semanticEntryType(metric)] || "业务指标";
    }

    function columnsFromCatalog(sourceTable) {
      return knownFieldsForTable(sourceTable).map(field => ({
        name: field.field,
        description: field.label || field.field,
        note: "",
        enabled: true
      }));
    }

    function ensureTableColumnNotes(metric) {
      metric.columns = Array.isArray(metric.columns) ? metric.columns : [];
      return metric.columns;
    }

    function availableColumnOptions(metric) {
      const selected = new Set(ensureTableColumnNotes(metric).map(column => column.name));
      return columnsFromCatalog(metric.sourceTable).filter(column => !selected.has(column.name));
    }

    function stageLabel(metric) {
      return metric.injectStage || "metric_resolution";
    }

    function priorityValue(metric) {
      return metric.priority ?? 20;
    }

    function aliasItems(metric) {
      return String(metric.aliases || "")
        .split(/[、,，]/)
        .map(item => item.trim())
        .filter(Boolean);
    }

    function modalSelect(label, value, key, options, required = false) {
      const html = `
        <select data-modal-key="${key}">
          ${options.map(option => `<option value="${option.value}" ${option.value === value ? "selected" : ""}>${option.label}</option>`).join("")}
        </select>
      `;
      return `<div class="field"><label>${required ? '<span class="required">*</span>' : ""}${label}</label>${html}</div>`;
    }

    function modalField(label, value, key, type = "input", required = false, placeholder = "") {
      const html = type === "textarea"
        ? `<textarea data-modal-key="${key}" placeholder="${placeholder}">${value || ""}</textarea>`
        : `<input data-modal-key="${key}" value="${value || ""}" placeholder="${placeholder}" />`;
      return `<div class="field"><label>${required ? '<span class="required">*</span>' : ""}${label}</label>${html}</div>`;
    }

    function modalReadonlyField(label, value, required = false) {
      return `<div class="field"><label>${required ? '<span class="required">*</span>' : ""}${label}</label><div class="readonly-value" aria-readonly="true">${escapeHtml(value)}</div></div>`;
    }

    function modalFieldPicker(label, value, key, options, required = false) {
      const normalized = (options || []).map(option => typeof option === "string"
        ? { value: option, label: option, note: "" }
        : {
            value: String(option.value || ""),
            label: String(option.label || option.value || ""),
            note: String(option.note || "")
          }
      ).filter(option => option.value);
      const currentValue = String(value || "");
      const selectedValue = currentValue || normalized[0]?.value || "";
      const optionHtml = normalized.map(option => `
        <button class="field-picker-option ${option.value === selectedValue ? "active" : ""}" type="button" data-field-picker-option="${escapeHtml(option.value)}">
          <span class="field-picker-name">${escapeHtml(option.value)}</span>
          <span class="field-picker-note">${escapeHtml(option.note || option.label || "")}</span>
        </button>
      `).join("");
      return `
        <div class="field field-picker-field">
          <label>${required ? '<span class="required">*</span>' : ""}${label}</label>
          <div class="field-picker" data-field-picker>
            <input type="hidden" data-modal-key="${key}" value="${escapeHtml(selectedValue)}" />
            <button class="field-picker-toggle" type="button" data-field-picker-toggle>${escapeHtml(selectedValue || "请选择字段")}</button>
            <div class="field-picker-menu" data-field-picker-menu hidden>
              <input class="field-picker-search" data-field-picker-search placeholder="请选择字段" />
              <div class="field-picker-options">
                ${optionHtml || '<div class="dependency-empty">当前关联表没有可选字段</div>'}
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function isFieldSelect(select) {
      return select.dataset.modalKey === "measureField"
        || select.dataset.key === "measureField"
        || select.dataset.filterField === "field"
        || select.dataset.field === "field"
        || select.title === "字段";
    }

    function searchableOptionParts(select, option) {
      const value = String(option.value || "");
      const text = String(option.textContent || value).trim();
      if (isFieldSelect(select) && value) {
        const parenthetical = text.match(/^(.+?)（(.+)）$/);
        if (parenthetical && parenthetical[1] === value) {
          return { main: value, note: parenthetical[2], selected: value, haystack: `${value} ${text} ${parenthetical[2]}` };
        }
        const dotParts = text.split(" · ");
        if (dotParts.length > 1 && dotParts[dotParts.length - 1] === value) {
          const note = dotParts.slice(0, -1).join(" · ");
          return { main: value, note, selected: value, haystack: `${value} ${text} ${note}` };
        }
        return { main: value, note: text !== value ? text : "", selected: value, haystack: `${value} ${text}` };
      }
      return { main: text || value, note: "", selected: text || value || "请选择", haystack: `${value} ${text}` };
    }

    function selectedSearchableLabel(select) {
      const selected = select.selectedOptions?.[0] || select.options?.[select.selectedIndex] || select.options?.[0];
      if (!selected) return "请选择";
      return searchableOptionParts(select, selected).selected || "请选择";
    }

    function closeSearchableSelects(except = null) {
      document.querySelectorAll(".searchable-select.open").forEach(wrapper => {
        if (wrapper === except) return;
        wrapper.classList.remove("open");
        const menu = wrapper.querySelector("[data-searchable-menu]");
        if (menu) menu.hidden = true;
      });
    }

    function closeFieldPickerMenus(except = null) {
      document.querySelectorAll("[data-field-picker]").forEach(picker => {
        if (picker === except) return;
        picker.classList.remove("open");
        const menu = picker.querySelector("[data-field-picker-menu]");
        if (menu) menu.hidden = true;
      });
    }

    function renderSearchableOptions(wrapper, select, query = "") {
      const list = wrapper.querySelector("[data-searchable-options]");
      if (!list) return;
      const keyword = normalizeForAgent(query);
      const options = [...select.options].filter(option => {
        const parts = searchableOptionParts(select, option);
        return !keyword || normalizeForAgent(parts.haystack).includes(keyword);
      });
      list.innerHTML = options.map(option => {
        const parts = searchableOptionParts(select, option);
        const isActive = option.value === select.value;
        return `
          <button class="searchable-select-option ${parts.note ? "" : "single"} ${isActive ? "active" : ""}" type="button" data-searchable-option="${escapeHtml(option.value)}">
            <span class="searchable-select-main">${escapeHtml(parts.main)}</span>
            ${parts.note ? `<span class="searchable-select-note">${escapeHtml(parts.note)}</span>` : ""}
          </button>
        `;
      }).join("") || `<div class="searchable-select-empty">没有匹配选项</div>`;
      list.querySelectorAll("[data-searchable-option]").forEach(button => {
        button.addEventListener("click", () => {
          select.value = button.dataset.searchableOption || "";
          select.dispatchEvent(new Event("change", { bubbles: true }));
          syncSearchableSelect(select);
          closeSearchableSelects();
        });
      });
    }

    function syncSearchableSelect(select) {
      const wrapper = select.closest(".searchable-select");
      if (!wrapper) return;
      const toggle = wrapper.querySelector("[data-searchable-toggle]");
      if (toggle) {
        toggle.textContent = selectedSearchableLabel(select);
        toggle.disabled = select.disabled;
      }
      wrapper.classList.toggle("disabled", select.disabled);
      const search = wrapper.querySelector("[data-searchable-search]");
      renderSearchableOptions(wrapper, select, search?.value || "");
    }

    function searchableSelectKey(select) {
      return select.dataset.modalKey
        || select.dataset.key
        || select.dataset.tokenAddKey
        || select.dataset.derivedDepKey
        || select.dataset.filterField
        || select.dataset.field
        || select.dataset.addNoteColumn
        || select.id
        || select.title
        || "";
    }

    let searchableSelectCloseBound = false;

    function enhanceSearchableSelects(root = document) {
      if (!searchableSelectCloseBound) {
        document.addEventListener("click", event => {
          if (!event.target.closest(".searchable-select")) closeSearchableSelects();
        });
        document.addEventListener("keydown", event => {
          if (event.key === "Escape") closeSearchableSelects();
        });
        searchableSelectCloseBound = true;
      }

      root.querySelectorAll("select").forEach(select => {
        if (select.dataset.searchableEnhanced === "true") {
          syncSearchableSelect(select);
          return;
        }
        select.dataset.searchableEnhanced = "true";
        select.classList.add("searchable-select-native");

        const wrapper = document.createElement("div");
        wrapper.className = "searchable-select";
        const key = searchableSelectKey(select);
        if (key) wrapper.dataset.searchableKey = key;
        if (select.dataset.derivedDepIndex) wrapper.dataset.searchableIndex = select.dataset.derivedDepIndex;

        const parent = select.parentNode;
        parent.insertBefore(wrapper, select);
        wrapper.appendChild(select);

        const toggle = document.createElement("button");
        toggle.type = "button";
        toggle.className = "searchable-select-toggle";
        toggle.dataset.searchableToggle = key || "select";
        toggle.textContent = selectedSearchableLabel(select);

        const menu = document.createElement("div");
        menu.className = "searchable-select-menu";
        menu.dataset.searchableMenu = "";
        menu.hidden = true;
        menu.innerHTML = `
          <input class="searchable-select-search" data-searchable-search placeholder="搜索选项" />
          <div class="searchable-select-options" data-searchable-options></div>
        `;

        wrapper.appendChild(toggle);
        wrapper.appendChild(menu);

        const search = menu.querySelector("[data-searchable-search]");
        const setOpen = open => {
          if (select.disabled) return;
          if (open) closeFieldPickerMenus();
          closeSearchableSelects(open ? wrapper : null);
          wrapper.classList.toggle("open", open);
          menu.hidden = !open;
          if (open) {
            search.value = "";
            renderSearchableOptions(wrapper, select);
            search.focus();
          }
        };

        toggle.addEventListener("click", event => {
          event.preventDefault();
          event.stopPropagation();
          setOpen(!wrapper.classList.contains("open"));
        });
        search.addEventListener("click", event => event.stopPropagation());
        search.addEventListener("input", () => renderSearchableOptions(wrapper, select, search.value));
        select.addEventListener("change", () => syncSearchableSelect(select));
        syncSearchableSelect(select);
      });

    function modalTokenEditor(label, values, key, options, required = false) {

      const chips = items.map(value => `

      return `
        <div class="field">
          <label>${required ? '<span class="required">*</span>' : ""}${label}</label>
          <div class="token-field">

      const rows = dependencies.map((dep, index) => {

        return `

              <input data-derived-dep-index="${index}" data-derived-dep-key="variable" value="${escapeHtml(dep.variable || defaultDependencyVariable(dep.metricKey, dep.periodRole))}" placeholder="例如 avg_accounts_receivable" />
              <select data-derived-dep-index="${index}" data-derived-dep-key="metricKey">
                ${options.map(option => `<option value="${escapeHtml(option.value)}" ${option.value === dep.metricKey ? "selected" : ""}>${escapeHtml(option.label)}</option>`).join("")}
              </select>
              <select data-derived-dep-index="${index}" data-derived-dep-key="periodRole">

              </select>
              <input data-derived-dep-index="${index}" data-derived-dep-key="note" value="${escapeHtml(dep.note || "")}" placeholder="补充说明" />
              <button class="dependency-remove" type="button" data-remove-derived-dependency="${index}" aria-label="删除依赖">×</button>
            </div>
            ${customPeriod ? `
              <div class="dependency-custom-period">
                <label>期间表达式</label>
                <div>
                  <textarea data-derived-dep-index="${index}" data-derived-dep-key="periodExpression" placeholder="例如 year_to_date({{period}})">${escapeHtml(dep.periodExpression || defaultPeriodExpression("custom_expression"))}</textarea>
                  <div class="period-template-row">
                    ${periodTemplates.map(item => `<button class="period-template" type="button" data-period-template="${escapeHtml(item.value)}" data-period-template-index="${index}">${escapeHtml(item.label)}</button>`).join("")}

          </div>
          <div class="dependency-table">

              <span></span>
            </div>

          </div>
          <div class="period-example-list">${periodExamples}</div>

    function componentResultFactor(row) {
      return Number(row.resultMultiplier ?? (row.reverse === "是" || row.reverse === true ? -1 : 1));
    }

    function accountCodeFromValue(value) {
      const text = String(value || "").trim();
      const pathMatch = text.match(/\/([^/%]+)\//);
      if (pathMatch) return pathMatch[1];
      return text.replaceAll("%", "").replaceAll("/", "");
    }

    function editableComponents(metric) {
      if (metric.bpcRows) {
        return metric.bpcRows.map((row, index) => ({
          origin: "bpc",
          rowIndex: index,
          field: row.matchField || "account_path",
          op: normalizeMatchType(row.matchType || "LIKE"),
          value: normalizeMatchValue(row.matchType || "PATH_CONTAINS", row.matchValue || row.accountCode),
          sign: row.operator || "+",
          factor: componentResultFactor(row),
          extraFilter: row.extraFilter && row.extraFilter !== "无" ? row.extraFilter : ""
        }));
      }

      if (metric.expenseRows) {
        return metric.expenseRows.map((row, index) => ({
          origin: "expense",
          rowIndex: index,
          field: row.matchField || "racct",
          op: normalizeMatchType(row.matchType || "="),
          value: row.subjectCode || "",
          sign: row.operator || "+",
          factor: Number(row.resultMultiplier ?? 1),
          extraFilter: row.extraFilter && row.extraFilter !== "无" ? row.extraFilter : ""
        }));
      }

      if (metric.inventoryRows) {
        return metric.inventoryRows.map((row, index) => ({
          origin: "inventory",
          rowIndex: index,
          field: row.field || fieldOptions(metric.sourceTable)[0]?.value || "",
          op: normalizeOperator(row.op || "="),
          value: row.value || "",
          sign: row.operator || "+",
          factor: Number(row.resultMultiplier ?? 1),
          extraFilter: row.extraFilter || row.note || ""
        }));
      }

      metric.matchRules = metric.matchRules || [];
      return metric.matchRules.map((row, index) => ({
        origin: "matchRule",
        rowIndex: index,
        field: row.matchField || fieldOptions(metric.sourceTable)[0]?.value || "",
        op: normalizeMatchType(row.matchType || "="),
        value: row.matchValue || "",
        sign: row.operator || "+",
        factor: Number(row.resultMultiplier ?? 1),
        extraFilter: row.extraFilter && row.extraFilter !== "无" ? row.extraFilter : ""
      }));
    }

    function updateMetricComponent(metric, index, key, value) {
      if (metric.bpcRows) {
        const row = metric.bpcRows[index] || {};
        if (key === "field") row.matchField = value;
        if (key === "op") row.matchType = value;
        if (key === "value") {
          row.matchValue = value;
          row.accountCode = accountCodeFromValue(value);
        }
        if (key === "sign") row.operator = value;
        if (key === "factor") {
          row.resultMultiplier = Number(value || 1);
          row.reverse = Number(value || 1) < 0 ? "是" : "否";
        }
        if (key === "extraFilter") row.extraFilter = value || "无";
        metric.bpcRows[index] = row;
      } else if (metric.expenseRows) {
        const row = metric.expenseRows[index] || {};
        if (key === "field") row.matchField = value;
        if (key === "op") row.matchType = value;
        if (key === "value") row.subjectCode = value;
        if (key === "sign") row.operator = value;
        if (key === "factor") row.resultMultiplier = Number(value || 1);
        if (key === "extraFilter") row.extraFilter = value || "无";
        metric.expenseRows[index] = row;
      } else if (metric.inventoryRows) {
        const row = metric.inventoryRows[index] || {};
        if (key === "field") row.field = value;
        if (key === "op") row.op = value;
        if (key === "value") row.value = value;
        if (key === "sign") row.operator = value;
        if (key === "factor") row.resultMultiplier = Number(value || 1);
        if (key === "extraFilter") row.extraFilter = value || "";
        metric.inventoryRows[index] = row;
      } else {
        metric.matchRules = metric.matchRules || [];
        const row = metric.matchRules[index] || {};
        if (key === "field") row.matchField = value;
        if (key === "op") row.matchType = value;
        if (key === "value") row.matchValue = value;
        if (key === "sign") row.operator = value;
        if (key === "factor") row.resultMultiplier = Number(value || 1);
        if (key === "extraFilter") row.extraFilter = value || "无";
        metric.matchRules[index] = row;
        return;
      }
      delete metric.matchRules;
    }

    function addMetricComponent(metric) {
      const firstField = fieldOptions(metric.sourceTable)[0]?.value || "";
      if (metric.bpcRows) {
        metric.bpcRows.push({
          accountCode: "",
          matchField: "account_path",
          matchType: "LIKE",
          matchValue: "",
          operator: "+",
          reverse: "否",
          resultMultiplier: 1,
          extraFilter: "无"
        });
      } else if (metric.expenseRows) {
        metric.expenseRows.push({
          subjectCode: "",
          matchField: "racct",
          matchType: "=",
          operator: "+",
          resultMultiplier: 1,
          extraFilter: "无"
        });
      } else if (metric.inventoryRows) {
        metric.inventoryRows.push({
          field: firstField,
          op: "=",
          value: "",
          operator: "+",
          resultMultiplier: 1,
          extraFilter: ""
        });
      } else {
        metric.matchRules = metric.matchRules || [];
        metric.matchRules.push({
          matchField: firstField,
          matchType: "=",
          matchValue: "",
          operator: "+",
          resultMultiplier: 1,
          extraFilter: "无"
        });
        return;
      }
      delete metric.matchRules;
    }

    function removeMetricComponent(metric, index) {
      if (metric.bpcRows) metric.bpcRows.splice(index, 1);
      else if (metric.expenseRows) metric.expenseRows.splice(index, 1);
      else if (metric.inventoryRows) metric.inventoryRows.splice(index, 1);
      else {
        metric.matchRules = (metric.matchRules || []).filter((_, rowIndex) => rowIndex !== index);
        return;
      }
      delete metric.matchRules;
    }

    function renderModalFilterEditor(metric) {
      if (metric.calculationType === "derived") return "";
      const mode = effectiveFilterMode(metric);
      const expressionOnly = !canUseSimpleFilterMode(metric);
      const fieldChoices = fieldOptions(metric.sourceTable);
      const operatorOptions = ["=", "!=", ">", ">=", "<", "<=", "IN", "NOT IN", "LIKE", "NOT LIKE", "IS NULL", "IS NOT NULL"];
      const modeSwitch = `
        <div class="filter-mode">
          <button class="${mode === "simple" ? "active" : ""}" type="button" data-modal-filter-mode="simple" ${expressionOnly ? "disabled" : ""}>简单条件</button>
          <button class="${mode === "expression" ? "active" : ""}" type="button" data-modal-filter-mode="expression">高级表达式</button>
        </div>
      `;
      const sqlPreview = filterSqlText(metric) || "-- 暂无过滤条件";
      const preview = `
        <div class="filter-preview">
          <div class="filter-preview-title">范围预览</div>
          <pre data-filter-sql-preview>${sqlPreview}</pre>
        </div>
      `;

      if (mode === "expression") {
        return `
          <section class="form-section">
            <h3>过滤范围</h3>
            <div class="filter-builder">
              <div class="section-heading">过滤范围</div>
              <div class="filter-toolbar">${modeSwitch}</div>
              <div class="explain-box conversion-message">${filterConversionMessage(metric, "简单条件")}</div>
              <div class="field filter-expression">
                <label>范围 WHERE 表达式</label>
                <textarea data-modal-filter-expression placeholder="只填写 WHERE 后面的条件，不写 WHERE 关键字">${metric.filterExpression || expressionFromFilters(metric)}</textarea>
              </div>
              ${preview}
            </div>
          </section>
        `;
      }

      const rows = modalFilterRows(metric).map((row, index) => {
        const filterAttrs = `data-modal-filter-origin="${row.origin}" data-modal-filter-index="${row.rowIndex}" data-modal-filter-extra-index="${row.extraIndex ?? ""}"`;
        const removeAttrs = `data-remove-filter-origin="${row.origin}" data-remove-filter-index="${row.rowIndex}" data-remove-filter-extra-index="${row.extraIndex ?? ""}"`;
        const fieldSelect = `<select title="字段" ${filterAttrs} data-filter-field="field">
              ${[{ value: "", label: "选择字段" }, ...fieldChoices]
                .map(item => `<option value="${item.value}" ${item.value === row.field ? "selected" : ""}>${item.label}</option>`).join("")}
            </select>`;
        const opSelect = `<select title="操作符" ${filterAttrs} data-filter-field="op">
              ${operatorOptions.map(op => `<option value="${op}" ${normalizeOperator(row.op) === op ? "selected" : ""}>${op}</option>`).join("")}
            </select>`;
        const valueInput = `<input value="${row.value || ""}" ${filterAttrs} data-filter-field="value" placeholder="多个值用逗号分隔">`;
        const connectorSelect = `<select title="连接关系" ${filterAttrs} data-filter-field="connector">
              <option value="" ${!row.connector ? "selected" : ""}></option>
              <option value="AND" ${row.connector === "AND" ? "selected" : ""}>AND</option>
              <option value="OR" ${row.connector === "OR" ? "selected" : ""}>OR</option>
            </select>`;
        return `
          <div class="filter-row">
            ${connectorSelect}
            ${fieldSelect}
            ${opSelect}
            ${valueInput}
            <button class="filter-remove" type="button" ${removeAttrs} aria-label="删除过滤条件">×</button>
          </div>
        `;
      }).join("") || `<div class="empty">暂无过滤条件。</div>`;

      return `
        <section class="form-section">
          <h3>过滤范围</h3>
          <div class="filter-builder">
            <div class="section-heading">过滤范围</div>
            <div class="filter-toolbar">
              ${modeSwitch}
              <button class="filter-add" type="button" data-add-filter>+ 新增条件</button>
            </div>
            <div class="filter-list">${rows}</div>
            ${preview}
          </div>
        </section>
      `;
    }
