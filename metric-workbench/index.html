<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>指标配置工作台</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --panel: #ffffff;
      --text: #172033;
      --muted: #657084;
      --line: #dfe3ea;
      --strong: #0f766e;
      --strong-soft: #dff4f0;
      --blue: #2563eb;
      --amber: #b45309;
      --danger: #b91c1c;
      --code: #111827;
      --radius: 8px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      letter-spacing: 0;
    }

    button, input, select, textarea {
      font: inherit;
    }

    .app {
      display: grid;
      grid-template-columns: 300px minmax(0, 1fr);
      min-height: 100vh;
    }

    .sidebar {
      border-right: 1px solid var(--line);
      background: #fbfcfd;
      padding: 18px 14px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .brand {
      padding: 0 6px 10px;
      border-bottom: 1px solid var(--line);
    }

    .brand h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.2;
    }

    .brand p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .search {
      width: 100%;
      height: 36px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 0 10px;
      background: #fff;
      color: var(--text);
    }

    .metric-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      overflow: auto;
    }

    .metric-item {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 11px 12px;
      background: var(--panel);
      text-align: left;
      cursor: pointer;
    }

    .metric-item:hover {
      border-color: #b9c3d2;
      background: #f8fafc;
    }

    .metric-item.active {
      border-color: var(--strong);
      background: var(--strong-soft);
    }

    .metric-name {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      font-weight: 700;
      font-size: 14px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      height: 22px;
      padding: 0 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      color: #164e63;
      background: #e0f2fe;
      white-space: nowrap;
    }

    .tag.expense { color: #7c2d12; background: #ffedd5; }
    .tag.inventory { color: #365314; background: #ecfccb; }

    .metric-meta {
      margin-top: 7px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .main {
      min-width: 0;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      padding: 18px 22px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 20px;
      align-items: center;
    }

    .title-wrap h2 {
      margin: 0;
      font-size: 22px;
      line-height: 1.2;
    }

    .title-wrap p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .actions {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .btn {
      height: 34px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--text);
      padding: 0 12px;
      cursor: pointer;
      font-weight: 600;
      font-size: 13px;
    }

    .btn.primary {
      background: var(--strong);
      border-color: var(--strong);
      color: #fff;
    }

    .content {
      padding: 18px 22px 24px;
      overflow: auto;
    }

    .grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 410px;
      gap: 16px;
      align-items: start;
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 440px;
      gap: 16px;
      align-items: start;
    }

    .section-stack {
      display: flex;
      flex-direction: column;
      gap: 14px;
      min-width: 0;
    }

    .summary-strip {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .summary-item {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      padding: 11px 12px;
      min-width: 0;
    }

    .summary-label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .summary-value {
      margin-top: 6px;
      font-size: 14px;
      font-weight: 800;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .section-title {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .step {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 22px;
      height: 22px;
      border-radius: 999px;
      background: var(--strong);
      color: #fff;
      font-size: 12px;
      font-weight: 800;
      flex: 0 0 auto;
    }

    .panel-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .choice-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 14px;
    }

    .choice-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      padding: 12px;
      text-align: left;
      cursor: pointer;
    }

    .choice-card.active {
      border-color: var(--strong);
      background: var(--strong-soft);
    }

    .choice-title {
      font-weight: 800;
      font-size: 14px;
      color: var(--text);
    }

    .choice-desc {
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .helper-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(0, 1fr);
      gap: 12px;
      align-items: start;
    }

    .explain-box {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #f8fafc;
      padding: 12px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.55;
    }

    .conversion-message {
      white-space: pre-line;
    }

    .condition-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .condition-card {
      display: grid;
      grid-template-columns: 92px minmax(140px, 1.1fr) 128px minmax(150px, 1fr);
      gap: 8px;
      align-items: end;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      padding: 10px;
    }

    .condition-card:first-child {
      grid-template-columns: minmax(140px, 1.1fr) 128px minmax(150px, 1fr);
    }

    .condition-card:first-child .connector-field {
      display: none;
    }

    .condition-note {
      grid-column: 1 / -1;
    }

    .condition-card:first-child .condition-note {
      grid-column: 1 / -1;
    }

    .mini-label {
      display: block;
      margin-bottom: 5px;
      font-size: 11px;
      font-weight: 800;
      color: var(--muted);
    }

    .mode-switch {
      display: inline-flex;
      border: 1px solid var(--line);
      border-radius: 6px;
      overflow: hidden;
      background: #fff;
    }

    .mode-option {
      height: 34px;
      border: 0;
      border-right: 1px solid var(--line);
      padding: 0 12px;
      background: #fff;
      color: var(--muted);
      font-weight: 800;
      cursor: pointer;
    }

    .mode-option:last-child { border-right: 0; }

    .mode-option.active {
      background: var(--strong);
      color: #fff;
    }

    .formula-line {
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #f8fafc;
      padding: 10px 12px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 13px;
      line-height: 1.45;
      overflow-x: auto;
      white-space: nowrap;
    }

    .preview-tabs {
      display: flex;
      gap: 6px;
      padding: 10px;
      border-bottom: 1px solid var(--line);
      background: #f8fafc;
    }

    .preview-tab {
      height: 30px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      padding: 0 10px;
      cursor: pointer;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .preview-tab.active {
      color: #fff;
      border-color: var(--strong);
      background: var(--strong);
    }

    .health {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 12px;
      border-bottom: 1px solid var(--line);
    }

    .check-row {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .check-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #16a34a;
      margin-top: 5px;
      flex: 0 0 auto;
    }

    .check-row.warn .check-dot { background: #d97706; }
    .check-row.bad .check-dot { background: var(--danger); }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .panel-head {
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .panel-head h3 {
      margin: 0;
      font-size: 15px;
    }

    .panel-body {
      padding: 14px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 0;
    }

    label {
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
    }

    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 9px 10px;
      color: var(--text);
      background: #fff;
      min-height: 38px;
    }

    textarea {
      min-height: 80px;
      resize: vertical;
      line-height: 1.5;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    th, td {
      border-bottom: 1px solid var(--line);
      padding: 9px 8px;
      text-align: left;
      vertical-align: middle;
    }

    th {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      background: #f9fafb;
    }

    td input, td select {
      min-height: 32px;
      padding: 6px 8px;
      font-size: 13px;
    }

    .table-wrap {
      overflow-x: auto;
    }

    .hint {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .preview {
      position: sticky;
      top: 16px;
    }

    .preview pre {
      margin: 0;
      padding: 14px;
      min-height: 420px;
      max-height: calc(100vh - 210px);
      overflow: auto;
      background: var(--code);
      color: #e5e7eb;
      font-size: 12px;
      line-height: 1.55;
      white-space: pre;
      border-radius: 0 0 var(--radius) var(--radius);
    }

    .pill {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 999px;
      padding: 5px 9px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .pill.ok { color: #166534; background: #dcfce7; border-color: #bbf7d0; }
    .pill.warn { color: #92400e; background: #fef3c7; border-color: #fde68a; }

    .empty {
      padding: 28px;
      color: var(--muted);
      text-align: center;
    }

    @media (max-width: 1050px) {
      .app { grid-template-columns: 1fr; }
      .sidebar {
        border-right: 0;
        border-bottom: 1px solid var(--line);
        max-height: 210px;
        overflow: hidden;
      }
      .metric-list {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        overflow: auto;
      }
      .grid { grid-template-columns: 1fr; }
      .workspace { grid-template-columns: 1fr; }
      .summary-strip { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .preview { position: static; }
    }

    @media (max-width: 640px) {
      .topbar { grid-template-columns: 1fr; }
      .topbar { padding: 14px; gap: 12px; }
      .metric-list { grid-template-columns: 1fr; }
      .form-grid { grid-template-columns: 1fr; }
      .summary-strip { grid-template-columns: 1fr; }
      .choice-grid { grid-template-columns: 1fr; }
      .condition-card,
      .condition-card:first-child {
        grid-template-columns: 1fr;
      }
      .mode-switch {
        width: 100%;
      }
      .mode-option {
        flex: 1;
      }
      .content { padding: 14px; }
    }

    .semantic-page {
      min-height: 100vh;
      background: #f7f8fa;
      padding: 42px 34px 34px;
    }

    .semantic-header {
      min-height: 124px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 24px;
    }

    .header-left {
      display: flex;
      align-items: flex-start;
      gap: 18px;
      min-width: 0;
    }

    .back-btn {
      width: 34px;
      height: 34px;
      border: 0;
      background: transparent;
      color: var(--text);
      font-size: 24px;
      cursor: pointer;
      margin-top: 2px;
    }

    .semantic-header h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.2;
      font-weight: 900;
    }

    .semantic-header p {
      margin: 18px 0 0;
      color: #7b8798;
      font-size: 16px;
      font-weight: 700;
    }

    .add-data-btn {
      height: 56px;
      min-width: 168px;
      border: 0;
      border-radius: 10px;
      background: #2563eb;
      color: #fff;
      font-size: 16px;
      font-weight: 900;
      box-shadow: 0 6px 14px rgba(37, 99, 235, 0.22);
      cursor: pointer;
    }

    .top-tabs {
      display: flex;
      gap: 34px;
      border-bottom: 1px solid #dde3ec;
      margin-bottom: 28px;
    }

    .top-tab {
      border: 0;
      border-bottom: 3px solid transparent;
      background: transparent;
      padding: 0 0 18px;
      color: #5f6f86;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }

    .top-tab.active {
      color: #2563eb;
      border-bottom-color: #2563eb;
    }

    .semantic-card {
      min-height: calc(100vh - 240px);
      display: grid;
      grid-template-columns: 384px minmax(0, 1fr);
      border: 1px solid #dfe5ee;
      border-radius: 18px 18px 0 0;
      background: #fff;
      overflow: hidden;
    }

    .semantic-menu {
      background: #eef6ff;
      border-right: 1px solid #dfe5ee;
      padding: 22px 14px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .knowledge-switcher {
      padding: 0 10px 16px;
      margin-bottom: 10px;
      border-bottom: 1px solid #d7e5f6;
    }

    .knowledge-switcher label {
      display: block;
      margin-bottom: 7px;
      color: #526176;
      font-size: 12px;
      font-weight: 900;
    }

    .knowledge-switcher select {
      min-height: 38px;
      border-radius: 8px;
      background-color: #fff;
      font-size: 13px;
      font-weight: 800;
    }

    .knowledge-meta {
      margin-top: 8px;
      color: #64748b;
      font-size: 12px;
      line-height: 1.45;
    }

    .semantic-menu button {
      height: 52px;
      border: 0;
      border-radius: 12px;
      background: transparent;
      color: #334965;
      font-size: 16px;
      font-weight: 900;
      text-align: left;
      padding: 0 32px;
      cursor: pointer;
    }

    .semantic-menu button.active {
      color: #2563eb;
      background: #e4f0ff;
    }

    .semantic-main {
      min-width: 0;
      padding: 28px;
    }

    .metric-toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 26px;
    }

    .search-wrap {
      display: grid;
      grid-template-columns: minmax(260px, 1fr) 54px;
      width: min(430px, 42vw);
    }

    .search-wrap .search {
      height: 54px;
      border-radius: 10px 0 0 10px;
      border-color: #cfd7e3;
      font-size: 15px;
      font-weight: 700;
    }

    .search-btn {
      height: 54px;
      border: 1px solid #cfd7e3;
      border-left: 0;
      border-radius: 0 10px 10px 0;
      background: #fff;
      font-size: 24px;
      cursor: pointer;
    }

    .toolbar-spacer {
      flex: 1;
    }

    .metric-table-card {
      border-radius: 14px;
      background: #fff;
      box-shadow: 0 8px 20px rgba(15, 23, 42, 0.06);
      overflow: auto;
      border: 1px solid #edf1f6;
      min-width: 0;
    }

    .metric-table {
      font-size: 14px;
      min-width: 980px;
    }

    .metric-table th {
      height: 58px;
      background: #fbfcfe;
      color: #111827;
      font-size: 15px;
      border-bottom: 1px solid #dfe5ee;
      white-space: nowrap;
    }

    .metric-table td {
      height: 60px;
      color: #334155;
      border-bottom: 1px solid #edf1f6;
    }

    .metric-table tr.active td {
      background: #eff6ff;
    }

    .metric-key {
      font-weight: 900;
      color: #111827;
    }

    .link-btn {
      border: 0;
      background: transparent;
      color: #2563eb;
      font-weight: 900;
      cursor: pointer;
    }

    .danger-link {
      color: #dc2626;
    }

    .row-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      white-space: nowrap;
    }

    .content-preview {
      max-width: 620px;
      color: #334155;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .detail-shell {
      min-width: 0;
      border: 1px solid #dfe5ee;
      border-radius: 14px;
      background: #fff;
      overflow: hidden;
    }

    .detail-title {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 18px;
      padding: 16px 18px;
      border-bottom: 1px solid #edf1f6;
      margin-bottom: 0;
    }

    .detail-title h2 {
      margin: 0;
      font-size: 22px;
      font-weight: 900;
    }

    .detail-title p {
      margin: 8px 0 0;
      color: #64748b;
      font-weight: 700;
    }

    .semantic-workbench {
      display: grid;
      grid-template-columns: minmax(520px, 0.95fr) minmax(520px, 1.05fr);
      gap: 18px;
      align-items: start;
    }

    .detail-shell .workspace {
      grid-template-columns: 1fr;
      gap: 14px;
      padding: 16px;
    }

    .detail-shell .preview {
      position: static;
    }

    .detail-shell .preview pre {
      min-height: 260px;
      max-height: 360px;
    }

    .detail-shell .panel {
      border-radius: 10px;
    }

    .detail-guide {
      margin: 16px 16px 0;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: none;
      align-items: flex-start;
      justify-content: center;
      padding: 26px 18px;
      background: rgba(15, 23, 42, 0.38);
      overflow: auto;
    }

    .modal-backdrop.open {
      display: flex;
    }

    .semantic-modal {
      width: min(1120px, calc(100vw - 64px));
      max-height: calc(100vh - 52px);
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 18px 48px rgba(15, 23, 42, 0.22);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .modal-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 20px;
      padding: 22px 30px 8px;
    }

    .modal-head h2 {
      margin: 0;
      font-size: 22px;
      font-weight: 900;
      color: #16233a;
    }

    .modal-head p {
      display: none;
    }

    .modal-close {
      width: 38px;
      height: 38px;
      border: 0;
      background: transparent;
      color: #64748b;
      font-size: 32px;
      line-height: 1;
      cursor: pointer;
    }

    .modal-body {
      padding: 8px 30px 20px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      overflow: auto;
      flex: 1 1 auto;
      min-height: 0;
      padding-bottom: 30px;
    }

    .modal-form {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .form-section {
      background: #fff;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .form-section h3 {
      display: none;
    }

    .required {
      color: #dc2626;

      border-radius: 8px;
      background: #fffbeb;
      color: #854d0e;
      padding: 9px 10px;
      font-size: 12px;
      line-height: 1.55;
    }

    .qa-panel {
      border: 1px solid #e1e6ee;
      border-radius: 8px;
      overflow: hidden;
      background: #fff;
    }

    .qa-panel-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 12px;
      border-bottom: 1px solid #e8edf4;
      background: #f8fafc;
      color: #172033;
      font-size: 13px;
      font-weight: 850;
    }

    .qa-panel-title-main {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .qa-panel-actions {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      flex: 0 0 auto;
    }

    .qa-panel-title-meta {
      color: #475569;
      font-size: 12px;
      font-weight: 800;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .copy-btn {
      height: 28px;
      border: 1px solid #cfd7e3;
      border-radius: 7px;
      background: #fff;
      color: #334155;
      padding: 0 9px;
      font-size: 12px;
      font-weight: 800;
      cursor: pointer;
      white-space: nowrap;
    }

    .copy-btn:hover {
      border-color: #b9c9e7;
      background: #eff6ff;
      color: #1d4ed8;
    }

    .copy-btn.copied {
      border-color: #bbf7d0;
      background: #f0fdf4;
      color: #15803d;
    }

    .qa-sql {
      margin: 0;
      max-height: 260px;
      overflow: auto;
      background: #111827;
      color: #dbeafe;
      padding: 13px;
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      font-size: 12px;
      line-height: 1.65;
      white-space: pre-wrap;
    }

    .qa-result-sql-panel {
      border-top: 1px solid #e8edf4;
      background: #fff;
    }

    .qa-result-sql-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 9px 12px;
      background: #f8fafc;
      color: #334155;
      font-size: 12px;
      font-weight: 850;
    }

    .qa-result-table-wrap {
      max-height: 260px;
      overflow: auto;
      border-top: 1px solid #e8edf4;
    }

    .qa-result-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    .qa-result-table th,
    .qa-result-table td {
      border-bottom: 1px solid #edf1f6;
      padding: 8px 10px;
      text-align: left;
      vertical-align: top;
      color: #172033;
      white-space: nowrap;
    }

    .qa-result-table th {
      position: sticky;
      top: 0;
      background: #f8fafc;
      color: #475569;
      font-weight: 850;
    }

    .qa-result-table tr.total-row td {
      position: sticky;
      bottom: 0;
      background: #f8fafc;
      border-top: 1px solid #d7e0ec;
      font-weight: 900;
    }

    .qa-chart-control {
      position: relative;
      display: inline-flex;
      align-items: center;
    }

    .qa-chart-menu {
      position: absolute;
      top: calc(100% + 6px);
      right: 0;
      z-index: 30;
      min-width: 116px;
      padding: 6px;
      border: 1px solid #d9e1ed;
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 8px 18px rgba(15, 23, 42, 0.12);
    }

    .qa-chart-menu button {
      width: 100%;
      height: 32px;
      border: 0;
      border-radius: 6px;
      background: transparent;
      color: #334155;
      text-align: left;
      padding: 0 9px;
      font-size: 12px;
      font-weight: 800;
      cursor: pointer;
    }

    .qa-chart-menu button:hover,
    .qa-chart-menu button.active {
      background: #eff6ff;
      color: #1d4ed8;
    }

    .qa-chart-panel {
      border-top: 1px solid #e8edf4;
      background: #fff;
      padding: 12px;
    }

    .qa-chart-stage {
      border: 1px solid #e1e6ee;
      border-radius: 8px;
      background: #fbfcff;
      padding: 12px;
      overflow: auto;
    }

    .qa-chart-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
      color: #334155;
      font-size: 12px;
      font-weight: 850;
    }

    .qa-chart-subtitle {
      color: #64748b;
      font-weight: 750;
    }

    .qa-chart-svg {
      width: 100%;
      min-width: 520px;
      height: auto;
      display: block;
    }

    .qa-chart-empty {
      border: 1px dashed #cbd5e1;
      border-radius: 8px;
      color: #64748b;
      background: #f8fafc;
      padding: 16px;
      font-size: 12px;
      font-weight: 750;
    }

    .qa-details {
      border: 1px solid #e1e6ee;
      border-radius: 8px;
      background: #fff;
      overflow: hidden;
    }

    .qa-details.thought-stream {
      border-color: transparent;
      background: transparent;
      overflow: visible;
    }

    .qa-details summary {
      cursor: pointer;
      padding: 10px 12px;
      color: #334155;
      background: #f8fafc;
      font-size: 13px;
      font-weight: 850;
      list-style-position: inside;
    }

    .qa-details.thought-stream summary {
      padding: 8px 0 8px;
      background: transparent;
      color: #334155;
    }

    .qa-details-body {
      padding: 10px 12px 12px;
      display: grid;
      gap: 10px;
    }

    .thought-stream .qa-details-body {
      padding: 2px 0 0;
      gap: 0;
    }

    .semantic-evidence-summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }

    .semantic-evidence-summary .agent-kv {
      padding: 8px 9px;
    }

    .evidence-section {
      border: 1px solid #e8edf4;
      border-radius: 8px;
      background: #fff;
      overflow: hidden;
    }

    .evidence-section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 9px 11px;
      border-bottom: 1px solid #edf1f6;
      background: #fbfcfd;
      color: #172033;
      font-size: 13px;
      font-weight: 850;
    }

    .evidence-section-body {
      display: grid;
      gap: 9px;
      padding: 10px 11px;
    }

    .evidence-subtitle {
      color: #334155;
      font-size: 12px;
      font-weight: 850;
      padding-bottom: 6px;
    }

    .evidence-kv-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .evidence-kv {
      min-width: 0;
      border: 1px solid #edf1f6;
      border-radius: 7px;
      background: #fbfcfd;
      padding: 8px 9px;
    }

    .evidence-kv span {
      display: block;
      color: #64748b;
      font-size: 12px;
      font-weight: 750;
    }

    .evidence-kv strong {
      display: block;
      margin-top: 4px;
      color: #172033;
      font-size: 13px;
      line-height: 1.45;
      overflow-wrap: anywhere;
    }

    .evidence-code {
      margin: 0;
      max-height: 220px;
      overflow: auto;
      border-radius: 7px;
      background: #111827;
      color: #dbeafe;
      padding: 10px 11px;
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      font-size: 12px;
      line-height: 1.65;
      white-space: pre-wrap;
    }

    .evidence-rule-list {
      display: grid;
      gap: 8px;
    }

    .evidence-rule-card {
      border: 1px solid #e3e9f1;
      border-radius: 8px;
      background: #fff;
      padding: 10px 11px;
    }

    .evidence-rule-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      color: #172033;
      font-size: 13px;
      font-weight: 850;
    }

    .evidence-rule-meta {
      margin-top: 5px;
      color: #64748b;
      font-size: 12px;
      line-height: 1.55;
    }

    .evidence-rule-content {
      margin-top: 8px;
      color: #334155;
      font-size: 12px;
      line-height: 1.65;
      white-space: pre-wrap;
    }

    .evidence-metric-list {
      display: grid;
      gap: 8px;
    }

    .evidence-metric-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: start;
      border: 1px solid #edf1f6;
      border-radius: 7px;
      background: #fbfcfd;
      padding: 8px 9px;
    }

    .evidence-metric-row strong {
      display: block;
      color: #172033;
      font-size: 13px;
      line-height: 1.4;
      overflow-wrap: anywhere;
    }

    .evidence-metric-row span {
      display: block;
      margin-top: 3px;
      color: #64748b;
      font-size: 12px;
      line-height: 1.45;
    }

    .evidence-chip {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      border-radius: 999px;
      background: #eef6ff;
      color: #1d4ed8;
      padding: 2px 8px;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .assistant-composer {
      border-top: 1px solid #e5eaf2;
      background: #fbfcfd;
      padding: 12px;
    }

    .assistant-input-wrap {
      border: 1px solid #d5dde9;
      border-radius: 8px;
      background: #fff;
      padding: 10px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: end;
    }

    .assistant-input-wrap textarea {
      border: 0;
      outline: 0;
      resize: none;
      min-height: 42px;
      max-height: 120px;
      padding: 2px;
      line-height: 1.55;
      color: #172033;
      background: transparent;
    }

    .assistant-input-wrap:focus-within {
      border-color: #9bb4dc;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }

    .agent-result {
      display: grid;
      grid-template-columns: minmax(0, 0.95fr) minmax(0, 1.25fr);
      gap: 14px;
      align-items: start;
    }

    .agent-panel {
      border: 1px solid #e1e6ee;
      border-radius: 8px;
      background: #fff;
      overflow: hidden;
      min-width: 0;
    }

    .agent-panel h3 {
      margin: 0;
      padding: 12px 14px;
      border-bottom: 1px solid #e8edf4;
      background: #f8fafc;
      font-size: 14px;
      line-height: 1.3;
      color: #172033;
    }

    .agent-panel h3.with-action {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .agent-panel-body {
      padding: 12px 14px;
      display: grid;
      gap: 10px;
    }

    .agent-mini-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .agent-kv {
      border: 1px solid #edf1f6;
      border-radius: 7px;
      padding: 9px 10px;
      background: #fbfcfd;
      min-width: 0;
    }

    .agent-kv span {
      display: block;
      color: #64748b;
      font-size: 12px;
      font-weight: 700;
    }

    .agent-kv strong {
      display: block;
      margin-top: 4px;
      color: #172033;
      font-size: 13px;
      line-height: 1.4;
      overflow-wrap: anywhere;
    }

    .agent-list {
      display: grid;
      gap: 8px;
    }

    .agent-item {
      border: 1px solid #e3e9f1;
      border-radius: 8px;
      padding: 10px 11px;
      background: #fff;
    }

    .agent-item-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      font-size: 13px;
      font-weight: 850;
      color: #172033;
    }

    .agent-item p {
      margin: 6px 0 0;
      color: #64748b;
      font-size: 12px;
      line-height: 1.55;
    }

    .agent-code {
      margin: 0;
      max-height: 340px;
      overflow: auto;
      background: #111827;
      color: #dbeafe;
      padding: 14px;
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      font-size: 12px;
      line-height: 1.65;
      white-space: pre-wrap;
    }

    .evidence-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    .evidence-table th,
    .evidence-table td {
      border-bottom: 1px solid #edf1f6;
      padding: 8px 6px;
      text-align: left;
      vertical-align: top;
    }

    .evidence-table th {
      color: #64748b;
      background: #fbfcfd;
      font-weight: 800;
    }

    .evidence-table td {
      color: #172033;
      line-height: 1.45;
    }

    @media (max-width: 1180px) {
      .semantic-page { padding: 24px 18px; }
      .semantic-card { grid-template-columns: 220px minmax(0, 1fr); }
      .semantic-menu button { padding: 0 18px; }
      .semantic-workbench { grid-template-columns: 1fr; }
      .workspace { grid-template-columns: 1fr; }
      .preview { position: static; }
      .agent-result { grid-template-columns: 1fr; }
    }

    @media (max-width: 760px) {
      .semantic-header {
        min-height: auto;
        margin-bottom: 22px;
        flex-direction: column;
      }
      .semantic-header h1 {
        font-size: 24px;
      }
      .semantic-header p {
        margin-top: 8px;
        font-size: 14px;
      }
      .add-data-btn {
        width: 100%;
        height: 46px;
      }
      .semantic-card { grid-template-columns: 1fr; }
      .semantic-menu {
        border-right: 0;
        border-bottom: 1px solid #dfe5ee;
        overflow-x: auto;
        flex-direction: row;
      }
      .semantic-menu button {
        white-space: nowrap;
        padding: 0 18px;
      }
      .metric-toolbar { flex-wrap: wrap; }
      .search-wrap { width: 100%; grid-template-columns: minmax(0, 1fr) 54px; }
      .assistant-fab {
        right: 16px;
        bottom: 16px;
        min-width: 118px;
      }
      .assistant-shell {
        right: 0;
        left: 0;
        bottom: 0;
        width: 100vw;
        height: 100vh;
        max-height: none;
        border-radius: 0;
        border-left: 0;
        border-right: 0;
      }
      .assistant-head {
        align-items: flex-start;
      }
      .assistant-head-actions {
        flex-direction: column-reverse;
        align-items: flex-end;
      }
      .assistant-composer {
        padding-bottom: 16px;
      }
      .assistant-input-wrap {
        grid-template-columns: minmax(0, 1fr) 42px;
      }
      .question-config-head {
        align-items: flex-start;
        flex-direction: column;
      }
      .question-config-summary {
        justify-content: flex-start;
      }
      .question-config-panel {
        grid-template-columns: 1fr;
      }
      .question-config-table-head {
        align-items: flex-start;
        flex-direction: column;
      }
      .question-config-table-options {
        grid-template-columns: 1fr;
        max-height: 168px;
      }
      .agent-mini-grid {
        grid-template-columns: 1fr;
      }
      .semantic-evidence-summary,
      .evidence-kv-grid {
        grid-template-columns: 1fr;
      }
      .semantic-workbench {
        display: flex;
        flex-direction: column;
      }
      .detail-shell {
        order: 1;
      }
      .metric-table-card {
        order: 2;
        max-height: 360px;
      }
      .metric-table-card { overflow-x: auto; }
      .metric-table { min-width: 720px; }
      .modal-body {
        padding: 18px;
      }
      .modal-head,
      .modal-foot {
        padding-left: 18px;
        padding-right: 18px;
      }
      .modal-preview {
        position: static;
      }
    }
  </style>
</head>
<body>
  <div class="semantic-page">
    <header class="semantic-header">
      <div class="header-left">
        <button class="back-btn" aria-label="返回">←</button>
        <div>
          <h1>问数指标语义配置</h1>
          <p>业务指标、过滤口径与 SQL 生成规则</p>
        </div>
      </div>
      <button class="add-data-btn" id="cloneBtn">+ 添加指标</button>
    </header>

    <nav class="top-tabs">
      <button class="top-tab">数据源</button>
      <button class="top-tab active">语义配置</button>
    </nav>

    <main class="semantic-card">
      <aside class="semantic-menu">
        <div class="knowledge-switcher">
          <label for="knowledgeBaseSelect">知识库</label>
          <select id="knowledgeBaseSelect"></select>
          <div class="knowledge-meta" id="knowledgeBaseMeta">正在读取语义库...</div>
        </div>
        <button data-entry-type="table_column_note">表和列补充说明</button>
        <button class="active" data-entry-type="business_metric">业务指标</button>
        <button data-entry-type="standard_qa">标准问答</button>
        <button data-entry-type="logic_text">业务规则</button>
        <button data-entry-type="result_presentation">结果展示要求</button>
        <button data-entry-type="sql_resultset">SQL结果集</button>
      </aside>

      <section class="semantic-main">
        <div class="metric-toolbar">
          <div class="search-wrap">
            <input id="search" class="search" placeholder="搜索 Key / 指标名称 / 关联表" />
            <button class="search-btn">⌕</button>
          </div>
          <button class="btn primary" id="newMetricBtn">+ 新增条目</button>
          <div class="toolbar-spacer"></div>
          <button class="btn">导入</button>
          <button class="btn">导出</button>
          <button class="btn" id="validateBtn">校验</button>
        </div>

        <div class="metric-table-card">
          <table class="metric-table">
            <thead id="entryTableHead"></thead>
            <tbody id="metricList"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <button class="assistant-fab" id="assistantFab" type="button" aria-controls="assistantShell" aria-expanded="false">
    <span class="assistant-fab-dot">AI</span>
    问数助手
  </button>

  <section class="assistant-shell" id="assistantShell" aria-label="问数助手" aria-hidden="true">
    <header class="assistant-head">
      <div class="assistant-title">
        <span class="assistant-avatar">AI</span>
        <div>
          <h2>问数助手</h2>
          <p id="assistantSubtitle">当前知识库 · 侦探式语义检索</p>
        </div>
      </div>
      <div class="assistant-head-actions">
        <span class="agent-badge" id="agentModeBadge">模型 API · qwen3-max</span>
        <button class="assistant-clear" id="assistantClear" type="button">清空</button>
        <button class="assistant-close" id="assistantClose" type="button" aria-label="关闭">×</button>
      </div>
    </header>
    <div class="assistant-messages" id="assistantMessages" aria-live="polite">
      <div class="chat-row assistant">
        <span class="chat-avatar">AI</span>
      <div class="chat-bubble" id="assistantIntro">
          可以直接问当前知识库里的问题。我会读取当前语义配置，用 qwen3-max 给出回答，并附上 SQL 与依据。
        </div>
      </div>
    </div>
    <footer class="assistant-composer">
      <div class="agent-examples">
        <button class="agent-example" type="button" data-agent-example="2025年5月营业收入是多少">营业收入</button>
        <button class="agent-example" type="button" data-agent-example="2025年各公司营业成本是多少">按公司汇总</button>
        <button class="agent-example" type="button" data-agent-example="2025年5月主营业务成本是多少">特殊成本科目</button>
        <button class="agent-example" type="button" data-agent-example="应收账款账龄段分布怎么看">账龄规则</button>
      </div>
      <div class="assistant-input-wrap">
        <textarea id="agentQuestion" placeholder="给问数智能体发送消息">2025年5月营业收入是多少</textarea>
        <button class="agent-run" id="runAgentBtn" type="button" aria-label="发送">↑</button>
      </div>
      <div class="question-config" id="questionConfig">
        <div class="question-config-head">
          <button class="question-config-toggle" id="questionConfigToggle" type="button" aria-expanded="false" aria-controls="questionConfigPanel">问数配置</button>
          <div class="question-config-summary" id="questionConfigSummary"></div>
        </div>
        <div class="question-config-panel" id="questionConfigPanel" hidden>
          <fieldset class="question-config-group wide">
            <legend>数据表范围</legend>
            <div class="question-config-table-head">
              <span id="questionConfigTableHint">默认使用当前知识库的全部表。</span>
              <div class="question-config-table-actions">
                <button class="question-config-table-btn" type="button" id="questionConfigSelectAllTables">全选</button>
              </div>
            </div>
            <div class="question-config-table-options" id="questionConfigTableOptions"></div>
          </fieldset>
          <fieldset class="question-config-group">
            <legend>数据口径</legend>
            <div class="question-config-options">
              <label class="question-config-option">
                <input type="radio" name="qaDataPath" value="management" />
                <span>管口数据</span>
                <em>内部日常管理使用，服务具体业务场景。</em>
              </label>
              <label class="question-config-option">
                <input type="radio" name="qaDataPath" value="legal" />
                <span>法口数据</span>
                <em>对外报送或披露使用，按监管口径处理。</em>
              </label>
            </div>
          </fieldset>
          <fieldset class="question-config-group">
            <legend>过滤条件</legend>
            <div class="question-config-options">

      { field: "b28_s_kgdp984", op: "=", value: "F99", note: "固定版本" },
      { field: "b28_s_kgd4kbn", op: "=", value: "CNY", note: "人民币口径" },
      { field: "b28_s_kgdtvnx", op: "=", value: "ACT_LG", note: "默认实际数口径" },
      { field: "b28_s_kgd4rtr_kgdxoi5", op: "=", value: "EO_1000", note: "默认组织口径" },
      { field: "b28_s_kgdc8w9", op: "NOT LIKE", value: "E%,F%", note: "排除 E/F 审计口径" }
    ];

    function withBpcRequiredDefaultFilters(lines = []) {
      const result = [...lines];
      const hasActual = result.some(line => /b28_s_kgdtvnx/i.test(line));
      const hasEntity = result.some(line => /b28_s_kgd4rtr_kgdxoi5/i.test(line));
      let insertAt = result.findIndex(line => /b28_s_kgd4kbn/i.test(line));
      insertAt = insertAt >= 0 ? insertAt + 1 : 0;
      if (!hasActual) {
        result.splice(insertAt, 0, "AND b28_s_kgdtvnx = 'ACT_LG'");
        insertAt += 1;
      }
      if (!hasEntity) {
        result.splice(insertAt, 0, "AND b28_s_kgd4rtr_kgdxoi5 = 'EO_1000'");
      }
      return result;
    }

    function bpcRowCondition(row) {
      const matchField = row.matchField || "account_path";
      const matchType = row.matchType || "PATH_CONTAINS";
      const matchValue = normalizeMatchValue(matchType, row.matchValue || row.accountCode);
      const accountCondition = conditionFor(matchField, normalizeMatchType(matchType), matchValue);
      return row.extraFilter && row.extraFilter !== "无"
        ? `(${accountCondition} AND ${row.extraFilter})`
        : accountCondition;
    }

    function bpcScopeExpression(filters = []) {
      return filters
        .map(row => conditionFor(row.field, row.op, row.value))
        .join("\nAND ");
    }

    function bpcExpressionFromRows(rows, filters = []) {
      const fixedFilters = bpcScopeExpression([...bpcBaseFilters(), ...filters]);
      const accountFilters = rows.map(row => bpcRowCondition(row));
      if (!accountFilters.length) return fixedFilters;
      const accountExpression = accountFilters.length === 1
        ? accountFilters[0]
        : `(\n${accountFilters.map(item => `  ${item}`).join("\n  OR\n")}\n)`;
      return `${fixedFilters}\nAND ${accountExpression}`;
    }

    function bpcResultMultiplier(rows) {
      if (!rows.length) return 1;
      return rows.every(row => row.reverse) ? -1 : 1;
    }

    function bpcMetric({ code, name, aliases, rows, calculationMode, filters = [], testQuestion, sourceRule = "BPC特殊合并科目映射" }) {
      const filterExpression = bpcExpressionFromRows(rows, filters);
      return {
        code,
        name,
        aliases,
        tag: "BPC",
        sourceTable: "bpc_consolidated_report",
        measureField: "b28_s_sdata",
        timeField: "b28_s_kgd353d",
        currencyField: "b28_s_kgd4kbn",
        aggregation: "SUM",
        resultMultiplier: bpcResultMultiplier(rows),
        outputProfile: "summary_only",
        calculationMode,
        sourceRule,
        implementation: defaultTable === "bpc_consolidated_report" ? "generic_metric" : "generic_metric",
        bpcRows: rows.map(row => ({
          accountCode: row.accountCode,
          operator: row.operator || "+",
          reverse: row.reverse ? "是" : "否",
          resultMultiplier: row.resultMultiplier ?? (row.reverse ? -1 : 1),
          extraFilter: row.extraFilter || "无",
          matchField: row.matchField,
          matchType: row.matchType,
          matchValue: row.matchValue
        })),
        filters: [...bpcBaseFilters(), ...filters],
        filterMode: "expression",
        filterExpression,
        outputFields: [],
        testQuestion: testQuestion || `2025年${name}是多少？`
      };
    }

    function bpcDerivedMetric({ code, name, aliases, expression, dependencies, dependencySpecs, testQuestion }) {
      return {
        code,
        name,
        aliases,
        tag: "BPC",
        calculationType: "derived",
        expression,
        dependencies,
        dependencySpecs,
        outputProfile: "summary_only",
        outputFields: [],
        testQuestion: testQuestion || `2025年${name}是多少？`
      };
    }

    function dependencyPeriodRoles() {
      return [
        { value: "current_period", label: "当前期间" },
        { value: "previous_period", label: "上期" },
        { value: "previous_year_same_period", label: "上年同期" },
        { value: "previous_year_end", label: "上年年末" },
        { value: "average_begin_end", label: "期初期末平均" },
        { value: "custom_expression", label: "自定义表达式" }
      ];
    }

    function dependencyPeriodLabel(value) {
      return dependencyPeriodRoles().find(item => item.value === value)?.label || value || "当前期间";
    }

    function dependencyPeriodExampleItems() {
      return [
        { value: "current_period", label: "当前期间", example: "问 2025 年 5 月的数据，就取 2025.05；问 2025 年全年，就取 2025.12。" },
        { value: "previous_period", label: "上期", example: "问 2025.05，就取 2025.04；问 2025 年，就取 2024 年。" },
        { value: "previous_year_same_period", label: "上年同期", example: "问 2025.05，就取 2024.05；问 2025 年，就取 2024 年。" },
        { value: "previous_year_end", label: "上年年末", example: "问 2025.05 或 2025 年，都取 2024.12。" },
        { value: "average_begin_end", label: "期初期末平均", example: "取（上年年末值 + 当前期间值）/ 2，例如平均应收账款 =（2024.12 应收账款 + 2025.05 应收账款）/ 2。" }
      ];
    }

    function dependencyPeriodDescription(value) {
      const map = Object.fromEntries(dependencyPeriodExampleItems().map(item => [item.value, `${item.label}：${item.example}`]));
      map.custom_expression = "自定义表达式：用表达式定义依赖指标的取数期间，适合累计、滚动、跨年平均等标准选项覆盖不了的场景。";
      return map[value] || "";
    }

    function defaultPeriodExpression(periodRole = "custom_expression") {
      const map = {
        custom_expression: "{{period}}",
        previous_period: "previous_period({{period}})",
        previous_year_same_period: "same_period_last_year({{period}})",
        previous_year_end: "year_end(previous_year({{period}}))",
        average_begin_end: "average(year_end(previous_year({{period}})), {{period}})"
      };
      return map[periodRole] || "{{period}}";
    }

    function periodExpressionTemplates() {
      return [
        { label: "当前期", value: "{{period}}" },
        { label: "上期", value: "previous_period({{period}})" },
        { label: "上年同期", value: "same_period_last_year({{period}})" },
        { label: "上年年末", value: "year_end(previous_year({{period}}))" },
        { label: "期初期末平均", value: "average(year_end(previous_year({{period}})), {{period}})" },
        { label: "累计到当前月", value: "year_to_date({{period}})" }
      ];
    }

    function dependencyPeriodExpressionForSave(dep) {
      if ((dep?.periodRole || dep?.period_role) !== "custom_expression") return "";
      return String(dep?.periodExpression || dep?.period_expression || "").trim();
    }

    function dependencySpecPayload(dep) {
      const payload = {
        metric_key: dep.metricKey,
        variable: dep.variable || dep.metricKey,
        period_role: dep.periodRole || "current_period",
        period_description: dependencyPeriodDescription(dep.periodRole),
        note: dep.note || ""
      };
      const periodExpression = dependencyPeriodExpressionForSave(dep);
      if (periodExpression) payload.period_expression = periodExpression;
      return payload;
    }

    function dependencyPeriodSummary(dep) {
      if ((dep?.periodRole || dep?.period_role) === "custom_expression") {
        return dep?.periodExpression || dep?.period_expression || "自定义表达式待填写";
      }
      return dependencyPeriodLabel(dep?.periodRole || dep?.period_role);
    }

    function defaultDependencyVariable(metricKey, periodRole = "current_period") {
      const key = String(metricKey || "").trim();
      if (!key) return "";
      if (periodRole === "average_begin_end") return `avg_${key.replace(/^bpc_/, "")}`;
      if (periodRole === "previous_period") return `prev_${key}`;
      if (periodRole === "previous_year_same_period") return `py_${key}`;
      if (periodRole === "previous_year_end") return `begin_${key.replace(/^bpc_/, "")}`;
      return key;
    }

    function normalizeDependencySpec(item) {
      if (typeof item === "string") {
        return {
          metricKey: item,
          variable: item,
          periodRole: "current_period",
          periodExpression: "",
          note: ""
        };
      }
      const metricKey = item?.metricKey || item?.metric_key || item?.metric || item?.key || "";
      const periodRole = item?.periodRole || item?.period_role || "current_period";
      const periodExpression = item?.periodExpression || item?.period_expression || "";
      return {
        metricKey,
        variable: item?.variable || item?.alias || defaultDependencyVariable(metricKey, periodRole),
        periodRole,
        periodExpression: periodRole === "custom_expression" ? (periodExpression || defaultPeriodExpression(periodRole)) : periodExpression,
        note: item?.note || ""
      };
    }

    function ensureDerivedDependencies(metric) {
      const existing = Array.isArray(metric.dependencySpecs) ? metric.dependencySpecs.map(normalizeDependencySpec) : [];
      const specs = existing.length
        ? existing.filter(item => item.metricKey)
        : (metric.dependencies || []).map(normalizeDependencySpec).filter(item => item.metricKey);
      metric.dependencySpecs = specs;
      metric.dependencies = specs.map(item => item.metricKey);
      return specs;
    }

          tableNote: spec.table_note || "",
          columns: Array.isArray(spec.columns) ? spec.columns.map(column => ({
            name: column.name || "",
            description: column.description || column.name || "",
            note: column.note || "",
            enabled: column.enabled !== false
          })) : []
        };
      }
      return base;
    }

    function syncTableCatalogFromTableNotes() {
      metrics
        .filter(metric => semanticEntryType(metric) === "table_column_note" && metric.sourceTable)
        .forEach(metric => {
          const tableName = metric.sourceTable;
          if (!tableCatalog[tableName]) {
            tableCatalog[tableName] = {
              label: metric.tableDescription || tableName,
              fields: []
            };
          }
          if (metric.tableDescription) tableCatalog[tableName].label = metric.tableDescription;
          const fields = tableCatalog[tableName].fields || [];
          const byField = new Map(fields.map(item => [item.field, item]));
          (metric.columns || []).forEach(column => {
            if (!column.name || byField.has(column.name)) return;
            fields.push({
              field: column.name,
              label: column.description || column.name
            });
          });
          tableCatalog[tableName].fields = fields;
        });
    }

    async function loadWorkbenchDataFromDb() {
      try {
        const response = await fetch("/api/semantic-workbench-data", { cache: "no-store" });
        const payload = await response.json();
        if (!payload.ok) throw new Error(payload.error || "语义库读取失败");
        knowledgeBases = (payload.models || []).map(model => ({
          id: Number(model.id),
          name: model.name,
          description: model.description || "",
          tableNames: normalizeModelTables(model)
        }));
        applyKnowledgeBaseCatalog(payload.models || []);
        metrics = (payload.entries || [])
          .filter(entry => ["business_metric", "logic_text", "result_presentation", "sql_resultset", "standard_qa", "table_column_note"].includes(entry.kind))
          .map(metricFromSemanticEntry);
        syncTableCatalogFromTableNotes();
        if (!knowledgeBases.some(kb => Number(kb.id) === Number(selectedKnowledgeBaseId))) {
          selectedKnowledgeBaseId = knowledgeBases.find(kb => kb.id === 40032)?.id || knowledgeBases[0]?.id || selectedKnowledgeBaseId;
        }
        assistantTurnState = null;
        activeSemanticType = firstAvailableSemanticType();
        selectedIndex = visibleEntryIndexes()[0] ?? 0;
        render();
        renderQuestionConfigSummary();
      } catch (error) {
        document.getElementById("knowledgeBaseMeta").textContent = `数据库读取失败，使用本地示例：${error.message || error}`;
        render();
        renderQuestionConfigSummary();
      }
    }

    function currentKnowledgeBase() {
      return knowledgeBases.find(kb => Number(kb.id) === Number(selectedKnowledgeBaseId)) || knowledgeBases[0] || null;
    }

    function selectedKnowledgeBaseTables() {
      const kb = currentKnowledgeBase();
      const configuredTables = Array.isArray(kb?.tableNames) ? kb.tableNames : [];
      const entryTables = metrics
        .filter(metric => Number(metric.modelId || selectedKnowledgeBaseId) === Number(selectedKnowledgeBaseId))
        .flatMap(relatedTables);
      const tables = [...new Set([...configuredTables, ...entryTables].filter(Boolean))];
      return tables.length ? tables : ["bpc_consolidated_report"];
    }

    function primaryKnowledgeTable() {
      return selectedKnowledgeBaseTables()[0] || "bpc_consolidated_report";
    }

    function isMetricInCurrentKnowledgeBase(metric) {
      return Number(metric.modelId || selectedKnowledgeBaseId) === Number(selectedKnowledgeBaseId);
    }

    function currentKnowledgeBaseEntries() {
      return metrics.filter(isMetricInCurrentKnowledgeBase);
    }

    function firstAvailableSemanticType() {
      const order = ["business_metric", "logic_text", "result_presentation", "table_column_note", "standard_qa", "sql_resultset"];
      if (metrics.some(metric => isMetricInCurrentKnowledgeBase(metric) && semanticEntryType(metric) === activeSemanticType)) {
        return activeSemanticType;
      }
      return order.find(type => metrics.some(metric => isMetricInCurrentKnowledgeBase(metric) && semanticEntryType(metric) === type)) || "business_metric";
    }

    function selectedKnowledgeBaseTableText(separator = "、") {
      return selectedKnowledgeBaseTables().join(separator) || "未配置表";
    }

    function questionTableScopeKey() {
      return String(selectedKnowledgeBaseId || currentKnowledgeBase()?.id || "default");
    }

    function selectedQuestionTables() {
      const allTables = selectedKnowledgeBaseTables();
      const configured = assistantQuestionTableScopes.get(questionTableScopeKey());
      if (!Array.isArray(configured)) return allTables;
      const selected = configured.filter(table => allTables.includes(table));
      return selected.length ? selected : allTables;
    }

    function setSelectedQuestionTables(tables) {
      const allTables = selectedKnowledgeBaseTables();
      const selected = [...new Set((tables || []).filter(table => allTables.includes(table)))];
      assistantQuestionTableScopes.set(questionTableScopeKey(), selected.length ? selected : allTables);
    }

    function isQuestionTableScopeAll() {
      const allTables = selectedKnowledgeBaseTables();
      const selected = selectedQuestionTables();
      return selected.length === allTables.length && allTables.every(table => selected.includes(table));
    }

    function questionTableScopeLabel(tables = selectedQuestionTables(), allTables = selectedKnowledgeBaseTables()) {
      const allSelected = tables.length === allTables.length && allTables.every(table => tables.includes(table));
      if (allSelected) return `全部表（${allTables.length}）`;
      if (!tables.length) return "全部表";
      if (tables.length <= 3) return tables.join("、");
      return `${tables.slice(0, 3).join("、")} 等 ${tables.length} 张表`;
    }

    function selectedQuestionTableText(separator = "、") {
      const selected = selectedQuestionTables();
      if (isQuestionTableScopeAll()) return "全部表";
      return selected.join(separator) || "全部表";
    }

    function primaryQuestionTable() {
      return selectedQuestionTables()[0] || primaryKnowledgeTable();
    }

    function isEntryInQuestionTableScope(metric, selectedTables = selectedQuestionTables()) {
      const scope = new Set(selectedTables);
      if (!scope.size) return true;
      const tables = [...new Set([...relatedTables(metric), metric.sourceTable].filter(Boolean))];
      if (!tables.length) return true;
      return tables.some(table => scope.has(table));
    }

    function normalizeForAgent(value) {
      return String(value || "")
        .toLowerCase()
        .replace(/\s+/g, "")
        .replace(/[，。！？、,.!?;；:：()[\]（）【】"'`]/g, "");
    }

    function agentEntryText(metric) {
      return [
        metric.code,
        metric.name,
        metric.aliases,
        metric.content,
        metric.sql,
        metric.description,
        metric.question,
        metric.answer,
        metric.tableDescription,
        metric.tableNote,
        (metric.columns || []).map(column => `${column.name} ${column.description} ${column.note}`).join(" "),
        filterSqlText(metric)
      ].join(" ");
    }

    function agentEntriesByType(type) {
      return metrics.filter(metric => (
        semanticEntryType(metric) === type &&
        isMetricInCurrentKnowledgeBase(metric) &&
        isEntryInQuestionTableScope(metric)
      ));
    }

    function agentScore(metric, query, extraTerms = []) {
      const q = normalizeForAgent(query);
      const text = normalizeForAgent(agentEntryText(metric));
      const metricName = normalizeForAgent(metric.name);
      const metricCode = normalizeForAgent(metric.code);
      const aliases = aliasItems(metric).map(normalizeForAgent).filter(Boolean);
      const terms = [
        q,
        ...String(query || "").split(/[\\s,，、]+/),
        ...extraTerms
      ].map(normalizeForAgent).filter(Boolean);
      let score = 0;
      if (text.includes(q)) score += 40;
      if (metricName && q.includes(metricName)) score += 90;
      if (metricCode && q.includes(metricCode)) score += 80;
      aliases.forEach(alias => {
        if (alias.length >= 2 && q.includes(alias)) score += 76;
      });
      terms.forEach(term => {
        if (term.length < 2) return;
        if (metricName.includes(term)) score += 18;
        if (metricCode.includes(term)) score += 12;
        if (aliases.some(alias => alias.includes(term))) score += 16;
        if (text.includes(term)) score += Math.min(10, term.length);
      });
      return score;
    }

    function topAgentCandidates(type, query, limit = 5, extraTerms = []) {
      return agentEntriesByType(type)
        .map(metric => ({ metric, score: agentScore(metric, query, extraTerms) }))
        .filter(item => item.score > 0 || type === "table_column_note")
        .sort((a, b) => b.score - a.score)
        .slice(0, limit);
    }

    function extractAgentSignals(question) {
      const isBpcKnowledgeBase = selectedQuestionTables().includes("bpc_consolidated_report");
      const yearMatch = question.match(/(20\\d{2})\\s*年?/);
      const monthMatch = question.match(/(?:年\\s*)?(1[0-2]|0?[1-9])\\s*月/);
      const year = yearMatch?.[1] || "";
      const month = monthMatch?.[1] ? monthMatch[1].padStart(2, "0") : "";
      const period = year ? `${year}.${month || "12"}` : "";
      const asksMonth = Boolean(year && month);
      const asksYearOnly = Boolean(year && !month);
      const dimensions = [];
      if (isBpcKnowledgeBase && /各公司|按公司|分公司|各组织|按组织|合并范围/.test(question)) dimensions.push({
        label: "公司/组织",
        field: "b28_s_kgd4rtr_kgdxoi5_txtlg",
        evidence: "table_column_note:bpc_consolidated_report"
      });
      if (isBpcKnowledgeBase && /客户|供应商/.test(question)) dimensions.push({
        label: "客户/供应商",
        field: "b28_s_kgdsxrb_txtlg",
        evidence: "logic_text:BPC客户供应商规则"
      });
      if (isBpcKnowledgeBase && /账龄|账龄段|账龄分布/.test(question)) dimensions.push({
        label: "账龄段",
        field: "b28_s_kgdbveh_txtlg",
        evidence: "logic_text:BPC六大往来账龄规则"
      });
      return {
        question,
        year,
        month,
        period,
        asksMonth,
        asksYearOnly,
        needsDetail: /明细|清单|列表|每笔|原始/.test(question),
        needsComparison: /同比|环比|对比|比较|差异/.test(question),
        needsRanking: /排名|top|TOP|前\\d+/.test(question),
        isAging: /账龄|账龄段|账龄分布/.test(question),
        isRuleQuestion: /口径|规则|怎么算|为什么|如何计算/.test(question),
        dimensions
      };
    }

    function selectedAgentRules(question, signals, selectedMetric) {
      const rules = agentEntriesByType("logic_text");
      const isBpcKnowledgeBase = selectedQuestionTables().includes("bpc_consolidated_report");
      const byKey = key => rules.find(rule => rule.code === key);
      const selected = [];
      const add = (key, reason) => {
        const rule = byKey(key);
        if (rule && !selected.some(item => item.metric.code === key)) selected.push({ metric: rule, reason });
      };
      if (!isBpcKnowledgeBase) {
        topAgentCandidates("logic_text", question, 3).forEach(item => {
          if (!selected.some(rule => rule.metric.code === item.metric.code)) {
            selected.push({ metric: item.metric, reason: "当前知识库内与问题最相关的业务规则" });
          }
        });
        return selected;
      }
      add("BPC基础过滤与输出", "BPC 查询的默认过滤和输出约束");
      add("科目筛选", "BPC 科目筛选需要使用 account_path");
      if (signals.year) add("BPC时间口径规则", "问题包含期间，需要确认 YYYY.MM 和年/月口径");
      const metricText = selectedMetric ? `${selectedMetric.name} ${selectedMetric.aliases} ${filterSqlText(selectedMetric)}` : "";
      if (signals.asksMonth && /APL|CF|营业|收入|成本|利润|现金/.test(metricText + question)) {
        add("APL/CF 月度数据", "月度 APL/CF 类指标需要判断累计值差额");
      }
      if (signals.isAging) add("BPC六大往来账龄规则", "问题涉及账龄段");
      if (/客户|供应商/.test(question)) add("BPC客户供应商规则", "问题涉及客户/供应商字段");
      if (selectedMetric && /\\bOR\\b|\\n\\s*OR\\s*\\n/i.test(filterSqlText(selectedMetric))) {
        add("BPC条件聚合SQL模板", "指标由多个条件组合，生成 SQL 时需要条件聚合");
      }
      return selected;
    }

    function previousPeriod(period) {
      if (!period) return "";
      const [yearText, monthText] = period.split(".");
      const year = Number(yearText);
      const month = Number(monthText);
      if (!year || !month) return "";
      if (month === 1) return `${year - 1}.12`;
      return `${year}.${String(month - 1).padStart(2, "0")}`;
    }

    function indentWhere(sql) {
      return String(sql || "")
        .split("\n")
        .map(line => line.trimEnd())
        .filter(Boolean)
        .map(line => `  ${line}`)
        .join("\n");
    }

    function metricLooksCumulative(metric) {
      const text = `${metric?.name || ""} ${metric?.aliases || ""} ${filterSqlText(metric || {})}`;
      return /APL|CF|营业|收入|成本|利润|现金/.test(text);
    }

    function buildAgentSql(selectedMetric, signals) {
      if (!selectedMetric) {
        return "-- 未命中明确业务指标。请先在业务指标中补充口径，或转入业务规则/SQL结果集辅助判断。";
      }
      if (selectedMetric.calculationType === "derived") {
        return [
          `-- 派生指标：${selectedMetric.name || selectedMetric.code}`,
          "-- 该指标不能直接按单个字段聚合，需要先分别展开依赖指标，再执行公式。",
          `-- 依赖指标：${(selectedMetric.dependencies || []).join(", ") || "待配置"}`,
          "",
          "WITH expanded_metric_results AS (",
          "  -- TODO: 按依赖指标自己的口径分别生成子查询",
          ")",
          "SELECT",
          `  ${selectedMetric.expression || "公式待配置"} AS \`${selectedMetric.name || selectedMetric.code}\``,
          "FROM expanded_metric_results;"
        ].join("\n");
      }
      const metricName = selectedMetric.name || selectedMetric.code;
      const measure = selectedMetric.measureField || "b28_s_sdata";
      const sourceTable = selectedMetric.sourceTable || primaryQuestionTable();
      const periodField = selectedMetric.timeField && !String(selectedMetric.timeField).includes("/")
        ? selectedMetric.timeField
        : sourceTable === "bpc_consolidated_report"
          ? "b28_s_kgd353d"
          : "";
      const resultFactor = Number(selectedMetric.resultMultiplier ?? 1);
      const multiplierPrefix = resultFactor === 1 ? "" : `${resultFactor} * `;
      const filter = indentWhere(filterSqlText(selectedMetric));
      const dimension = signals.dimensions[0];
      const selectParts = [];
      const groupBy = [];
      if (dimension) {
        selectParts.push(`  ${dimension.field} AS \`${dimension.label}\``);
        groupBy.push(dimension.field);
      }
      if (signals.asksMonth && periodField && metricLooksCumulative(selectedMetric)) {
        const prev = previousPeriod(signals.period);
        const expression = signals.month === "01"
          ? `${multiplierPrefix}SUM(CASE WHEN ${periodField} = '${signals.period}' THEN ${measure} ELSE 0 END)`
          : `${multiplierPrefix}(SUM(CASE WHEN ${periodField} = '${signals.period}' THEN ${measure} ELSE 0 END) - SUM(CASE WHEN ${periodField} = '${prev}' THEN ${measure} ELSE 0 END))`;
        selectParts.push(`  ${expression} AS \`${metricName}\``);
      } else {
        const periodFilter = signals.period && periodField ? `\n  AND ${periodField} = '${signals.period}'` : "";
        selectParts.push(`  ${multiplierPrefix}SUM(${measure}) AS \`${metricName}\``);
        return `SELECT\n${selectParts.join(",\n")}\nFROM ${sourceTable}\nWHERE\n${filter}${periodFilter}${groupBy.length ? `\nGROUP BY ${groupBy.join(", ")}` : ""};`;
      }
      return `SELECT\n${selectParts.join(",\n")}\nFROM ${sourceTable}\nWHERE\n${filter}${groupBy.length ? `\nGROUP BY ${groupBy.join(", ")}` : ""};`;
    }

    function buildSqlEvidence(selectedMetric, selectedRules, tableNotes, sqlText, signals) {
      const evidence = [];
      const sourceTable = selectedMetric?.sourceTable || primaryQuestionTable();
      evidence.push({
        part: "FROM",
        value: sourceTable,
        source: "表和列补充说明",
        note: "当前知识库的主要取数表"
      });
      if (selectedMetric) {
        evidence.push({
          part: "SELECT",
          value: resultFormula(selectedMetric),
          source: `业务指标:${selectedMetric.code}`,
          note: "指标定义提供统计字段、聚合方式和结果系数"
        });
        evidence.push({
          part: "指标范围",
          value: filterSqlText(selectedMetric).split("\n").filter(line => /account_path|kgdbveh|kgdk1oi/.test(line)).join(" "),
          source: `业务指标:${selectedMetric.code}`,
          note: "指标自己的科目或业务范围"
        });
      }
      selectedRules.forEach(item => {
        evidence.push({
          part: "规则",
          value: item.metric.code,
          source: `业务规则:${item.metric.code}`,
          note: item.reason
        });
      });
      if (signals.dimensions.length) {
        evidence.push({
          part: "GROUP BY",
          value: signals.dimensions.map(item => `${item.label}:${item.field}`).join("、"),
          source: signals.dimensions.map(item => item.evidence).join("、"),
          note: "用户问题包含维度汇总意图"
        });
      }
      evidence.push({
        part: "最终 SQL",
        value: sqlText.includes("未命中") ? "待补指标" : "已生成",
        source: selectedMetric ? "证据齐全" : "证据不足",
        note: selectedMetric ? "所有核心 SQL 片段均有语义来源" : "缺少业务指标，不进入最终执行"
      });
      return evidence;
    }

    function runDetectiveAgent(question) {
      const signals = extractAgentSignals(question);
      const metricCandidates = topAgentCandidates("business_metric", question, 5);
      const standardQaCandidates = topAgentCandidates("standard_qa", question, 3);
      const tableNoteCandidates = topAgentCandidates("table_column_note", `${question} ${selectedQuestionTables().join(" ")}`, 2);
      const sqlResultCandidates = topAgentCandidates("sql_resultset", question, 3);
      const selectedMetric = metricCandidates[0]?.score > 0 ? metricCandidates[0].metric : null;
      const selectedRules = selectedAgentRules(question, signals, selectedMetric);
      const hypotheses = [
        {
          title: selectedMetric ? `用户在问业务指标：${selectedMetric.name}` : "用户可能在问一个未配置指标",
          confidence: selectedMetric ? Math.min(0.95, 0.55 + metricCandidates[0].score / 100) : 0.36,
          reason: selectedMetric ? `命中业务指标 ${selectedMetric.code}` : "业务指标召回不足，需要规则或人工补充口径"
        },
        {
          title: signals.dimensions.length ? `问题包含维度汇总：${signals.dimensions.map(item => item.label).join("、")}` : "问题倾向单值查询",
          confidence: signals.dimensions.length ? 0.78 : 0.62,
          reason: signals.dimensions.length ? "检测到“各/按/账龄/客户供应商”等维度信号" : "未发现明确分组词"
        },
        {
          title: standardQaCandidates.length ? "可先参考标准问答" : "标准问答未高命中",
          confidence: standardQaCandidates[0] ? Math.min(0.9, 0.35 + standardQaCandidates[0].score / 100) : 0.28,
          reason: standardQaCandidates[0] ? `最相似问答：${standardQaCandidates[0].metric.code}` : "当前示例库没有相似问答"
        }
      ];
      const searchPlan = [
        { type: "标准问答", query: question, purpose: "先看是否有已验证问法" },
        { type: "业务指标", query: selectedMetric?.name || question, purpose: "定位指标口径和过滤范围" },
        { type: "表和列补充说明", query: `${selectedKnowledgeBaseTableText(" ")} 金额 科目 时间`, purpose: "确认字段含义和字段辨析" },
        { type: "业务规则", query: selectedRules.map(item => item.metric.code).join("、") || "BPC基础过滤", purpose: "补默认过滤、时间口径和例外规则" },
        { type: "SQL结果集", query: question, purpose: "必要时查询枚举、编码或科目备注" }
      ];
      const sqlText = buildAgentSql(selectedMetric, signals);
      return {
        signals,
        hypotheses,
        searchPlan,
        candidates: {
          standardQa: standardQaCandidates,
          metrics: metricCandidates,
          tableNotes: tableNoteCandidates,
          rules: selectedRules,
          sqlResultsets: sqlResultCandidates
        },
        decision: {
          intent: signals.isRuleQuestion ? "rule_explanation" : signals.dimensions.length ? "dimension_summary" : selectedMetric ? "metric_query" : "unknown",
          selectedMetric,
          selectedMetricKeys: selectedMetric ? [selectedMetric.code].filter(Boolean) : [],
          selectedMetrics: selectedMetric ? [selectedMetric] : [],
          selectedRules: selectedRules.map(item => item.metric),
          confidence: selectedMetric ? Math.min(0.94, 0.62 + (metricCandidates[0]?.score || 0) / 120) : 0.42
        },
        sqlText,
        evidence: buildSqlEvidence(selectedMetric, selectedRules, tableNoteCandidates, sqlText, signals)
      };
    }

    function compactAgentCandidate(item) {
      const metric = item.metric || item;
      return {
        key: metric.code || metric.sourceTable || metric.name,
        type: semanticEntryType(metric),
        name: metric.name || metric.sourceTable || metric.code,
        aliases: aliasItems(metric),
        tables: relatedTables(metric),
        score: item.score || 0,
        summary: entrySummary(metric).slice(0, 1200),
        filter: semanticEntryType(metric) === "business_metric" ? filterSqlText(metric) : undefined
      };
    }

    function compactSemanticEntryForModel(metric) {
      const type = semanticEntryType(metric);
      const base = {
        key: metric.code || metric.sourceTable || metric.name,
        type,
        name: metric.name || metric.tableDescription || metric.sourceTable || metric.code,
        aliases: aliasItems(metric),
        source_table: metric.sourceTable || relatedTables(metric)[0] || "",
        summary: entrySummary(metric).slice(0, type === "logic_text" ? 1800 : 900)
      };
      if (type === "business_metric") {
        base.metric_kind = metric.calculationType || "base";
        base.measure = {
          field: metric.measureField || "",
          aggregation: metric.aggregation || "",
          result_factor: Number(metric.resultMultiplier ?? 1)
        };
        base.scope_filter = filterSqlText(metric).split("\n").map(line => line.trimEnd()).filter(Boolean);
        if (metric.presentation) base.presentation = metric.presentation;
        if (metric.calculationType === "derived") {
          const dependencies = ensureDerivedDependencies(metric);
          base.dependency_keys = dependencies.map(dep => dep.metricKey);
          base.dependencies = dependencies.map(dependencySpecPayload);
          base.expression = metric.expression || "";
        }
      }
      if (type === "logic_text") {
        base.content = String(metric.content || "").slice(0, 2600);
      }
      if (type === "result_presentation") {
        base.content = String(metric.content || "").slice(0, 2200);
        base.applies_to = metric.presentationStages || ["final_answer", "result_table"];
      }
      if (type === "table_column_note") {
        base.table_note = metric.tableNote || "";
        base.columns = (metric.columns || [])
          .filter(column => column.enabled !== false)
          .map(column => ({
            name: column.name,
            description: column.description || "",
            note: column.note || ""
          }));
      }
      if (type === "sql_resultset") {
        base.sql = String(metric.sql || "").slice(0, 1800);
        base.description = metric.description || "";
      }
      if (type === "standard_qa") {
        base.question = metric.question || metric.code || "";
        base.answer = metric.answer || "";
      }
      return base;
    }

    function semanticCatalogForAssistant() {
      const selectedTables = selectedQuestionTables();
      const scopedEntries = metrics.filter(metric => {
        const type = semanticEntryType(metric);
        return (
          isMetricInCurrentKnowledgeBase(metric) &&
          isEntryInQuestionTableScope(metric, selectedTables) &&
          ["business_metric", "logic_text", "result_presentation", "table_column_note", "sql_resultset", "standard_qa"].includes(type)
        );
      });
      const byType = type => scopedEntries
        .filter(metric => semanticEntryType(metric) === type)
        .map(compactSemanticEntryForModel);
      return {
        business_metric: byType("business_metric"),
        logic_text: byType("logic_text"),
        result_presentation: byType("result_presentation"),
        table_column_note: byType("table_column_note"),
        sql_resultset: byType("sql_resultset"),
        standard_qa: byType("standard_qa")
      };
    }

    function isLikelyFollowupQuestion(question) {
      const text = String(question || "").trim();
      if (!text || !assistantTurnState) return false;
      const normalized = normalizeForAgent(text);
      const hasExplicitMetric = metrics.some(metric => (
        semanticEntryType(metric) === "business_metric" &&
        [metric.name, metric.code, ...aliasItems(metric)].filter(Boolean).some(alias => normalized.includes(normalizeForAgent(alias)))
      ));
      const hasExplicitPeriod = /20\d{2}\s*年|20\d{2}\.\d{1,2}|\d{1,2}\s*月/.test(text);
      const followupWords = /(那|再|也|继续|刚才|上面|这个|那个|它|其|同样|一样|换成|改成|按|分|拆|加上|去掉|只看|同比|环比|明细|汇总|呢|吗)$/;
      if (/(那|再|也|继续|刚才|上面|这个|那个|它|其|同样|一样|换成|改成|加上|去掉|只看|同比|环比|明细|汇总)/.test(text)) return true;
      if (followupWords.test(text) && (!hasExplicitMetric || !hasExplicitPeriod)) return true;
      return text.length <= 12 && !hasExplicitMetric;
    }

    function conversationContextForQuestion(question) {
      if (!isLikelyFollowupQuestion(question)) return null;
      return {
        use_only_if_followup: true,
        previous_question: assistantTurnState.question || "",
        previous_answer: assistantTurnState.answer || "",
        selected_metric_keys: assistantTurnState.selectedMetricKeys || [],
        selected_rule_keys: assistantTurnState.selectedRuleKeys || [],
        period: assistantTurnState.period || "",
        dimensions: assistantTurnState.dimensions || "",
        sql: assistantTurnState.sql || "",
        result_columns: assistantTurnState.resultColumns || []
      };
    }

    function semanticPlanFromResult(result) {
      const plan = result?.semanticPlan
        || result?.retrievalPlan?.semantic_plan
        || result?.retrieval_plan?.semantic_plan
        || result?.decision?.semantic_plan
        || null;
      return plan && typeof plan === "object" ? plan : {};
    }

    function semanticPlanTimeText(result) {
      const plan = semanticPlanFromResult(result);
      const time = plan.time;
      if (typeof time === "string" && time.trim()) return time.trim();
      if (time && typeof time === "object") {
        const values = Object.values(time)
          .flat()
          .map(item => String(item || "").trim())
          .filter(Boolean);
        if (values.length) return [...new Set(values)].join("、");
      }
      return sqlPeriodEvidence(result.sqlText, result.signals?.period || "");
    }

    function semanticPlanDimensionText(result) {
      const plan = semanticPlanFromResult(result);
      const dimensions = Array.isArray(plan.dimensions) ? plan.dimensions : [];
      if (dimensions.length) {
        return dimensions
          .map(item => typeof item === "string" ? item : JSON.stringify(item))
          .join("、");
      }
      return sqlDimensionEvidence(result.sqlText, result.signals?.dimensions || []);
    }

    function updateAssistantTurnState(result) {
      assistantTurnState = {

        period: semanticPlanTimeText(result),

    function compactAgentPayload(requestContext) {
      const question = assistantRequestQuestion(requestContext);
      const conversationContext = conversationContextForQuestion(question);
      return {
        question,

          answer_type: "final_answer | sql_needed | clarification_needed | rule_explanation | no_evidence",
          search_plan: [{ type: "standard_qa | business_metric | table_column_note | logic_text | sql_resultset", query: "string", purpose: "string" }],
          decision: {
            intent: "metric_query | dimension_summary | detail_query | rule_explanation | sql_resultset_lookup | unknown",
            selected_metric_key: "string or null",
