    function entrySummary(metric) {
      if (semanticEntryType(metric) === "logic_text") {
        return [
          `Key：${metric.code || "未填写"}`,
          `类型：${semanticTypeLabel(metric)}`,
          `关联表：${relatedTableLabel(metric)}`,
          `注入阶段：${(metric.injectionStages || []).join("、") || "未填写"}`,
          `优先级：${priorityValue(metric)}`,
          "",
          metric.content || "规则内容未填写"
        ].join("\n");
      }
      if (semanticEntryType(metric) === "result_presentation") {
        return [
          `Key：${metric.code || "未填写"}`,
          `类型：${semanticTypeLabel(metric)}`,
          `关联表：${relatedTableLabel(metric)}`,
          `生效位置：${(metric.presentationStages || []).map(value => optionLabel(presentationStageOptions, value)).join("、") || "未填写"}`,
          "",
          metric.content || "展示要求未填写"
        ].join("\n");
      }
      if (semanticEntryType(metric) === "table_column_note") {
        const columns = ensureTableColumnNotes(metric);
        const enabledCount = columns.filter(col => col.enabled !== false).length;
        return [
          `表名：${metric.sourceTable || metric.code || "未填写"}`,
          `类型：${semanticTypeLabel(metric)}`,
          `表描述：${metric.tableDescription || "未填写"}`,
          `启用列：${enabledCount} / ${columns.length}`,
          "",
          "表补充说明：",
          metric.tableNote || "未填写",
          "",
          "列补充说明：",
          columns
            .filter(col => col.note)
            .map(col => `- ${col.name}：${col.note}`)
            .join("\n") || "暂无"
        ].join("\n");
      }
      if (semanticEntryType(metric) === "standard_qa") {
        return [
          `Key：${metric.code || "未填写"}`,
          `类型：${semanticTypeLabel(metric)}`,
          `关联表：${relatedTableLabel(metric)}`,
          "",
          "标准问法：",
          metric.question || "未填写",
          "",
          "标准答案：",
          metric.answer || "未填写"
        ].join("\n");
      }
      if (semanticEntryType(metric) === "sql_resultset") {
        return [
          `Key：${metric.code || "未填写"}`,
          `类型：${semanticTypeLabel(metric)}`,
          `关联表：${relatedTableLabel(metric)}`,
          `解析模式：${metric.resolveMode || "semantic"}`,
          `Embedding 模型：${metric.embeddingModel || "默认 / 不指定"}`,
          "",
          "描述：",
          metric.description || "未填写",
          "",
          "SQL：",
          metric.sql || "未填写"
        ].join("\n");
      }
      const lines = [
        `Key：${metric.code || "未填写"}`,
        `类型：${semanticTypeLabel(metric)}`,
        ...(semanticEntryType(metric) === "business_metric" ? [`指标类型：${metricTypeLabel(metric)}`] : []),
        `名称：${metric.name || "未填写"}`,
        ""
      ];
      lines.push(`关联表：${metric.sourceTable || "未填写"}`);
      if (metric.calculationType === "derived") {
        const deps = ensureDerivedDependencies(metric);
        lines.push(`计算公式：${metric.expression || "未填写"}`);
        lines.push("依赖指标：");
        lines.push(deps.length
          ? deps.map(dep => `- ${dep.metricKey}（计算引用：${dep.variable || dep.metricKey}，${dependencyPeriodSummary(dep)}）${dep.note ? `：${dep.note}` : ""}`).join("\n")
          : "未填写");
      } else {
        lines.push(`统计结果：${resultFormula(metric) || "未填写"}`);
        lines.push("过滤范围：");
        lines.push(filterSqlText(metric) || "未配置");
      }
      return lines.join("\n");
    }

    function renderEntryModalPreview(metric) {
      if (entryPreviewMode === "json") {
        entryModalPreviewEl.textContent = JSON.stringify(structuredPreview(metric), null, 2);
      } else if (entryPreviewMode === "sql") {
        entryModalPreviewEl.textContent = sqlFor(metric);
      } else {
        entryModalPreviewEl.textContent = entrySummary(metric);
      }
    }

    function setJsonPreviewVisible(visible) {
      entryPreviewVisible = visible;
      entryPreviewMode = "json";
      entryModalPreviewPanelEl.classList.toggle("open", visible);
      toggleJsonPreviewEl.textContent = visible ? "隐藏 JSON" : "查看 JSON";
      if (visible) {
        renderEntryModalPreview(metrics[modalIndex]);
        entryModalPreviewPanelEl.scrollIntoView({ block: "nearest" });
      }
    }

    function applyModalValue(metric, key, value) {
      if (key === "semanticType") {
        const defaultTable = primaryKnowledgeTable();
        metric.semanticType = value;
        metric.modelId = metric.modelId || Number(selectedKnowledgeBaseId);
        if (value === "business_metric") {
          metric.sourceTable = metric.sourceTable || defaultTable;
          metric.measureField = metric.measureField || defaultMeasureFieldForTable(metric.sourceTable);
          metric.aggregation = metric.aggregation || "SUM";
        }
        if (value === "logic_text") {
          metric.relatedTables = relatedTables(metric);
          metric.content = metric.content || "";
          metric.injectionStages = metric.injectionStages || [];
          metric.priority = priorityValue(metric);
        }
        if (value === "result_presentation") {
          metric.relatedTables = relatedTables(metric);
          metric.content = metric.content || "";
          metric.presentationStages = metric.presentationStages || ["final_answer", "result_table"];
        }
        if (value === "standard_qa") {
          metric.relatedTables = relatedTables(metric);
          metric.question = metric.question || "";
          metric.answer = metric.answer || "";
        }
        if (value === "table_column_note") {
          metric.sourceTable = metric.sourceTable || defaultTable;
          metric.code = metric.sourceTable;
          metric.name = metric.sourceTable;
          metric.tableDescription = metric.tableDescription || tableCatalog[metric.sourceTable]?.label || metric.sourceTable;
          metric.tableNote = metric.tableNote || tableNoteDefaults[metric.sourceTable] || "";
          metric.columns = metric.columns || [];
        }
        if (value === "sql_resultset") {
          metric.relatedTables = relatedTables(metric);
          metric.sql = metric.sql || "";
          metric.description = metric.description || "";
          metric.resolveMode = metric.resolveMode || "semantic";
          metric.extensionParams = metric.extensionParams || [];
        }
        return "rerender";
      }
      if (key === "metricKind") {
        const defaultTable = primaryKnowledgeTable();
        if (value === "derived") {
          metric.calculationType = "derived";
          metric.sourceTable = metric.sourceTable || defaultTable;
          metric.dependencies = metric.dependencies || [];
          metric.dependencySpecs = metric.dependencySpecs || metric.dependencies || [];
          metric.expression = metric.expression || "";
        } else {
          delete metric.calculationType;
          metric.sourceTable = metric.sourceTable || defaultTable;
          metric.measureField = metric.measureField || defaultMeasureFieldForTable(metric.sourceTable);
          metric.aggregation = metric.aggregation || "SUM";
        }
        return "rerender";
      }
      if (key === "sourceTable") {
        if (semanticEntryType(metric) === "table_column_note") {
          metric.sourceTable = value;
          metric.code = value;
          metric.name = value;
          metric.tableDescription = tableCatalog[value]?.label || value;
          metric.tableNote = tableNoteDefaults[value] || "";
          metric.columns = [];
          return "rerender";
        }
        metric.sourceTable = value;
        const fields = rawMeasureFieldOptions(metric).map(item => typeof item === "string" ? { value: item } : item);
        if (!fields.some(item => item.value === metric.measureField)) metric.measureField = fields[0]?.value || "";
        return "rerender";
      }
      if (key === "filterSql") {
        metric.filterMode = "expression";
        metric.filterExpression = value;
        return "preview";
      }
      if (key === "priority") {
        metric.priority = Number(value || 0);
        return "preview";
      }
      if (key === "resultMultiplier") {
        const number = Number(String(value || "").trim());
        metric.resultMultiplier = Number.isFinite(number) ? number : 1;
        return "preview";
      }
      if (key === "extensionParamsText") {
        metric.extensionParams = value.split(/[、,，\s]+/).map(item => item.trim()).filter(Boolean);
        return "preview";
      }
      if (key === "maxRows" || key === "maxBytes" || key === "timeoutSeconds") {
        metric[key] = value === "" ? "" : Number(value);
        return "preview";
      }
      if (key === "code" && ["logic_text", "result_presentation", "standard_qa", "sql_resultset"].includes(semanticEntryType(metric))) {
        metric.code = value;
        metric.name = value;
        return "preview";
      }
      metric[key] = value;
      return "preview";
    }

    function bindEntryModalEvents() {
      const closeFieldPickers = except => {
        entryModalFormEl.querySelectorAll("[data-field-picker]").forEach(picker => {
          if (picker === except) return;
          picker.classList.remove("open");
          const menu = picker.querySelector("[data-field-picker-menu]");
          if (menu) menu.hidden = true;
        });
      };

      entryModalFormEl.querySelectorAll("[data-modal-key]").forEach(el => {
        const sync = () => {
          const metric = metrics[modalIndex];
          const action = applyModalValue(metric, el.dataset.modalKey, el.value);
          renderList();
          if (action === "rerender") renderEntryModal();
          else renderEntryModalPreview(metric);
        };
        el.addEventListener("input", sync);
        el.addEventListener("change", sync);
      });
      entryModalFormEl.querySelectorAll("[data-field-picker]").forEach(picker => {
        const toggle = picker.querySelector("[data-field-picker-toggle]");
        const menu = picker.querySelector("[data-field-picker-menu]");
        const search = picker.querySelector("[data-field-picker-search]");
        const hidden = picker.querySelector("[data-modal-key]");
        const options = [...picker.querySelectorAll("[data-field-picker-option]")];
        const setOpen = open => {
          if (open) closeSearchableSelects();
          closeFieldPickers(open ? picker : null);
          picker.classList.toggle("open", open);
          if (menu) menu.hidden = !open;
          if (open && search) {
            search.value = "";
            options.forEach(option => { option.hidden = false; });
            search.focus();
          }
        };
        toggle?.addEventListener("click", () => setOpen(!picker.classList.contains("open")));
        search?.addEventListener("input", () => {
          const keyword = normalizeForAgent(search.value);
          options.forEach(option => {
            const haystack = normalizeForAgent(option.textContent || "");
            option.hidden = keyword && !haystack.includes(keyword);
          });
        });
        options.forEach(option => {
          option.addEventListener("click", () => {
            const value = option.dataset.fieldPickerOption || "";
            if (hidden) {
              hidden.value = value;
              hidden.dispatchEvent(new Event("input", { bubbles: true }));
              hidden.dispatchEvent(new Event("change", { bubbles: true }));
            }
            if (toggle) toggle.textContent = value || "请选择字段";
            options.forEach(item => item.classList.toggle("active", item === option));
            setOpen(false);
          });
        });
      });
      entryModalFormEl.querySelectorAll("[data-column-note-index]").forEach(el => {
        const syncColumn = () => {
          const metric = metrics[modalIndex];
          const index = Number(el.dataset.columnNoteIndex);
          const key = el.dataset.columnNoteKey;
          metric.columns = ensureTableColumnNotes(metric);
          if (!metric.columns[index]) return;
          metric.columns[index][key] = key === "enabled" ? el.checked : el.value;
          renderList();
          renderEntryModalPreview(metric);
        };
        el.addEventListener("input", syncColumn);
        el.addEventListener("change", syncColumn);
      });
      entryModalFormEl.querySelectorAll("[data-column-search]").forEach(el => {
        el.addEventListener("input", () => {
          const keyword = el.value.trim().toLowerCase();
          entryModalFormEl.querySelectorAll("[data-column-row]").forEach(row => {
            row.style.display = row.dataset.columnSearchText.includes(keyword) ? "" : "none";
          });
        });
      });
      entryModalFormEl.querySelectorAll("[data-add-note-column]").forEach(select => {
        select.addEventListener("change", () => {
          if (!select.value) return;
          const metric = metrics[modalIndex];
          const column = columnsFromCatalog(metric.sourceTable).find(item => item.name === select.value);
          if (!column) return;
          metric.columns = ensureTableColumnNotes(metric);
          if (!metric.columns.some(item => item.name === column.name)) metric.columns.push(column);
          renderEntryModal();
          renderList();
        });
      });
      entryModalFormEl.querySelectorAll("[data-remove-note-column]").forEach(btn => {
        btn.addEventListener("click", () => {
          const metric = metrics[modalIndex];
          const index = Number(btn.dataset.removeNoteColumn);
          metric.columns = ensureTableColumnNotes(metric).filter((_, rowIndex) => rowIndex !== index);
          renderEntryModal();
          renderList();
        });
      });
      entryModalFormEl.querySelectorAll("[data-alias-index]").forEach(el => {
        el.addEventListener("input", () => {
          const metric = metrics[modalIndex];
          const aliases = Array.from(entryModalFormEl.querySelectorAll("[data-alias-index]"))
            .map(input => input.value.trim());
          metric.aliasDrafts = aliases;
          metric.aliases = aliases.filter(Boolean).join("、");
          renderList();
          renderEntryModalPreview(metric);
        });
      });
      entryModalFormEl.querySelectorAll("[data-add-alias]").forEach(btn => {
        btn.addEventListener("click", () => {
          const metric = metrics[modalIndex];
          const aliases = Array.from(entryModalFormEl.querySelectorAll("[data-alias-index]"))
            .map(input => input.value.trim());
          aliases.push("");
          metric.aliasDrafts = aliases;
          metric.aliases = aliases.filter(Boolean).join("、");
          renderEntryModal();
        });
      });
      entryModalFormEl.querySelectorAll("[data-remove-alias]").forEach(btn => {
        btn.addEventListener("click", () => {
          const metric = metrics[modalIndex];
          const removeIndex = Number(btn.dataset.removeAlias);
          const aliases = Array.from(entryModalFormEl.querySelectorAll("[data-alias-index]"))
            .map(input => input.value.trim());
          aliases.splice(removeIndex, 1);
          metric.aliasDrafts = aliases.length ? aliases : [""];
          metric.aliases = aliases.filter(Boolean).join("、");
          renderEntryModal();
          renderList();
        });
      });
      entryModalFormEl.querySelectorAll("[data-derived-dep-index]").forEach(el => {
        const syncDependency = () => {
          const metric = metrics[modalIndex];
          const deps = ensureDerivedDependencies(metric);
          const index = Number(el.dataset.derivedDepIndex);
          const key = el.dataset.derivedDepKey;
          const dep = deps[index];
          if (!dep) return;
          const previousPeriodRole = dep.periodRole;
          dep[key] = el.value;
          if (key === "metricKey") {
            dep.variable = defaultDependencyVariable(dep.metricKey, dep.periodRole);
          }
          if (key === "periodRole") {
            dep.variable = defaultDependencyVariable(dep.metricKey, dep.periodRole);
            if (dep.periodRole === "custom_expression" && !dep.periodExpression) {
              dep.periodExpression = defaultPeriodExpression("custom_expression");
            }
          }
          metric.dependencySpecs = deps;
          metric.dependencies = deps.map(item => item.metricKey).filter(Boolean);
          renderList();
          if (key === "metricKey" || key === "periodRole") renderEntryModal();
          else renderEntryModalPreview(metric);
        };
        el.addEventListener("input", syncDependency);
        el.addEventListener("change", syncDependency);
      });
      entryModalFormEl.querySelectorAll("[data-period-template]").forEach(btn => {
        btn.addEventListener("click", () => {
          const metric = metrics[modalIndex];
          const deps = ensureDerivedDependencies(metric);
          const index = Number(btn.dataset.periodTemplateIndex);
          const dep = deps[index];
          if (!dep) return;
          dep.periodRole = "custom_expression";
          dep.periodExpression = btn.dataset.periodTemplate || defaultPeriodExpression("custom_expression");
          metric.dependencySpecs = deps;
          metric.dependencies = deps.map(item => item.metricKey).filter(Boolean);
          renderEntryModal();
          renderList();
        });
      });
      entryModalFormEl.querySelectorAll("[data-add-derived-dependency]").forEach(btn => {
        btn.addEventListener("click", () => {
          const metric = metrics[modalIndex];
          const options = businessMetricOptions(metric.code);
          const metricKey = options[0]?.value || "";
          metric.dependencySpecs = ensureDerivedDependencies(metric);
          if (metricKey) {
            metric.dependencySpecs.push(normalizeDependencySpec({
              metricKey,
              variable: defaultDependencyVariable(metricKey),
              periodRole: "current_period"
            }));
          }
          metric.dependencies = metric.dependencySpecs.map(item => item.metricKey).filter(Boolean);
          renderEntryModal();
          renderList();
        });
      });
      entryModalFormEl.querySelectorAll("[data-remove-derived-dependency]").forEach(btn => {
        btn.addEventListener("click", () => {
          const metric = metrics[modalIndex];
          const removeIndex = Number(btn.dataset.removeDerivedDependency);
          metric.dependencySpecs = ensureDerivedDependencies(metric).filter((_, index) => index !== removeIndex);
          metric.dependencies = metric.dependencySpecs.map(item => item.metricKey).filter(Boolean);
          renderEntryModal();
          renderList();
        });
      });
      entryModalFormEl.querySelectorAll("[data-token-add-key]").forEach(select => {
        select.addEventListener("change", () => {
          if (!select.value) return;
          const metric = metrics[modalIndex];
          const key = select.dataset.tokenAddKey;
          metric[key] = Array.isArray(metric[key]) ? metric[key] : [];
          if (!metric[key].includes(select.value)) metric[key].push(select.value);
          renderEntryModal();
          renderList();
        });
      });
      entryModalFormEl.querySelectorAll("[data-token-remove-key]").forEach(btn => {
        btn.addEventListener("click", () => {
          const metric = metrics[modalIndex];
          const key = btn.dataset.tokenRemoveKey;
          metric[key] = (metric[key] || []).filter(value => value !== btn.dataset.tokenValue);
          renderEntryModal();
          renderList();
        });
      });
      entryModalFormEl.querySelectorAll("[data-modal-filter-mode]").forEach(btn => {
        btn.addEventListener("click", () => {
          const metric = metrics[modalIndex];
          const nextMode = btn.dataset.modalFilterMode;
          if (nextMode === "simple") {
            const parsedRows = parseSimpleFilterExpression(filterSqlText(metric));
            if (parsedRows === null) return;
            metric.matchRules = [];
            metric.filters = parsedRows;
            metric.filterExpression = "";
            metric.filterMode = "simple";
            renderEntryModal();
            renderList();
            return;
          }
          if (nextMode === "expression" && !metric.filterExpression) {
            metric.filterExpression = expressionFromFilters(metric);
          }
          metric.filterMode = nextMode;
          renderEntryModal();
        });
      });
      entryModalFormEl.querySelectorAll("[data-modal-filter-expression]").forEach(el => {
        el.addEventListener("input", () => {
          const metric = metrics[modalIndex];
          metric.filterMode = "expression";
          metric.filterExpression = el.value;
          const preview = entryModalFormEl.querySelector("[data-filter-sql-preview]");
          if (preview) preview.textContent = filterSqlText(metric) || "-- 暂无过滤条件";
          renderEntryModalPreview(metric);
        });
      });
      entryModalFormEl.querySelectorAll("[data-modal-filter-index]").forEach(el => {
        const syncFilter = () => {
          const metric = metrics[modalIndex];
          const index = Number(el.dataset.modalFilterIndex);
          const extraIndex = el.dataset.modalFilterExtraIndex === "" ? undefined : Number(el.dataset.modalFilterExtraIndex);
          updateModalFilterRow(metric, el.dataset.modalFilterOrigin, index, extraIndex, el.dataset.filterField, el.value);
          metric.filterMode = "simple";
          renderEntryModal();
          renderList();
        };
        el.addEventListener("change", syncFilter);
        if (el.tagName === "INPUT") el.addEventListener("blur", syncFilter);
      });
      entryModalFormEl.querySelectorAll("[data-add-filter]").forEach(btn => {
        btn.addEventListener("click", () => {
          const metric = metrics[modalIndex];
          const firstField = fieldOptions(metric.sourceTable)[0]?.value || "";
          metric.filters = metric.filters || [];
          metric.filters.push({ connector: modalFilterRows(metric).length ? "AND" : "", field: firstField, op: "=", value: "", note: "" });
          metric.filterMode = "simple";
          renderEntryModal();
        });
      });
      entryModalFormEl.querySelectorAll("[data-remove-filter-origin]").forEach(btn => {
        btn.addEventListener("click", () => {
          const metric = metrics[modalIndex];
          const index = Number(btn.dataset.removeFilterIndex);
          const extraIndex = btn.dataset.removeFilterExtraIndex === "" ? undefined : Number(btn.dataset.removeFilterExtraIndex);
          removeModalFilterRow(metric, btn.dataset.removeFilterOrigin, index, extraIndex);
          metric.filterMode = "simple";
          renderEntryModal();
          renderList();
        });
      });
      enhanceSearchableSelects(entryModalFormEl);
    }

    function openEntryModal(index = selectedIndex) {
      modalIndex = index;
      selectedIndex = index;
      entryPreviewMode = "json";
      entryPreviewVisible = false;
      renderList();
      renderEntryModal();
      setJsonPreviewVisible(false);
      const code = metrics[index]?.code || "";
      if (semanticEntryType(metrics[index]) === "table_column_note") {
        entryModalTitleEl.textContent = `配置表和列补充说明 - ${metrics[index].sourceTable || code || "未选择表"}`;
      } else {
        entryModalTitleEl.textContent = code.startsWith("new_metric_") || code.startsWith("new_logic_text_") || code.startsWith("new_result_presentation_") || code.startsWith("new_standard_qa_") || code.startsWith("new_sql_resultset_") ? "新增语义条目" : "编辑语义条目";
      }
      entryModalEl.classList.add("open");
      entryModalEl.setAttribute("aria-hidden", "false");
    }

    function closeEntryModal() {
      entryModalEl.classList.remove("open");
      entryModalEl.setAttribute("aria-hidden", "true");
      render();
    }

    function sqlFor(metric) {
      if (semanticEntryType(metric) === "logic_text") {
        return [
          `-- 业务规则：${metric.code}`,
          "-- 这类条目不直接生成 SQL，会在指定阶段注入给 Agent。",
          `-- 注入阶段：${(metric.injectionStages || []).join(", ") || "待填写"}`,
          `-- 优先级：${priorityValue(metric)}`,
          "",
          metric.content || "规则内容待填写"
        ].join("\n");
      }
      if (semanticEntryType(metric) === "result_presentation") {
        return [
          `-- 结果展示要求：${metric.code}`,
          "-- 这类条目不直接生成 SQL，用于约束最终回答、结果表格、图表和导出展示。",
          `-- 生效位置：${(metric.presentationStages || []).join(", ") || "待填写"}`,
          "",
          metric.content || "展示要求待填写"
        ].join("\n");
      }
      if (semanticEntryType(metric) === "table_column_note") {
        return [
          `-- 表和列补充说明：${metric.sourceTable || metric.code}`,
          "-- 这类条目不直接生成 SQL，用于帮助 Agent 理解表含义、字段含义和检索范围。",
          "",
          metric.tableNote || "表补充说明待填写"
        ].join("\n");
      }
      if (semanticEntryType(metric) === "standard_qa") {
        return [
          `-- 标准问答：${metric.code}`,
          "-- 这类条目不直接生成 SQL，用于命中已验证问法或固定回答口径。",
          "",
          `-- 标准问法：${metric.question || "待填写"}`,
          `-- 标准答案：${metric.answer || "待填写"}`
        ].join("\n");
      }
      if (semanticEntryType(metric) === "sql_resultset") {
        return metric.sql || "-- SQL结果集待填写";
      }
      if (metric.calculationType === "derived") {
        const deps = ensureDerivedDependencies(metric);
        return [
          `-- 指标：${metric.name}`,
          "-- 先按各依赖指标自己的口径取数，再执行下面公式",
          "-- 依赖取数口径：",
          ...(deps.length
            ? deps.map(dep => `-- ${dep.metricKey} AS ${dep.variable || dep.metricKey}：${dependencyPeriodSummary(dep)}${dep.note ? `，${dep.note}` : ""}`)
            : ["-- 待填写"]),
          "",
          `SELECT`,
          `  ${metric.expression || "公式待填写"} AS ${metric.name || "指标结果"}`,
          `FROM expanded_metric_results;`,
        ].join("\n");
      }
      const rules = ensureMatchRules(metric);
      if (metric.implementation === "bpc_account") {
        const baseFilters = sqlWhereAppend(filterSqlText(metric));
        const components = rules.map((row, index) => {
          const sign = Number(row.resultMultiplier || 1);
          const extra = row.extraFilter && row.extraFilter !== "无" ? ` AND ${row.extraFilter}` : "";
          const matchField = row.matchField || "account_path";
          const matchValue = row.matchValue;
          const matchType = normalizeMatchType(row.matchType);
          const condition = conditionFor(matchField, matchType, matchValue);
          const direction = (row.operator === "-" ? -1 : 1) * sign;
          const prefix = direction < 0 ? "- " : index === 0 ? "" : "+ ";
          const multiplier = Math.abs(direction);
          const factor = multiplier === 1 ? "" : `${multiplier} * `;
          return `  ${prefix}${factor}SUM(CASE WHEN ${condition}${extra} THEN ${metric.measureField} ELSE 0 END)`;
        }).join("\n");
        return `-- 指标：${metric.name}
SELECT
${components} AS ${metric.name}
FROM ${metric.sourceTable}
WHERE ${metric.timeField} = '2025.12'
${baseFilters};`;
      }

      if (metric.implementation === "expense_subject") {
        const field = rules[0]?.matchField || "racct";
        const codes = rules.map(r => `'${r.matchValue}'`).join(", ");
        const detailFields = metric.outputFields.map(row => `  ${row[0]} AS ${row[1]}`).join(",\n");
        return `-- 表1：汇总信息
SELECT
  ${metric.currencyField} AS 总账货币,
  SUM(${metric.measureField}) AS 总账金额合计
FROM ${metric.sourceTable}
WHERE gjahr = '2025'
  AND ${field} IN (${codes})
GROUP BY ${metric.currencyField};

-- 表2：明细信息
SELECT
${detailFields}
FROM ${metric.sourceTable}
WHERE gjahr = '2025'
  AND ${field} IN (${codes});`;
      }

      const conditions = rules.map(r => {
        return `  AND ${conditionFor(r.matchField, r.matchType, r.matchValue)}`;
      }).join("\n");
      const scopeFilters = sqlWhereAppend(filterSqlText(metric));
      const selectExpression = resultFormula(metric);
      return `-- 指标：${metric.name}
SELECT
  ${selectExpression} AS ${metric.name}
FROM ${metric.sourceTable}
WHERE 1 = 1
${scopeFilters}
${conditions};

-- 注意：${rules[0]?.note || "口径需业务确认"}`;
    }

    function metricKindForJson(metric) {
      return metric.calculationType === "derived" ? "derived" : "base";
    }

    function structuredPreview(metric) {
      if (semanticEntryType(metric) === "logic_text") {
        return {
          entry: {
            key: metric.code,
            type: "logic_text",
            tables: relatedTables(metric)
          },
          spec: {
            content: metric.content || "",
            injection_stages: metric.injectionStages || [],
            priority: priorityValue(metric)
          }
        };
      }
      if (semanticEntryType(metric) === "result_presentation") {
        return {
          entry: {
            key: metric.code,
            type: "result_presentation",
            tables: relatedTables(metric)
          },
          spec: {
            content: metric.content || "",
            applies_to: metric.presentationStages || ["final_answer", "result_table"]
          }
        };
      }
      if (semanticEntryType(metric) === "table_column_note") {
        return {
          entry: {
            key: metric.sourceTable || metric.code,
            type: "table_column_note",
            table: metric.sourceTable || metric.code
          },
          spec: {
            table_description: metric.tableDescription || "",
            table_note: metric.tableNote || "",
            columns: ensureTableColumnNotes(metric).map(column => ({
              name: column.name,
              description: column.description || "",
              note: column.note || "",
              enabled: column.enabled !== false
            }))
          }
        };
      }
      if (semanticEntryType(metric) === "standard_qa") {
        return {
          entry: {
            key: metric.code,
            type: "standard_qa",
            tables: relatedTables(metric)
          },
          spec: {
            question: metric.question || "",
            answer: metric.answer || ""
          }
        };
      }
      if (semanticEntryType(metric) === "sql_resultset") {
        const spec = {
          description: metric.description || "",
          resolve_mode: metric.resolveMode || "semantic",
          sql: metric.sql || ""
        };
        if (metric.embeddingModel) {
          spec.retrieval = {
            embedding_model: metric.embeddingModel,
            enabled: true
          };
        }
        if (metric.maxRows !== "" && metric.maxRows != null) spec.max_rows = Number(metric.maxRows);
        if (metric.maxBytes !== "" && metric.maxBytes != null) spec.max_bytes = Number(metric.maxBytes);
        if (metric.timeoutSeconds !== "" && metric.timeoutSeconds != null) spec.timeout_seconds = Number(metric.timeoutSeconds);
        if (metric.extensionSql) spec.extension_sql = metric.extensionSql;
        if ((metric.extensionParams || []).length) spec.extension_params = metric.extensionParams;
        return {
          entry: {
            key: metric.code,
            type: "sql_resultset",
            tables: relatedTables(metric)
          },
          spec
        };
      }
      const entry = {
        key: metric.code,
        type: semanticEntryType(metric),
        metric_kind: semanticEntryType(metric) === "business_metric"
          ? metricKindForJson(metric)
          : null,
        name: metric.name,
        aliases: aliasItems(metric)
      };
      if (metric.calculationType === "derived") {
        const dependencies = ensureDerivedDependencies(metric);
        return {
          entry,
          metric: {
            source_table: metric.sourceTable,
            expression: metric.expression,
            dependencies: dependencies.map(dependencySpecPayload)
          }
        };
      }
      const preview = {
        entry,
        metric: {
          source_table: metric.sourceTable,
          measure: {
            field: metric.measureField,
            aggregation: normalizedAggregation(metric),
            result_factor: metricResultMultiplier(metric)
          }
        },
        scope_filter: filterStructured(metric)
      };
      return preview;
    }

    function semanticEntryKeyForSave(metric) {
      if (semanticEntryType(metric) === "table_column_note") return metric.sourceTable || metric.code;
      return metric.code;
    }

    function semanticEntryTablesForSave(metric) {
      const type = semanticEntryType(metric);
      if (type === "table_column_note") return [metric.sourceTable || metric.code].filter(Boolean);
      if (type === "business_metric") {
        return [metric.sourceTable || relatedTables(metric)[0] || primaryKnowledgeTable()].filter(Boolean);
      }
      return relatedTables(metric);
    }

    function semanticEntrySpecForSave(metric) {
      const type = semanticEntryType(metric);
      if (type === "logic_text" || type === "result_presentation" || type === "table_column_note" || type === "standard_qa" || type === "sql_resultset") {
        return structuredPreview(metric).spec;
      }
      if (metric.calculationType === "derived") {
        const dependencies = ensureDerivedDependencies(metric);
        return {
          metric_kind: "derived",
          name: metric.name || "",
          aliases: aliasItems(metric),
          metric: {
            source_table: metric.sourceTable || primaryKnowledgeTable() || "",
            expression: metric.expression || "",
            dependencies: dependencies.map(dependencySpecPayload)
          }
        };
      }
      return {
        metric_kind: "base",
        name: metric.name || "",
        aliases: aliasItems(metric),
        metric: {
          source_table: metric.sourceTable || primaryKnowledgeTable() || "",
          measure: {
            field: metric.measureField || "",
            aggregation: normalizedAggregation(metric),
            result_factor: metricResultMultiplier(metric)
          }
        },
        scope_filter: filterStructured(metric)
      };
    }

    function semanticEntryPayloadForSave(metric) {
      return {
        id: metric.id || null,
        model_id: Number(metric.modelId || selectedKnowledgeBaseId),
        kind: semanticEntryType(metric),
        key_name: semanticEntryKeyForSave(metric),
        tables: semanticEntryTablesForSave(metric),
        spec: semanticEntrySpecForSave(metric)
      };
    }

    async function saveSemanticEntry(metric) {
      const response = await fetch("/api/semantic-entry-save", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(semanticEntryPayloadForSave(metric))
      });
      const payload = await response.json().catch(() => ({}));
      if (!response.ok || !payload.ok) throw new Error(payload.error || "保存失败");
      return payload.entry;
    }

    async function deleteSemanticEntry(metric) {
      if (!metric?.id) return;
      const response = await fetch("/api/semantic-entry-delete", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ id: metric.id })
      });
      const payload = await response.json().catch(() => ({}));
      if (!response.ok || !payload.ok) throw new Error(payload.error || "删除失败");
    }

    function applySavedEntry(metric, entry) {
      if (!entry) return;
      metric.id = Number(entry.id) || metric.id || null;
      metric.modelId = Number(entry.model_id) || metric.modelId || Number(selectedKnowledgeBaseId);
      metric.code = entry.key_name || metric.code;
      metric.relatedTables = normalizeDbTables(entry.tables || []).length
        ? normalizeDbTables(entry.tables || [])
        : semanticEntryTablesForSave(metric);
      if (semanticEntryType(metric) === "table_column_note") {
        metric.sourceTable = metric.code;
        metric.name = metric.code;
      }
      metric.updatedAt = entry.updated_at || "刚刚";
    }

    async function saveCurrentEntryModal() {
      const metric = metrics[modalIndex];
      if (!metric) return;
      const button = document.getElementById("confirmEntryModal");
      const originalText = button.textContent;
      button.disabled = true;
      button.textContent = "保存中";
      try {
        const entry = await saveSemanticEntry(metric);
        applySavedEntry(metric, entry);
        renderList();
        closeEntryModal();
      } catch (error) {
        window.alert(`保存失败：${error.message || error}`);
      } finally {
        button.disabled = false;
        button.textContent = originalText;
      }
    }

    async function deleteEntryAt(index) {
      const metric = metrics[index];
      if (!metric) return;
      const key = semanticEntryKeyForSave(metric) || metric.name || "当前条目";
      if (!window.confirm(`确认删除「${key}」？`)) return;
      try {
        await deleteSemanticEntry(metric);
        metrics.splice(index, 1);
        selectedIndex = visibleEntryIndexes()[0] ?? 0;
        render();
      } catch (error) {
        window.alert(`删除失败：${error.message || error}`);
      }
    }

    function validationChecks(metric) {
      if (!metric) return [{ level: "bad", text: "当前分类暂无可校验条目" }];
      if (semanticEntryType(metric) === "logic_text") {
        return [
          {
            level: metric.code ? "ok" : "bad",
            text: metric.code ? "Key 已填写" : "Key 需要填写"
          },
          {
            level: relatedTables(metric).length ? "ok" : "warn",
            text: relatedTables(metric).length ? "已配置关联表" : "建议配置关联表"
          },
          {
            level: metric.content ? "ok" : "bad",
            text: metric.content ? "规则内容已填写" : "规则内容需要填写"
          },
          {
            level: (metric.injectionStages || []).length ? "ok" : "bad",
            text: (metric.injectionStages || []).length ? "已配置注入阶段" : "注入阶段需要填写"
          }
        ];
      }
      if (semanticEntryType(metric) === "result_presentation") {
        return [
          {
            level: metric.code ? "ok" : "bad",
            text: metric.code ? "Key 已填写" : "Key 需要填写"
          },
          {
            level: relatedTables(metric).length ? "ok" : "warn",
            text: relatedTables(metric).length ? "已配置关联表" : "建议配置关联表"
          },
          {
            level: metric.content ? "ok" : "bad",
            text: metric.content ? "展示要求已填写" : "展示要求需要填写"
          },
          {
            level: (metric.presentationStages || []).length ? "ok" : "bad",
            text: (metric.presentationStages || []).length ? "已配置生效位置" : "生效位置需要填写"
          }
        ];
      }
      if (semanticEntryType(metric) === "table_column_note") {
        const columns = ensureTableColumnNotes(metric);
        const enabledColumns = columns.filter(column => column.enabled !== false);
        return [
          {
            level: metric.sourceTable ? "ok" : "bad",
            text: metric.sourceTable ? "表名已填写" : "表名需要填写"
          },
          {
            level: metric.tableDescription ? "ok" : "warn",
            text: metric.tableDescription ? "表描述已填写" : "建议填写表描述"
          },
          {
            level: metric.tableNote ? "ok" : "warn",
            text: metric.tableNote ? "表补充说明已填写" : "建议补充表使用场景"
          },
          {
            level: columns.length ? "ok" : "warn",
            text: columns.length ? "已添加列补充说明" : "尚未添加列补充说明"
          },
          {
            level: !columns.length || enabledColumns.length ? "ok" : "warn",
            text: !columns.length || enabledColumns.length ? "列启用状态正常" : "已添加的列均未启用"
          }
        ];
      }
      if (semanticEntryType(metric) === "standard_qa") {
        return [
          {
            level: metric.code ? "ok" : "bad",
            text: metric.code ? "Key 已填写" : "Key 需要填写"
          },
          {
            level: relatedTables(metric).length ? "ok" : "warn",
            text: relatedTables(metric).length ? "已配置关联表" : "建议配置关联表"
          },
          {
            level: metric.question ? "ok" : "bad",
            text: metric.question ? "标准问法已填写" : "标准问法需要填写"
          },
          {
            level: metric.answer ? "ok" : "bad",
            text: metric.answer ? "标准答案已填写" : "标准答案需要填写"
          }
        ];
      }
      if (semanticEntryType(metric) === "sql_resultset") {
        const sqlText = String(metric.sql || "").trim();
        const isSelect = /^select\b/i.test(sqlText);
        return [
          {
            level: metric.code ? "ok" : "bad",
            text: metric.code ? "Key 已填写" : "Key 需要填写"
          },
          {
            level: relatedTables(metric).length ? "ok" : "warn",
            text: relatedTables(metric).length ? "已配置关联表" : "建议配置关联表"
          },
          {
            level: sqlText ? (isSelect ? "ok" : "bad") : "bad",
            text: sqlText ? (isSelect ? "SQL 是 SELECT 语句" : "SQL 只能填写 SELECT 语句") : "SQL 需要填写"
          },
          {
            level: metric.description ? "ok" : "warn",
            text: metric.description ? "结果集描述已填写" : "建议补充结果集描述"
          },
          {
            level: metric.resolveMode ? "ok" : "bad",
            text: metric.resolveMode ? "解析模式已配置" : "解析模式需要填写"
          }
        ];
      }
      const checks = [
        {
          level: metric.name && metric.code ? "ok" : "bad",
          text: metric.name && metric.code ? "指标身份完整" : "指标名称和编码需要补齐"
        },
        {
          level: metric.aliases ? "ok" : "warn",
          text: metric.aliases ? "已配置别名" : "建议补充常见问法别名"
        }
      ];

      if (metric.calculationType === "derived") {
        const deps = ensureDerivedDependencies(metric);
        checks.push({
          level: metric.expression ? "ok" : "bad",
          text: metric.expression ? "已配置计算公式" : "缺少计算公式"
        });
        checks.push({
          level: deps.length ? "ok" : "bad",
          text: deps.length ? "已配置依赖指标" : "缺少依赖指标"
        });
        checks.push({
          level: deps.every(dep => dep.variable) ? "ok" : "bad",
          text: deps.every(dep => dep.variable) ? "计算引用已配置" : "计算引用需要填写"
        });
        checks.push({
          level: deps.every(dep => !dep.variable || String(metric.expression || "").includes(dep.variable)) ? "ok" : "warn",
          text: deps.every(dep => !dep.variable || String(metric.expression || "").includes(dep.variable)) ? "公式已引用计算引用" : "部分计算引用未出现在公式中"
        });
        return checks;
      }

      checks.push({
        level: metric.sourceTable ? "ok" : "bad",
        text: metric.sourceTable ? "已指定来源表" : "缺少来源表"
      });
      checks.push({
        level: metric.measureField && !metric.measureField.includes("待确认") ? "ok" : "bad",
        text: metric.measureField && !metric.measureField.includes("待确认") ? "已指定聚合字段" : "聚合字段需要确认"
      });
      checks.push({
        level: filterSqlText(metric) ? "ok" : "warn",
        text: filterSqlText(metric) ? "过滤范围已生成" : "未配置过滤范围"
      });
      return checks;
    }

    function render() {
      renderCategoryChrome();
      renderList();
      enhanceSearchableSelects(document);
    }

    document.querySelectorAll(".semantic-menu [data-entry-type]").forEach(btn => {
      btn.addEventListener("click", () => {
        activeSemanticType = btn.dataset.entryType;
        document.getElementById("search").value = "";
        selectedIndex = visibleEntryIndexes()[0] ?? 0;
        render();
      });
    });

    knowledgeBaseSelectEl?.addEventListener("change", event => {
      selectedKnowledgeBaseId = Number(event.currentTarget.value);
      document.getElementById("search").value = "";
      activeSemanticType = firstAvailableSemanticType();
      selectedIndex = visibleEntryIndexes()[0] ?? 0;
      assistantTurnState = null;
      render();
      renderQuestionConfigSummary();
      clearAssistantSession(false);
    });

    document.getElementById("search").addEventListener("input", renderList);
    document.getElementById("validateBtn").addEventListener("click", () => {
      const checks = validationChecks(current());
      const bad = checks.filter(check => check.level === "bad");
      const warn = checks.filter(check => check.level === "warn");
      if (!bad.length && !warn.length) window.alert("配置检查通过");
      else window.alert([...bad, ...warn].map(check => check.text).join("\n"));
    });
    function newBlankMetric() {
      const nextNo = metrics.length + 1;
      const modelId = Number(selectedKnowledgeBaseId);
      const defaultTable = primaryKnowledgeTable();
      if (activeSemanticType === "table_column_note") {
        const configuredTables = new Set(metrics
          .filter(item => semanticEntryType(item) === "table_column_note" && isMetricInCurrentKnowledgeBase(item))
          .map(item => item.sourceTable));
        const sourceTable = currentKnowledgeTableNamesForOptions().find(table => !configuredTables.has(table)) || defaultTable || "";
        const entry = {
          modelId,
          code: sourceTable,
          name: sourceTable,
          tag: "表列说明",
          semanticType: "table_column_note",
          sourceTable,
          tableDescription: tableCatalog[sourceTable]?.label || sourceTable,
          tableNote: tableNoteDefaults[sourceTable] || "",
          columns: [],
          updatedAt: "刚刚"
        };
        metrics.unshift(entry);
        selectedIndex = 0;
        render();
        openEntryModal(0);
        return;
      }
      if (activeSemanticType === "logic_text") {
        const entry = {
          modelId,
          code: `new_logic_text_${nextNo}`,
          name: `new_logic_text_${nextNo}`,
          tag: "规则",
          semanticType: "logic_text",
          relatedTables: [defaultTable].filter(Boolean),
          content: "",
          injectionStages: ["planner_policy", "sql_generation"],
          priority: 10,
          updatedAt: "刚刚"
        };
        metrics.unshift(entry);
        selectedIndex = 0;
        render();
        openEntryModal(0);
        return;
      }
      if (activeSemanticType === "result_presentation") {
        const entry = {
          modelId,
          code: `new_result_presentation_${nextNo}`,
          name: `new_result_presentation_${nextNo}`,
          tag: "展示要求",
          semanticType: "result_presentation",
          relatedTables: [defaultTable].filter(Boolean),
          content: "",
          presentationStages: ["final_answer", "result_table"],
          updatedAt: "刚刚"
        };
        metrics.unshift(entry);
        selectedIndex = 0;
        render();
        openEntryModal(0);
        return;
      }
      if (activeSemanticType === "standard_qa") {
        const entry = {
          modelId,
          code: `new_standard_qa_${nextNo}`,
          name: `new_standard_qa_${nextNo}`,
          tag: "标准问答",
          semanticType: "standard_qa",
          relatedTables: [defaultTable].filter(Boolean),
          question: "",
          answer: "",
          updatedAt: "刚刚"
        };
        metrics.unshift(entry);
        selectedIndex = 0;
        render();
        openEntryModal(0);
        return;
      }
      if (activeSemanticType === "sql_resultset") {
        const entry = {
          modelId,
          code: `new_sql_resultset_${nextNo}`,
          name: `new_sql_resultset_${nextNo}`,
          tag: "SQL结果集",
          semanticType: "sql_resultset",
          relatedTables: [defaultTable].filter(Boolean),
          sql: "",
          description: "",
          resolveMode: "semantic",
          maxRows: "",
          maxBytes: "",
          timeoutSeconds: "",
          embeddingModel: "",
          retrievalEnabled: false,
          extensionSql: "",
          extensionParams: [],
          updatedAt: "刚刚"
        };
        metrics.unshift(entry);
        selectedIndex = 0;
        render();
        openEntryModal(0);
        return;
      }
      const metric = {
        modelId,
        code: `new_metric_${nextNo}`,
        name: "新指标",
        aliases: "",
        tag: "指标",
        sourceTable: defaultTable,
        measureField: defaultMeasureFieldForTable(defaultTable),
        aggregation: "SUM",
        resultMultiplier: 1,
        outputProfile: "summary_only",
        bpcRows: [{ accountCode: "", operator: "+", reverse: "否", extraFilter: "无" }],
        filters: [],
        filterMode: "simple",
        outputFields: [],
        testQuestion: ""
      };
      metrics.unshift(metric);
      selectedIndex = 0;
      render();
      openEntryModal(0);
    }

    document.getElementById("cloneBtn").addEventListener("click", newBlankMetric);
    document.getElementById("newMetricBtn").addEventListener("click", newBlankMetric);
    document.getElementById("closeEntryModal").addEventListener("click", closeEntryModal);
    document.getElementById("cancelEntryModal").addEventListener("click", closeEntryModal);
    document.getElementById("confirmEntryModal").addEventListener("click", saveCurrentEntryModal);
    toggleJsonPreviewEl.addEventListener("click", () => {
      setJsonPreviewVisible(!entryPreviewVisible);
    });
    entryModalEl.addEventListener("click", event => {
      if (event.target === entryModalEl) closeEntryModal();
    });
    document.getElementById("assistantFab").addEventListener("click", () => {
      setAssistantOpen(true);
    });
    document.getElementById("assistantClear").addEventListener("click", () => {
      clearAssistantSession();
    });
    document.getElementById("assistantClose").addEventListener("click", () => {
      setAssistantOpen(false);
    });
    document.getElementById("questionConfigToggle").addEventListener("click", () => {
      const panel = document.getElementById("questionConfigPanel");
      setQuestionConfigOpen(panel.hidden);
    });
    document.querySelectorAll("input[name='qaDataPath']").forEach(input => {
      input.addEventListener("change", event => {
        assistantQuestionConfig.dataPath = event.currentTarget.value;
        renderQuestionConfigSummary();
      });
    });
    document.querySelectorAll("input[name='qaTransactionScope']").forEach(input => {
      input.addEventListener("change", event => {
        assistantQuestionConfig.transactionScope = event.currentTarget.value;
        renderQuestionConfigSummary();
      });
    });
    document.getElementById("questionConfigSelectAllTables").addEventListener("click", () => {
      setSelectedQuestionTables(selectedKnowledgeBaseTables());
      renderQuestionConfigSummary();
    });
    document.getElementById("questionConfigTableOptions").addEventListener("change", event => {
      const input = event.target.closest("input[name='qaTableScope']");
      if (!input) return;
      const checked = [...document.querySelectorAll("input[name='qaTableScope']:checked")]
        .map(item => item.value)
        .filter(Boolean);
      if (!checked.length) {
        input.checked = true;
        return;
      }
      setSelectedQuestionTables(checked);
      renderQuestionConfigSummary();
    });

    function closeResultChartMenus(exceptId = "") {
      document.querySelectorAll(".qa-chart-menu").forEach(menu => {
        if (exceptId && menu.id === `${exceptId}_menu`) return;
        menu.hidden = true;
      });
      document.querySelectorAll("[data-chart-menu]").forEach(button => {
        if (exceptId && button.dataset.chartMenu === exceptId) return;
        button.setAttribute("aria-expanded", "false");
      });
    }

    document.addEventListener("click", event => {
      const chartMenuButton = event.target.closest("[data-chart-menu]");
      if (chartMenuButton) {
        event.preventDefault();
        event.stopPropagation();
        const chartId = chartMenuButton.dataset.chartMenu || "";
        const menu = document.getElementById(`${chartId}_menu`);
        if (!menu) return;
        const nextOpen = menu.hidden;
        closeResultChartMenus(chartId);
        menu.hidden = !nextOpen;
        chartMenuButton.setAttribute("aria-expanded", String(nextOpen));
        return;
      }
      const chartChoice = event.target.closest("[data-chart-choice]");
      if (chartChoice) {
        event.preventDefault();
        event.stopPropagation();
        const chartId = chartChoice.dataset.chartPanel || "";
        const type = chartChoice.dataset.chartChoice || "table";
        const panel = document.getElementById(chartId);
        const menuButton = document.querySelector(`[data-chart-menu="${chartId}"]`);
        const chartTitle = document.querySelector(`[data-chart-title="${chartId}"]`);
        const titleMap = { table: "图表", line: "折线图", bar: "柱状图", pie: "饼图" };
        if (panel) {
          panel.hidden = type === "table";
          panel.querySelectorAll("[data-chart-view]").forEach(view => {
            view.hidden = view.dataset.chartType !== type;
          });
        }
        if (menuButton) {
          menuButton.textContent = titleMap[type] || "图表";
          menuButton.setAttribute("aria-expanded", "false");
        }
        if (chartTitle && type !== "table") chartTitle.textContent = titleMap[type] || "图表";
        document.querySelectorAll(`[data-chart-panel="${chartId}"]`).forEach(button => {
          button.classList.toggle("active", button.dataset.chartChoice === type);
        });
        closeResultChartMenus();
        return;
      }
      if (!event.target.closest(".qa-chart-control")) {
        closeResultChartMenus();
      }
      const button = event.target.closest("[data-copy-id]");
      if (button) {
        event.preventDefault();
        event.stopPropagation();
        handleCopyButton(button);
        return;
      }
      const sqlToggle = event.target.closest("[data-toggle-result-sql]");
      if (sqlToggle) {
        event.preventDefault();
        event.stopPropagation();
        const panel = document.getElementById(sqlToggle.dataset.toggleResultSql || "");
        if (!panel) return;
        const isOpen = sqlToggle.getAttribute("aria-expanded") === "true";
        panel.hidden = isOpen;
        sqlToggle.setAttribute("aria-expanded", String(!isOpen));
        sqlToggle.textContent = isOpen ? "查看 SQL" : "收起 SQL";
        return;
      }
      const excelButtonEl = event.target.closest("[data-excel-id]");
      if (!excelButtonEl) return;
      event.preventDefault();
      event.stopPropagation();
      handleExcelDownload(excelButtonEl);
    });
    document.getElementById("runAgentBtn").addEventListener("click", () => {
      submitAssistantQuestion(document.getElementById("agentQuestion").value);
    });
    document.getElementById("agentQuestion").addEventListener("keydown", event => {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        submitAssistantQuestion(event.currentTarget.value);
      }
    });
    document.querySelectorAll("[data-agent-example]").forEach(btn => {
      btn.addEventListener("click", () => {
        submitAssistantQuestion(btn.dataset.agentExample);
      });
    });

    render();
    renderQuestionConfigSummary();
    loadWorkbenchDataFromDb();
    formatRenderedSqlBlocks();
  </script>
</body>
</html>
