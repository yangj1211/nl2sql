        }
      };
    }

    function parseSseBlock(block) {
      const lines = String(block || "").split(/\r?\n/);
      let event = "message";
      const dataLines = [];
      lines.forEach(line => {
        if (line.startsWith("event:")) event = line.slice(6).trim();
        if (line.startsWith("data:")) dataLines.push(line.slice(5).trimStart());
      });
      if (!dataLines.length) return null;
      return { event, data: JSON.parse(dataLines.join("\n")) };
    }

    async function requestDetectiveAgentModel(localResult) {
      const controller = new AbortController();
      activeAssistantRequestController = controller;
      const timer = setTimeout(() => controller.abort(), 180_000);
      try {
        const response = await fetch("/api/nl2sql-stream", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(compactAgentPayload(localResult)),
          signal: controller.signal
        });
        if (!response.ok || !response.body) {
          throw new Error(`模型接口请求失败：${response.status}`);
        }
        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";
        let donePayload = null;
        while (true) {
          const { value, done } = await reader.read();
          if (value) {
            buffer += decoder.decode(value, { stream: true });
            const blocks = buffer.split(/\n\n/);
            buffer = blocks.pop() || "";
            for (const block of blocks) {
              if (!block.trim()) continue;
              const parsed = parseSseBlock(block);
              if (!parsed) continue;
              if (parsed.event === "trace" && parsed.data?.item) {
                appendAssistantLiveTrace(parsed.data.item, parsed.data.elapsed_ms);
              }
              if (parsed.event === "done") {
                donePayload = parsed.data;
              }
              if (parsed.event === "error") {
                throw new Error(parsed.data?.error || "模型接口请求失败");
              }
            }
          }
          if (done) break;
        }
        if (!donePayload) throw new Error("模型接口没有返回完成事件");
        if (donePayload.ok === false) throw new Error(donePayload.error || "模型接口请求失败");
        return donePayload;
      } catch (error) {
        if (error.name === "AbortError") {
          throw new Error("请求超过 180 秒仍未完成，可能是模型服务或数据库查询未返回。");
        }
        throw error;
      } finally {
        clearTimeout(timer);
        if (activeAssistantRequestController === controller) {
          activeAssistantRequestController = null;
        }
      }
    }

    function findAgentMetricByKey(key, type) {
      if (!key) return null;
      return metrics.find(metric => isMetricInCurrentKnowledgeBase(metric) && semanticEntryType(metric) === type && (metric.code === key || metric.name === key || metric.sourceTable === key)) || null;
    }

    function mergeModelAgentResult(localResult, modelResponse) {
      const modelData = modelResponse.data || {};
      const modelMetricKeys = Array.isArray(modelData.decision?.selected_metric_keys) ? modelData.decision.selected_metric_keys : [];
      const selectedMetricKeys = [...new Set([
        modelData.decision?.selected_metric_key,
        ...modelMetricKeys
      ].filter(Boolean))];
      const selectedMetrics = selectedMetricKeys
        .map(key => findAgentMetricByKey(key, "business_metric"))
        .filter(Boolean);
      const selectedMetric = selectedMetrics[0] || findAgentMetricByKey(modelData.decision?.selected_metric_key, "business_metric") || null;
      if (selectedMetric && !selectedMetrics.some(metric => metric.code === selectedMetric.code)) {
        selectedMetrics.unshift(selectedMetric);
      }
      const mandatoryContext = modelData.mandatory_context || null;
      const mandatoryRuleKeys = Array.isArray(mandatoryContext?.rule_keys) ? mandatoryContext.rule_keys : [];
      const selectedRuleKeys = [
        ...new Set([
          ...(Array.isArray(modelData.decision?.selected_rule_keys) ? modelData.decision.selected_rule_keys : []),
          ...mandatoryRuleKeys
        ].filter(Boolean))
      ];
      const selectedRules = selectedRuleKeys
        .map(key => findAgentMetricByKey(key, "logic_text"))
        .filter(Boolean);
      const modelHasSql = Object.prototype.hasOwnProperty.call(modelData, "sql");
      return {
        ...localResult,
        answer: modelData.answer || localResult.answer || "",
        answerType: modelData.answer_type || "sql_needed",
        hypotheses: Array.isArray(modelData.hypotheses) && modelData.hypotheses.length ? modelData.hypotheses : [],
        searchPlan: Array.isArray(modelData.search_plan) && modelData.search_plan.length ? modelData.search_plan : [],
        decision: {
          ...localResult.decision,
          intent: modelData.decision?.intent || localResult.decision.intent,
          confidence: Number(modelData.decision?.confidence ?? localResult.decision.confidence),
          selectedMetric,
          selectedMetrics,
          selectedMetricKeys,
          selectedRules,
          reason: modelData.decision?.reason || ""
        },
        sqlText: modelHasSql ? (modelData.sql || "") : "",
        evidence: Array.isArray(modelData.sql_plan) && modelData.sql_plan.length ? modelData.sql_plan : [],
        execution: modelData.execution || null,
        display: modelData.display || null,
        sqlValidation: modelData.sql_validation || null,
        mandatoryContext,
        retrievalPlan: modelData.retrieval_plan || null,
        semanticPlan: modelData.retrieval_plan?.semantic_plan || modelData.semantic_plan || null,
        trace: Array.isArray(modelData.trace) ? modelData.trace : [],
        timings: modelData.timings || null,
        model: {
          name: modelResponse.model || "qwen3-max",
          used: true,
          warnings: Array.isArray(modelData.warnings) ? modelData.warnings : [],
          raw: modelResponse.raw || ""
        }
      };
    }

    async function runDetectiveAgentFlow(question, qaConfig = currentQuestionConfigPayload()) {
      const runToken = ++activeAssistantRunToken;
      const localResult = createAssistantRequestContext(question, qaConfig);
      renderAssistantLoading("正在处理问数请求...");
      document.getElementById("agentModeBadge").textContent = "NL2SQL 执行中...";
      const runBtn = document.getElementById("runAgentBtn");
      runBtn.disabled = true;
      runBtn.textContent = "…";
      try {
        const modelResponse = await requestDetectiveAgentModel(localResult);
        if (runToken !== activeAssistantRunToken) return;
        const merged = mergeModelAgentResult(localResult, modelResponse);
        stopAssistantTimer();
        renderAssistantQaResult(merged);
        updateAssistantTurnState(merged);
        rememberAssistantMessage(merged.answer || merged.sqlText || "已生成回答");
        document.getElementById("agentModeBadge").textContent = `模型 API · ${merged.model.name}`;
      } catch (error) {
        if (runToken !== activeAssistantRunToken) return;
        const failedMs = activeAssistantStartedAt ? Date.now() - activeAssistantStartedAt : 0;
        const fallback = {
          ...localResult,
          answer: `这次 NL2SQL 请求没有完成：${error.message || String(error)}。请稍后重试，或检查模型服务、数据库连接和后端日志。`,
          answerType: "execution_error",
          sqlText: "",
          evidence: [],
          trace: [
            {
              stage: "request",
              label: "调用后端 NL2SQL 接口",
              status: "failed",
              duration_ms: failedMs,
              detail: error.message || String(error)
            }
          ],
          timings: { total_ms: failedMs },
          model: {
            used: false,
            error: error.message,
            warnings: ["本次没有进入本地 SQL 兜底；完整 NL2SQL 必须由 qwen3-max 生成并经过后端校验。"]
          }
        };
        stopAssistantTimer();
        renderAssistantQaResult(fallback);
        document.getElementById("agentModeBadge").textContent = "请求失败";
      } finally {
        if (runToken === activeAssistantRunToken) {
          runBtn.disabled = false;
          runBtn.textContent = "↑";
        }
      }
    }

    async function writeClipboardText(text) {
      if (navigator.clipboard?.writeText) {
        await navigator.clipboard.writeText(text);
        return;
      }
      const textarea = document.createElement("textarea");
      textarea.value = text;
      textarea.setAttribute("readonly", "");
      textarea.style.position = "fixed";
      textarea.style.left = "-9999px";
      document.body.appendChild(textarea);
      textarea.select();
      document.execCommand("copy");
      textarea.remove();
    }

    async function handleCopyButton(button) {
      const text = copyTextStore.get(button.dataset.copyId || "");
      if (!text) return;
      const original = button.textContent;
      try {
        await writeClipboardText(text);
        button.textContent = "已复制";
        button.classList.add("copied");
        setTimeout(() => {
          button.textContent = original || "复制";
          button.classList.remove("copied");
        }, 1200);
      } catch {
        button.textContent = "复制失败";
        setTimeout(() => {
          button.textContent = original || "复制";
        }, 1600);
      }
    }

    function xmlEscape(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&apos;");
    }

    function columnLetter(index) {
      let value = index + 1;
      let output = "";
      while (value > 0) {
        const remainder = (value - 1) % 26;
        output = String.fromCharCode(65 + remainder) + output;
        value = Math.floor((value - 1) / 26);
      }
      return output;
    }

    function crc32(bytes) {
      let crc = -1;
      for (let index = 0; index < bytes.length; index += 1) {
        crc = (crc >>> 8) ^ crc32.table[(crc ^ bytes[index]) & 0xff];
      }
      return (crc ^ -1) >>> 0;
    }

    crc32.table = (() => {
      const table = new Uint32Array(256);
      for (let index = 0; index < 256; index += 1) {
        let value = index;
        for (let bit = 0; bit < 8; bit += 1) {
          value = value & 1 ? 0xedb88320 ^ (value >>> 1) : value >>> 1;
        }
        table[index] = value >>> 0;
      }
      return table;
    })();

    function uint16(value) {
      return [value & 0xff, (value >>> 8) & 0xff];
    }

    function uint32(value) {
      return [
        value & 0xff,
        (value >>> 8) & 0xff,
        (value >>> 16) & 0xff,
        (value >>> 24) & 0xff
      ];
    }

    function concatUint8(parts) {
      const total = parts.reduce((sum, part) => sum + part.length, 0);
      const output = new Uint8Array(total);
      let offset = 0;
      parts.forEach(part => {
        output.set(part, offset);
        offset += part.length;
      });
      return output;
    }

    function zipStore(files) {
      const encoder = new TextEncoder();
      const locals = [];
      const centrals = [];
      let offset = 0;
      files.forEach(file => {
        const nameBytes = encoder.encode(file.name);
        const dataBytes = encoder.encode(file.content);
        const checksum = crc32(dataBytes);
        const local = concatUint8([
          new Uint8Array(uint32(0x04034b50)),
          new Uint8Array(uint16(20)),
          new Uint8Array(uint16(0x0800)),
          new Uint8Array(uint16(0)),
          new Uint8Array(uint16(0)),
          new Uint8Array(uint16(0)),
          new Uint8Array(uint32(checksum)),
          new Uint8Array(uint32(dataBytes.length)),
          new Uint8Array(uint32(dataBytes.length)),
          new Uint8Array(uint16(nameBytes.length)),
          new Uint8Array(uint16(0)),
          nameBytes,
          dataBytes
        ]);
        const central = concatUint8([
          new Uint8Array(uint32(0x02014b50)),
          new Uint8Array(uint16(20)),
          new Uint8Array(uint16(20)),
          new Uint8Array(uint16(0x0800)),
          new Uint8Array(uint16(0)),
          new Uint8Array(uint16(0)),
          new Uint8Array(uint16(0)),
          new Uint8Array(uint32(checksum)),
          new Uint8Array(uint32(dataBytes.length)),
          new Uint8Array(uint32(dataBytes.length)),
          new Uint8Array(uint16(nameBytes.length)),
          new Uint8Array(uint16(0)),
          new Uint8Array(uint16(0)),
          new Uint8Array(uint16(0)),
          new Uint8Array(uint16(0)),
          new Uint8Array(uint32(0)),
          new Uint8Array(uint32(offset)),
          nameBytes
        ]);
        locals.push(local);
        centrals.push(central);
        offset += local.length;
      });
      const centralStart = offset;
      const centralData = concatUint8(centrals);
      const end = concatUint8([
        new Uint8Array(uint32(0x06054b50)),
        new Uint8Array(uint16(0)),
        new Uint8Array(uint16(0)),
        new Uint8Array(uint16(files.length)),
        new Uint8Array(uint16(files.length)),
        new Uint8Array(uint32(centralData.length)),
        new Uint8Array(uint32(centralStart)),
        new Uint8Array(uint16(0))
      ]);
      return concatUint8([...locals, centralData, end]);
    }

    function worksheetXml(columns, rows) {
      const headerRow = `<row r="1">${columns.map((column, index) => {
        const cell = `${columnLetter(index)}1`;
        return `<c r="${cell}" t="inlineStr"><is><t>${xmlEscape(column)}</t></is></c>`;
      }).join("")}</row>`;
      const bodyRows = rows.map((row, rowIndex) => {
        const rowNumber = rowIndex + 2;
        const cells = columns.map((column, columnIndex) => {
          const value = row?.[column];
          const cell = `${columnLetter(columnIndex)}${rowNumber}`;
          if (typeof value === "number" && Number.isFinite(value)) {
            return `<c r="${cell}"><v>${value}</v></c>`;
          }
          return `<c r="${cell}" t="inlineStr"><is><t>${xmlEscape(value ?? "")}</t></is></c>`;
        }).join("");
        return `<row r="${rowNumber}">${cells}</row>`;
      }).join("");
      return `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships">
  <sheetData>${headerRow}${bodyRows}</sheetData>
</worksheet>`;
    }

  <borders count="1"><border><left/><right/><top/><bottom/><diagonal/></border></borders>
  <cellStyleXfs count="1"><xf numFmtId="0" fontId="0" fillId="0" borderId="0"/></cellStyleXfs>
  <cellXfs count="1"><xf numFmtId="0" fontId="0" fillId="0" borderId="0" xfId="0"/></cellXfs>
</styleSheet>`
        },
        { name: "xl/worksheets/sheet1.xml", content: worksheetXml(columns, rows) }
      ];
      return new Blob([zipStore(files)], { type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" });
    }

    function safeExcelFilename(name) {
      const cleaned = String(name || "查询结果.xlsx").replace(/[\\/:*?"<>|]/g, "_").trim();
      return cleaned.toLowerCase().endsWith(".xlsx") ? cleaned : `${cleaned || "查询结果"}.xlsx`;
    }

    function handleExcelDownload(button) {
      const data = excelDownloadStore.get(button.dataset.excelId || "");
      if (!data || !data.columns.length) return;
      const original = button.textContent;
      try {
        const blob = workbookBlob(data.columns, data.rows);
        const url = URL.createObjectURL(blob);
        const anchor = document.createElement("a");
        anchor.href = url;
        anchor.download = safeExcelFilename(data.filename);
        document.body.appendChild(anchor);
        anchor.click();
        anchor.remove();
        URL.revokeObjectURL(url);
        button.textContent = "已下载";
        setTimeout(() => { button.textContent = original || "下载 Excel"; }, 1200);
      } catch {
        button.textContent = "下载失败";
        setTimeout(() => { button.textContent = original || "下载 Excel"; }, 1600);
      }
    }

    function formatAnswerText(text) {
      const value = String(text || "").trim();
      if (!value) return "<p>模型没有返回明确回答。</p>";
      return value
        .split(/\n{2,}/)
        .map(paragraph => `<p>${escapeHtml(paragraph).replace(/\n/g, "<br>")}</p>`)
        .join("");
    }

    function answerTypeText(type) {
      const map = {
        final_answer: "已回答",
        sql_needed: "待执行 SQL",
        clarification_needed: "需要澄清",
        rule_explanation: "口径解释",
        execution_error: "执行失败",
        no_evidence: "证据不足"
      };
      return map[type] || "已回答";
    }

    function modelWarnings(result) {
      const warnings = [];
      if (Array.isArray(result.model?.warnings)) warnings.push(...result.model.warnings);
      if (result.model?.error) warnings.push(result.model.error);
      if (result.execution && result.execution.executed === false && result.execution.message) {
        warnings.push(result.execution.message);
      }
      if (result.answerType === "sql_needed" && !warnings.length) {
        warnings.push("当前只完成语义理解和 SQL 生成，尚未接入数据库执行结果。");
      }
      return [...new Set(warnings.filter(Boolean))];
    }

    function formatDuration(ms) {
      const value = Number(ms || 0);
      if (!value) return "0.0s";
      return `${(value / 1000).toFixed(value >= 10_000 ? 1 : 2)}s`;
    }

    function traceDurationText(item) {
      const status = item?.status || "running";
      const statusText = traceStatusText(status);
      if (status === "running") return statusText;

      const duration = Number(item?.duration_ms || 0);
      if (duration < 150) return statusText;

      const modelStages = new Set(["agent_loop", "answer_generation"]);
      if (modelStages.has(item?.stage)) {
        return `${statusText} · 模型用时 ${formatDuration(duration)}`;
      }
      return `${statusText} · ${formatDuration(duration)}`;
    }

    function traceStatusText(status) {
      const map = {
        running: "进行中",
        success: "完成",
        failed: "失败",
        skipped: "跳过"
      };
      return map[status] || status || "进行中";
    }

    function traceFallbackSummary(item) {
      const stage = item?.stage || "";
      const status = item?.status || "";
      if (stage === "sql_resultset_lookup") {
        if (status === "success") return "根据上一步判断补充查询编码目录，拿到普通名称对应的编码和备注。";
        if (status === "failed") return "编码目录查询失败，后续只能依赖当前指标和规则语义继续判断。";
        return "尝试补充编码目录，但没有命中可用记录。";
      }
      if (stage === "retrieval_planning") {
        if (status === "failed") return "模型没有完成检索规划，后续会尽量用现有语义继续生成 SQL。";
        return "先理解问题，判断哪些指标、规则或补充资料真的需要参与。";
      }
      if (stage === "sql_generation") {
        if (status === "failed") return "模型没有生成可用 SQL，流程在进入数据库前停止。";
        return "把已选依据转成一条只读 SQL。";
      }
      if (stage === "sql_validation") {
        if (status === "failed") return "SQL 没有通过只读或授权表校验，因此不会执行。";
        return "后端检查 SQL 是否只读、是否只访问允许的数据表，通过后才允许执行。";
      }
      if (stage === "sql_execution") {
        if (status === "failed") return "SQL 已生成但数据库执行失败，需要查看错误定位字段、语法或连接问题。";
        if (status === "skipped") return "当前没有执行数据库查询，只能保留 SQL 草案。";
        return "SQL 已在数据库执行，后续回答会基于返回结果整理。";
      }
      if (stage === "sql_repair") {
        if (status === "failed") return "数据库执行失败后尝试自动修复，但修复 SQL 没有通过生成或校验。";
        return "根据数据库错误自动重写 SQL，并重新落实强制口径和只读校验。";
      }
      if (stage === "answer_generation") {
        if (status === "failed") return "查询完成了，但自然语言总结失败，可以先查看结果表和 SQL。";
        return "模型把查询结果整理成业务回答，不再改变 SQL 或取数口径。";
      }
      return "";
    }

    function traceSummaryText(item) {
      return normalizeEvidenceText(item?.conclusion || item?.summary || traceFallbackSummary(item));
    }

    function traceArtifactText(artifact) {
      if (!artifact) return "";
      if (typeof artifact === "string") return normalizeEvidenceText(artifact);
      try {
        return JSON.stringify(artifact, null, 2);
      } catch {
        return String(artifact);
      }
    }

    function traceArtifactLabel(item) {
      const map = {
        question_config: "查看问数配置",
        table_exploration: "查看表结构和样例",
        retrieval_planning: "查看检索计划",
        mandatory_context: "查看强制口径",
        sql_resultset_lookup: "查看补查结果",
        sql_generation: "查看 SQL 生成产物",
        mandatory_sql_enforcement: "查看 SQL 口径落实",
        sql_validation: "查看校验结果",
        sql_execution: "查看查询结果",
        sql_repair: "查看修复结果",
        answer_generation: "查看回答产物"
      };
      return map[item?.stage] || "查看阶段产物";
    }

    function renderTraceArtifact(item) {
      const text = traceArtifactText(item.artifact);
      if (!text) return "";
      const copyId = registerCopyText(text);
      return `
        <details class="trace-artifact">
          <summary>
            <span class="trace-artifact-summary-label">${escapeHtml(traceArtifactLabel(item))}</span>
            ${copyButton(copyId)}
          </summary>
          <pre>${escapeHtml(text)}</pre>
        </details>
      `;
    }

    function traceMetaRows(item) {
      const rows = [
        ["目的", item?.purpose],
        ["发现", item?.finding || item?.detail],
        ["判断", item?.decision]
      ].filter(([, value]) => normalizeEvidenceText(value));
      if (!rows.length) return "";
      return `
        <dl class="trace-meta">
          ${rows.map(([label, value]) => `
            <div>
              <dt>${escapeHtml(label)}</dt>
              <dd>${escapeHtml(normalizeEvidenceText(value))}</dd>
            </div>
          `).join("")}
        </dl>
      `;
    }

    function traceStreamTitle(item) {
      const stage = item?.stage || "";
      const label = item?.label || stage || "执行步骤";
      const round = String(item?.id || label).match(/(?:agent_loop_|第\s*)(\d+)/)?.[1];
      const map = {
        question_config: "应用问数配置",
        table_exploration: "查看数据源",
        agent_loop: round ? `思考 · 第 ${round} 轮` : "思考",
        sql_resultset_lookup: round ? `补查目录 · 第 ${round} 轮` : "补查目录",
        metric_expansion: "展开指标口径",
        sql_generation: "生成 SQL",
        mandatory_sql_enforcement: "落实固定口径",
        sql_validation: "校验 SQL",
        sql_execution: "执行查询",
        sql_repair: "自动修复 SQL",
        answer_generation: "整理回答"
      };
      return map[stage] || label;
    }

    function timingStepTitle(step) {
      const label = normalizeEvidenceText(step?.label || "");
      if (label) return label;
      return traceStreamTitle(step);
    }

    function timingStepDetail(step) {
      return normalizeEvidenceText(
        step?.summary ||
          step?.finding ||
          step?.decision ||
          step?.detail ||
          step?.conclusion ||
          traceSummaryText(step)
      );
    }

    function normalizeTimingSteps(result) {
      const explicitSteps = Array.isArray(result?.timings?.steps) ? result.timings.steps : [];
      const source = explicitSteps.length ? explicitSteps : (Array.isArray(result?.trace) ? result.trace : []);
      return source
        .filter(item => item && item.status !== "running")
        .map((item, index) => {
          const duration = Number(item.duration_ms || 0);
          return {
            ...item,
            order: item.order || index + 1,
            label: timingStepTitle(item),
            duration_ms: Number.isFinite(duration) ? duration : 0,
            summary: timingStepDetail(item),
            status: item.status || ""
          };
        })
        .filter(item => item.duration_ms > 0 || item.status);
    }

    function slowestTimingStep(steps) {
      return steps.reduce((slowest, item) => {
        if (!slowest) return item;
        return Number(item.duration_ms || 0) > Number(slowest.duration_ms || 0) ? item : slowest;
      }, null);
    }

    function renderTimingSummary(result) {
      const steps = normalizeTimingSteps(result);
      if (!steps.length) return "";
      const slowest = slowestTimingStep(steps);
      return `
        <div class="timing-summary">
          <div class="timing-summary-head">
            <span>耗时明细</span>
            ${slowest ? `<span class="timing-summary-slowest">最慢：${escapeHtml(timingStepTitle(slowest))} · ${formatDuration(slowest.duration_ms)}</span>` : ""}
          </div>
          <div class="timing-step-list">
            ${steps.map(step => {
              const duration = Number(step.duration_ms || 0);
              const detail = timingStepDetail(step);
              const slowClass = duration >= 5000 ? " slow" : "";
              return `
                <div class="timing-step${slowClass}">
                  <div>
                    <div class="timing-step-title">${escapeHtml(timingStepTitle(step))}</div>
                    ${detail ? `<div class="timing-step-detail">${escapeHtml(detail)}</div>` : ""}
                  </div>
                  <span class="timing-step-duration">${escapeHtml(traceStatusText(step.status))} · ${formatDuration(duration)}</span>
                </div>
              `;
            }).join("")}
          </div>
        </div>
      `;
    }

    function traceStreamNote(item) {
      const values = [item?.finding, item?.decision]
        .map(value => normalizeEvidenceText(value))
        .filter(Boolean)
        .filter(value => !/等待/.test(value));
      return [...new Set(values)].slice(0, 2).join(" ");
    }

    function renderTraceItem(item) {
      const summary = traceSummaryText(item);
      const traceId = item?.id ? ` data-trace-id="${escapeHtml(item.id)}"` : "";
      const durationText = traceDurationText(item);
      const note = traceStreamNote(item);
      return `
        <li class="${escapeHtml(item.status || "")}"${traceId}>
          <div class="trace-content">
            <div class="trace-head">
              <span class="trace-kicker">${escapeHtml(traceStreamTitle(item))}</span>
              <span class="trace-duration">${escapeHtml(durationText)}</span>
            </div>
            ${summary ? `<div class="trace-summary">${escapeHtml(summary)}</div>` : ""}
            ${note ? `<div class="trace-note">${escapeHtml(note)}</div>` : ""}
            ${renderTraceArtifact(item)}
          </div>
        </li>
      `;
    }

    function runningTraceText(item) {
      const summary = traceSummaryText(item);
      if (summary) return summary;
      const label = item?.label || item?.stage || "";
      if (/表结构|样例/.test(label)) return "正在读取当前表的字段和样例，先确认真实数据长什么样。";
      if (/理解|判断|下一步/.test(label)) return "正在理解问题，判断需要用哪些指标、规则或补充资料。";
      if (/SQL|取数/.test(label)) return "正在把已确认的口径整理成可执行查询。";
      if (/执行|查询/.test(label)) return "正在查询数据库并等待结果返回。";
      if (/回答/.test(label)) return "正在把查询结果整理成可以直接看的回答。";
      return "正在处理这次问题。";
    }

    function updateAssistantLiveStatus(text) {
      const status = document.getElementById("assistantLiveStatus");
      if (status && text) status.textContent = text;
    }

    function ensureAssistantLiveTrace(elapsedMs) {
      const mount = document.getElementById("assistantLiveTraceMount");
      if (!mount) return null;
      const existing = document.getElementById("assistantLiveTraceList");
      if (existing) return existing;
      mount.innerHTML = `
        <details class="qa-details thought-stream" open>
          <summary>思考过程 <span id="assistantLiveTraceTotal">已运行 ${formatDuration(elapsedMs || 0)}</span></summary>
          <div class="qa-details-body">
            <ul class="qa-trace-list" id="assistantLiveTraceList" data-ready="1"></ul>
          </div>
        </details>
      `;
      return document.getElementById("assistantLiveTraceList");
    }

    function traceDomIdSelector(value) {
      return String(value || "").replace(/\\/g, "\\\\").replace(/"/g, '\\"');
    }

    function appendAssistantLiveTrace(item, elapsedMs) {
      if (item?.status === "running") {
        updateAssistantLiveStatus(runningTraceText(item));
      }
      const list = ensureAssistantLiveTrace(elapsedMs);
      const total = document.getElementById("assistantLiveTraceTotal");
      if (!list) return;
      const traceId = item?.id ? String(item.id) : "";
      const existing = traceId ? list.querySelector(`[data-trace-id="${traceDomIdSelector(traceId)}"]`) : null;
      if (existing) {
        existing.outerHTML = renderTraceItem(item);
      } else {
        list.insertAdjacentHTML("beforeend", renderTraceItem(item));
      }
      if (total) total.textContent = `已运行 ${formatDuration(elapsedMs)}`;
      scrollAssistantMessages();
    }

    function renderExecutionTrace(result) {
      const trace = Array.isArray(result.trace) ? result.trace : [];
      const total = result.timings?.total_ms;
      const timingSummary = renderTimingSummary(result);
      if (!trace.length && !total && !timingSummary) return "";
      return `
        <details class="qa-details thought-stream" open>
          <summary>思考完成${total ? ` · 总耗时 ${formatDuration(total)}` : ""}</summary>
          <div class="qa-details-body">
            ${timingSummary}
            ${trace.length ? `
              <ul class="qa-trace-list">
                ${trace.map(renderTraceItem).join("")}
              </ul>
            ` : ""}
          </div>
        </details>
      `;
    }

    function parseResultNumber(value) {
      if (value == null || value === "") return null;
      if (typeof value === "number") return Number.isFinite(value) ? value : null;
      const text = String(value).trim().replace(/,/g, "");
      if (!text || !/^-?\d+(?:\.\d+)?$/.test(text)) return null;
      const number = Number(text);
      return Number.isFinite(number) ? number : null;
    }

    function displayFormatForColumn(formats = [], column = "") {
      const name = String(column || "");
      return (formats || []).find(item => item?.column === name) || null;
    }

    function isPercentDisplayColumn(column, formats = []) {
      return String(displayFormatForColumn(formats, column)?.format || "").toLowerCase() === "percent";
    }

    function displayResultCell(column, value, formats = []) {
      if (value == null || value === "") return "";
      const format = displayFormatForColumn(formats, column);
      if (!format) return value;
      const number = parseResultNumber(value);
      if (number == null) return value;
      const precision = Number.isFinite(Number(format.precision))
        ? Number(format.precision)
        : isPercentDisplayColumn(column, formats)
          ? 2
          : null;
      const scale = format.scale_applied ? 1 : Number(format.display_scale ?? format.result_scale ?? format.scale ?? 1);
      const scaled = number * (Number.isFinite(scale) ? scale : 1);
      const rounded = Number.isFinite(precision)
        ? Math.round((scaled + Number.EPSILON) * (10 ** precision)) / (10 ** precision)
        : scaled;
      const text = format.thousand_separator
        ? new Intl.NumberFormat("zh-CN", Number.isFinite(precision)
          ? { minimumFractionDigits: precision, maximumFractionDigits: precision }
          : { maximumFractionDigits: 6 }).format(rounded)
        : Number.isFinite(precision)
          ? rounded.toFixed(precision).replace(/0+$/, "").replace(/\.$/, "")
          : String(rounded);
      return `${text}${format.suffix || ""}`;
    }

    function isTotalableColumn(column, rows = [], formats = []) {
      const name = String(column || "");
      const lower = name.toLowerCase();
      if (/(id|code|编码|代码|编号|单号|凭证|订单|期间|年度|年份|月份|日期|时间|货币|币种|currency|cur|gjahr|poper|belnr|rbukrs|racct|rcntr|dept)/i.test(name)) {
        return false;
      }
      if (isPercentDisplayColumn(name, formats) || /(单价|unit[_\s-]*price)/i.test(name)) {
        return false;
      }
      const looksLikeAmount = /(金额|合计|余额|收入|成本|费用|利润|税额|价|值|数量|重量|总额|净额|amount|amt|money|balance|revenue|cost|profit|price|value|qty|quantity|wsl|tsl|dmbtr|wrbtr|menge)/i.test(lower);
      if (!looksLikeAmount) return false;
      return rows.some(row => parseResultNumber(row?.[column]) != null);
    }

    function formatTotalNumber(value) {
      if (!Number.isFinite(value)) return "";
      const rounded = Math.round((value + Number.EPSILON) * 100) / 100;
      return Number.isInteger(rounded) ? String(rounded) : rounded.toFixed(2);
    }

    function buildTotalRow(columns, rows, formats = []) {
      if (!columns.length || rows.length <= 1) return null;
      const totalColumns = columns.filter(column => isTotalableColumn(column, rows, formats));
      if (!totalColumns.length) return null;
      const totalRow = {};
      const labelColumn = columns.find(column => !totalColumns.includes(column)) || columns[0];
      columns.forEach(column => {
        if (totalColumns.includes(column)) {
          const sum = rows.reduce((total, row) => {
            const value = parseResultNumber(row?.[column]);
            return value == null ? total : total + value;
          }, 0);
          totalRow[column] = formatTotalNumber(sum);
        } else {
          totalRow[column] = column === labelColumn ? "合计" : "";
        }
      });
      totalRow.__isTotalRow = true;
      return totalRow;
    }

    const RESULT_CHART_COLORS = ["#2563eb", "#0f766e", "#f59e0b", "#dc2626", "#7c3aed", "#0891b2", "#db2777", "#65a30d"];

    function isChartNumericColumn(column, rows = []) {
      const name = String(column || "");
      if (/(id|code|编码|代码|编号|单号|凭证|订单|货币|币种|currency|cur|belnr|rbukrs|racct|rcntr|dept)/i.test(name)) {
        return false;
      }
      return rows.some(row => parseResultNumber(row?.[column]) != null);
    }

    function inferChartLabelColumn(columns = [], numericColumns = []) {
      return columns.find(column => !numericColumns.includes(column) && !/(货币|币种|currency|cur)/i.test(String(column || ""))) || "";
    }

    function chartCompactNumber(value) {
      const number = Number(value);
      if (!Number.isFinite(number)) return "";
      const abs = Math.abs(number);
      if (abs >= 100000000) return `${(number / 100000000).toFixed(2).replace(/\.?0+$/, "")}亿`;
      if (abs >= 10000) return `${(number / 10000).toFixed(2).replace(/\.?0+$/, "")}万`;
      if (abs >= 100) return number.toFixed(0);
      if (abs >= 1) return number.toFixed(2).replace(/\.?0+$/, "");
      return number.toFixed(4).replace(/\.?0+$/, "");
    }

    function chartColumnValue(row, column) {
      const number = parseResultNumber(row?.[column]);
      return number == null ? 0 : number;
    }

    function buildResultChartModel(columns, rows, formats = []) {
      const cleanRows = Array.isArray(rows) ? rows.filter(row => row && !row.__isTotalRow) : [];
      if (!columns.length || !cleanRows.length) return null;
      const numericColumns = columns.filter(column => isChartNumericColumn(column, cleanRows));
      if (!numericColumns.length) return null;

      const labelColumn = inferChartLabelColumn(columns, numericColumns);
      if (!labelColumn || cleanRows.length === 1) {
        const row = cleanRows[0] || {};
        const labels = numericColumns.slice(0, 30);
        return {
          mode: "columns",
          labels,
          series: [{
            name: "数值",
            values: labels.map(column => chartColumnValue(row, column))
          }],
          formats,
          subtitle: labels.length > 1 ? "按数值列展示" : "单项数值"
        };
      }

      const limitedRows = cleanRows.slice(0, 30);
      const seriesColumns = numericColumns.slice(0, 4);
      return {
        mode: "rows",
        labels: limitedRows.map((row, index) => {
          const value = row?.[labelColumn];
          return value == null || value === "" ? `第${index + 1}行` : String(value);
        }),
        series: seriesColumns.map(column => ({
          name: String(column),
          values: limitedRows.map(row => chartColumnValue(row, column))
        })),
        formats,
        subtitle: `${labelColumn} · ${seriesColumns.join("、")}${cleanRows.length > limitedRows.length ? " · 仅展示前30项" : ""}`
      };
    }

    function chartScale(values, height, top, bottom) {
      const finiteValues = values.filter(value => Number.isFinite(value));
      let min = Math.min(0, ...finiteValues);
      let max = Math.max(0, ...finiteValues);
      if (min === max) {
        min -= 1;
        max += 1;
      }
      const span = max - min || 1;
      const plotHeight = height - top - bottom;
      return {
        min,
        max,
        y(value) {
          return top + (max - value) / span * plotHeight;
        }
      };
    }

    function renderChartLegend(series) {
      return series.map((item, index) => `
        <g transform="translate(${78 + (index % 4) * 150}, 24)">
          <rect x="0" y="-8" width="9" height="9" rx="2" fill="${RESULT_CHART_COLORS[index % RESULT_CHART_COLORS.length]}"></rect>
          <text x="14" y="0" fill="#475569" font-size="11" font-weight="700">${escapeHtml(item.name)}</text>
        </g>
      `).join("");
    }

    function renderLineChart(model) {
      const width = 760;
      const height = 300;
      const margin = { top: 42, right: 26, bottom: 54, left: 68 };
      const labels = model.labels;
      const allValues = model.series.flatMap(item => item.values);
      const scale = chartScale(allValues, height, margin.top, margin.bottom);
      const plotWidth = width - margin.left - margin.right;
      const xStep = labels.length > 1 ? plotWidth / (labels.length - 1) : 0;
      const grid = [0, 0.25, 0.5, 0.75, 1].map(ratio => {
        const value = scale.max - (scale.max - scale.min) * ratio;
        const y = margin.top + (height - margin.top - margin.bottom) * ratio;
        return `
          <line x1="${margin.left}" y1="${y}" x2="${width - margin.right}" y2="${y}" stroke="#e2e8f0"></line>
          <text x="${margin.left - 10}" y="${y + 4}" text-anchor="end" fill="#64748b" font-size="10">${escapeHtml(chartCompactNumber(value))}</text>
        `;
      }).join("");
      const lines = model.series.map((item, index) => {
        const color = RESULT_CHART_COLORS[index % RESULT_CHART_COLORS.length];
        const points = item.values.map((value, pointIndex) => `${margin.left + pointIndex * xStep},${scale.y(value)}`).join(" ");
        const dots = item.values.map((value, pointIndex) => {
          const x = margin.left + pointIndex * xStep;
          const y = scale.y(value);
          return `<circle cx="${x}" cy="${y}" r="3.5" fill="#fff" stroke="${color}" stroke-width="2"><title>${escapeHtml(item.name)}: ${escapeHtml(chartCompactNumber(value))}</title></circle>`;
        }).join("");
        return `
          <polyline points="${points}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"></polyline>
          ${dots}
        `;
      }).join("");
      const xLabels = labels.map((label, index) => {
        const x = margin.left + index * xStep;
        const shortLabel = String(label).length > 10 ? `${String(label).slice(0, 10)}…` : String(label);
        return `<text x="${x}" y="${height - 22}" text-anchor="middle" fill="#64748b" font-size="10">${escapeHtml(shortLabel)}</text>`;
      }).join("");
      return `
        <svg class="qa-chart-svg" viewBox="0 0 ${width} ${height}" role="img" aria-label="折线图">
          ${renderChartLegend(model.series)}
          ${grid}
          <line x1="${margin.left}" y1="${scale.y(0)}" x2="${width - margin.right}" y2="${scale.y(0)}" stroke="#94a3b8"></line>
          ${lines}
          ${xLabels}
        </svg>
      `;
    }

    function renderBarChart(model) {
      const width = 760;
      const height = 300;
      const margin = { top: 42, right: 26, bottom: 54, left: 68 };
      const labels = model.labels;
      const allValues = model.series.flatMap(item => item.values);
      const scale = chartScale(allValues, height, margin.top, margin.bottom);
      const plotWidth = width - margin.left - margin.right;
      const groupWidth = labels.length ? plotWidth / labels.length : plotWidth;
      const barWidth = Math.max(5, Math.min(28, (groupWidth * 0.72) / Math.max(1, model.series.length)));
      const zeroY = scale.y(0);
      const bars = labels.map((_label, labelIndex) => {
        const groupX = margin.left + labelIndex * groupWidth + groupWidth * 0.14;
        return model.series.map((item, seriesIndex) => {
          const value = item.values[labelIndex] || 0;
          const x = groupX + seriesIndex * barWidth;
          const y = Math.min(scale.y(value), zeroY);
          const h = Math.max(1, Math.abs(scale.y(value) - zeroY));
          const color = RESULT_CHART_COLORS[seriesIndex % RESULT_CHART_COLORS.length];
          return `<rect x="${x}" y="${y}" width="${barWidth - 1}" height="${h}" rx="2" fill="${color}"><title>${escapeHtml(item.name)}: ${escapeHtml(chartCompactNumber(value))}</title></rect>`;
        }).join("");
      }).join("");
      const grid = [0, 0.25, 0.5, 0.75, 1].map(ratio => {
        const value = scale.max - (scale.max - scale.min) * ratio;
        const y = margin.top + (height - margin.top - margin.bottom) * ratio;
        return `
          <line x1="${margin.left}" y1="${y}" x2="${width - margin.right}" y2="${y}" stroke="#e2e8f0"></line>
          <text x="${margin.left - 10}" y="${y + 4}" text-anchor="end" fill="#64748b" font-size="10">${escapeHtml(chartCompactNumber(value))}</text>
        `;
      }).join("");
      const xLabels = labels.map((label, index) => {
        const x = margin.left + index * groupWidth + groupWidth / 2;
        const shortLabel = String(label).length > 10 ? `${String(label).slice(0, 10)}…` : String(label);
        return `<text x="${x}" y="${height - 22}" text-anchor="middle" fill="#64748b" font-size="10">${escapeHtml(shortLabel)}</text>`;
      }).join("");
      return `
        <svg class="qa-chart-svg" viewBox="0 0 ${width} ${height}" role="img" aria-label="柱状图">
          ${renderChartLegend(model.series)}
          ${grid}
          <line x1="${margin.left}" y1="${zeroY}" x2="${width - margin.right}" y2="${zeroY}" stroke="#94a3b8"></line>
          ${bars}
          ${xLabels}
        </svg>
      `;
    }

    function piePath(cx, cy, radius, startAngle, endAngle) {
      const startX = cx + radius * Math.cos(startAngle);
      const startY = cy + radius * Math.sin(startAngle);
      const endX = cx + radius * Math.cos(endAngle);
      const endY = cy + radius * Math.sin(endAngle);
      const largeArc = endAngle - startAngle > Math.PI ? 1 : 0;
      return `M ${cx} ${cy} L ${startX} ${startY} A ${radius} ${radius} 0 ${largeArc} 1 ${endX} ${endY} Z`;
    }

    function renderPieChart(model) {
      const width = 760;
      const height = 300;
      const pieSource = model.mode === "columns"
        ? model.labels.map((label, index) => ({ label, value: model.series[0]?.values[index] || 0 }))
        : model.labels.map((label, index) => ({ label, value: model.series[0]?.values[index] || 0 }));
      const positiveSlices = pieSource.filter(item => Number.isFinite(item.value) && item.value > 0).slice(0, 10);
      const total = positiveSlices.reduce((sum, item) => sum + item.value, 0);
      if (!total) return `<div class="qa-chart-empty">饼图需要至少一组正数结果。</div>`;
      let angle = -Math.PI / 2;
      const cx = 210;
      const cy = 152;
      const radius = 92;
      const paths = positiveSlices.map((item, index) => {
        const nextAngle = angle + (item.value / total) * Math.PI * 2;
        const path = piePath(cx, cy, radius, angle, nextAngle);
        angle = nextAngle;
        const color = RESULT_CHART_COLORS[index % RESULT_CHART_COLORS.length];
        return `<path d="${path}" fill="${color}" stroke="#fff" stroke-width="2"><title>${escapeHtml(item.label)}: ${escapeHtml(chartCompactNumber(item.value))}</title></path>`;
      }).join("");
      const legend = positiveSlices.map((item, index) => {
        const percent = total ? `${((item.value / total) * 100).toFixed(1)}%` : "";
        const y = 72 + index * 22;
        const label = String(item.label).length > 18 ? `${String(item.label).slice(0, 18)}…` : String(item.label);
        return `
          <g transform="translate(390, ${y})">
            <rect x="0" y="-9" width="10" height="10" rx="2" fill="${RESULT_CHART_COLORS[index % RESULT_CHART_COLORS.length]}"></rect>
            <text x="17" y="0" fill="#334155" font-size="11" font-weight="750">${escapeHtml(label)}</text>
            <text x="252" y="0" text-anchor="end" fill="#64748b" font-size="11" font-weight="700">${escapeHtml(percent)}</text>
          </g>
        `;
      }).join("");
      return `
        <svg class="qa-chart-svg" viewBox="0 0 ${width} ${height}" role="img" aria-label="饼图">
          ${paths}
          <circle cx="${cx}" cy="${cy}" r="46" fill="#fbfcff"></circle>
          <text x="${cx}" y="${cy - 4}" text-anchor="middle" fill="#172033" font-size="16" font-weight="900">${escapeHtml(chartCompactNumber(total))}</text>
          <text x="${cx}" y="${cy + 16}" text-anchor="middle" fill="#64748b" font-size="11" font-weight="700">合计</text>
          ${legend}
        </svg>
      `;
    }

    function normalizeEvidenceText(text) {
      return String(text || "")
        .replace(/\\n/g, "\n")
        .replace(/\\t/g, "  ")
        .replace(/\n{3,}/g, "\n\n")
        .trim();
    }

    function protectSqlQuotedText(sql) {
      const values = [];
      let output = "";
      const text = String(sql || "");
      for (let index = 0; index < text.length; index += 1) {
        const quote = text[index];
        if (!["'", "\"", "`"].includes(quote)) {
          output += quote;
          continue;
        }
        let chunk = quote;
        index += 1;
        while (index < text.length) {
          const char = text[index];
          chunk += char;
          if (char === quote) {
            if (text[index + 1] === quote) {
              chunk += text[index + 1];
              index += 2;
              continue;
            }
            break;
          }
          if (char === "\\" && index + 1 < text.length) {
            chunk += text[index + 1];
            index += 2;
            continue;
          }
          index += 1;
        }
        const token = `__SQL_LITERAL_${values.length}__`;
        values.push(chunk);
        output += token;
      }
      return { text: output, values };
    }

    function restoreSqlQuotedText(sql, values) {
      return String(sql || "").replace(/__SQL_LITERAL_(\d+)__/g, (_match, index) => values[Number(index)] ?? "");
    }

    function formatSqlForDisplay(sql) {
      const raw = normalizeEvidenceText(sql);
      if (!raw) return "";
      const protectedSql = protectSqlQuotedText(raw.replace(/\s+/g, " ").trim());
      let text = protectedSql.text
        .replace(/\bSELECT\b/i, "SELECT\n  ")
        .replace(/\s*,\s*/g, ",\n  ")
        .replace(/\bFROM\b/gi, "\nFROM")
        .replace(/\bWHERE\b/gi, "\nWHERE\n  ")
        .replace(/\bGROUP\s+BY\b/gi, "\nGROUP BY\n  ")
        .replace(/\bORDER\s+BY\b/gi, "\nORDER BY\n  ")
        .replace(/\bHAVING\b/gi, "\nHAVING\n  ")
        .replace(/\bLIMIT\b/gi, "\nLIMIT")
        .replace(/\s+AND\s+/gi, "\n  AND ")
        .replace(/\s+OR\s+/gi, "\n  OR ")
        .replace(/\bCASE\b/gi, "CASE\n      ")
        .replace(/\bWHEN\b/gi, "\n      WHEN")
        .replace(/\bTHEN\b/gi, " THEN")
        .replace(/\bELSE\b/gi, "\n      ELSE")
        .replace(/\bEND\b/gi, "\n    END")
        .replace(/\(\s*\n\s*/g, "(\n    ")
        .replace(/\n\s*\)/g, "\n  )")
        .replace(/\n{3,}/g, "\n\n");
      text = restoreSqlQuotedText(text, protectedSql.values);
      return text.split("\n").map(line => line.trimEnd()).join("\n").trim();
    }

    function formatRenderedSqlBlocks(root = document) {
      root.querySelectorAll("pre.qa-sql, pre.agent-code").forEach(block => {
        if (block.dataset.sqlFormatted === "1") return;
        block.textContent = formatSqlForDisplay(block.textContent);
        block.dataset.sqlFormatted = "1";
      });
    }

    function truncateEvidenceText(text, max = 520) {
      const value = normalizeEvidenceText(text);
      return value.length > max ? `${value.slice(0, max)}...` : value;
    }

    function sqlWhereClause(sql) {
      const value = String(sql || "");
      const match = value.match(/\bWHERE\b([\s\S]*?)(\bGROUP\s+BY\b|\bORDER\s+BY\b|\bLIMIT\b|;|$)/i);
      return match ? match[1].trim() : "";
    }

    function sqlSelectAliases(sql) {
      const value = String(sql || "");
      return [...value.matchAll(/\bAS\s+`([^`]+)`/gi)]
        .map(match => match[1].trim())
        .filter(Boolean);
    }

    function cleanSqlFieldName(value) {
      return String(value || "")
        .replace(/`/g, "")
        .replace(/\b[A-Za-z_][\w]*\./g, "")
        .replace(/\s+/g, " ")
        .trim();
    }

    function bpcFieldLabel(field) {
      const clean = cleanSqlFieldName(field);
      const found = selectedKnowledgeBaseTables()
        .flatMap(tableName => tableCatalog[tableName]?.fields || [])
        .find(item => item.field === clean);
      return found ? `${found.label} · ${found.field}` : clean;
    }

    function sqlPeriodEvidence(sql, signalPeriod = "") {
      const periods = [...new Set([...String(sql || "").matchAll(/['"]?(20\d{2}\.(?:0[1-9]|1[0-2]))['"]?/g)].map(match => match[1]))];
      if (!periods.length) return signalPeriod || "SQL 未限定期间";
      if (signalPeriod && periods.includes(signalPeriod)) {
        const others = periods.filter(item => item !== signalPeriod);
        return others.length ? `${signalPeriod}（SQL 同时使用 ${others.join("、")}）` : signalPeriod;
      }
      return periods.length === 1 ? periods[0] : periods.join("、");
    }

    function sqlDimensionEvidence(sql, signalDimensions = []) {
      const value = String(sql || "");
      const match = value.match(/\bGROUP\s+BY\b([\s\S]*?)(\bORDER\s+BY\b|\bLIMIT\b|;|$)/i);
      if (match) {
        const fields = match[1]
          .split(",")
          .map(cleanSqlFieldName)
          .filter(Boolean);
        if (fields.length) return fields.map(bpcFieldLabel).join("、");
      }
      if (Array.isArray(signalDimensions) && signalDimensions.length) {
        return signalDimensions.map(item => `${item.label}${item.field ? ` · ${item.field}` : ""}`).join("、");
      }
      return "无分组";
    }

    function findBusinessMetricByKey(key) {
      if (!key) return null;
      return metrics.find(metric => isMetricInCurrentKnowledgeBase(metric) && semanticEntryType(metric) === "business_metric" && (
        metric.code === key ||
        metric.name === key ||
        aliasItems(metric).includes(key)
      )) || null;
    }

    function metricMatchesAlias(metric, alias) {
      if (!metric || !alias) return false;
      return metric.name === alias || metric.code === alias || aliasItems(metric).includes(alias);
    }

    function metricsFromSqlAliases(sql) {
      const aliases = sqlSelectAliases(sql);
      if (!aliases.length) return [];
      return metrics.filter(metric => (
        isMetricInCurrentKnowledgeBase(metric) &&
        semanticEntryType(metric) === "business_metric" &&
        aliases.some(alias => metricMatchesAlias(metric, alias))
      ));
    }

    function uniqueMetricsForEvidence(items) {
      const seen = new Set();
      return items.filter(metric => {
        if (!metric) return false;
        const key = metric.code || metric.name;
        if (!key || seen.has(key)) return false;
        seen.add(key);
        return true;
      });
    }

    function evidenceMetrics(result, selectedMetric) {
      const selectedKeys = result.decision?.selectedMetricKeys || [];
      const modelSelected = Array.isArray(result.decision?.selectedMetrics) ? result.decision.selectedMetrics : [];
      const selected = selectedKeys.map(findBusinessMetricByKey).filter(Boolean);
      const dependencies = uniqueMetricsForEvidence([selectedMetric, ...modelSelected, ...selected])
        .flatMap(metric => (metric.dependencies || []).map(findBusinessMetricByKey).filter(Boolean));
      const sqlMatched = metricsFromSqlAliases(result.sqlText);
      const candidates = (result.candidates?.metrics || [])
        .map(item => item.metric || item)
        .filter(Boolean)
        .slice(0, 5);
      return uniqueMetricsForEvidence([
        selectedMetric,
        ...modelSelected,
        ...selected,
        ...dependencies,
        ...sqlMatched,
        ...candidates
      ]);
    }

    function metricEvidenceRole(metric, result, selectedMetric) {
      const selectedKeys = new Set(result.decision?.selectedMetricKeys || []);
      if (selectedMetric && metric.code === selectedMetric.code) return "主命中";
      if (selectedKeys.has(metric.code)) return "模型命中";
      const dependencies = uniqueMetricsForEvidence([selectedMetric, ...(result.decision?.selectedMetrics || [])])
        .flatMap(item => item?.dependencies || []);
      if (dependencies.includes(metric.code)) return "派生依赖";
      if (sqlSelectAliases(result.sqlText).some(alias => metricMatchesAlias(metric, alias))) return "SQL输出";
      return "候选";
    }

    function metricAliasSummary(metric) {
      const aliases = aliasItems(metric);
      return aliases.length ? aliases.slice(0, 4).join("、") : "无别名";
    }

    function metricHitSummary(result, selectedMetric) {
      const list = evidenceMetrics(result, selectedMetric);
      if (!list.length) return "未命中";
      const shown = list.slice(0, 3).map(metric => metric.name || metric.code).join("、");
      return list.length > 3 ? `${shown} 等 ${list.length} 个` : shown;
    }

    function metricFilterScopeText(metric) {
      if (!metric) return "";
      return normalizeEvidenceText(filterSqlText(metric));
    }

    function qaConfigEvidenceText(config) {
      const parts = [
        config?.table_scope?.label,
        config?.data_path?.label,
        config?.transaction_scope?.label
      ].filter(Boolean);
      return parts.length ? parts.join("、") : "未指定";
    }

    function compactEvidenceList(values, max = 4) {
      const list = [...new Set((values || []).map(item => String(item || "").trim()).filter(Boolean))];
      if (!list.length) return "";
      if (list.length <= max) return list.join("、");
      return `${list.slice(0, max).join("、")}等 ${list.length} 项`;
    }

    function mandatoryContextFromResult(result) {
      if (result?.mandatoryContext) return result.mandatoryContext;
      const trace = Array.isArray(result?.trace) ? result.trace : [];
      return trace.find(item => item.stage === "mandatory_context")?.artifact || null;
    }

    function renderMandatoryEvidence(result) {
      const context = mandatoryContextFromResult(result);
      const filters = Array.isArray(context?.sql_filters) ? context.sql_filters : [];
      const warnings = Array.isArray(context?.warnings) ? context.warnings : [];
      const ruleKeys = Array.isArray(context?.rule_keys) ? context.rule_keys : [];
      const hasConfig = result?.qaConfig?.data_path || result?.qaConfig?.transaction_scope;
      if (!filters.length && !warnings.length && !ruleKeys.length && !hasConfig) return "";
      return `
        <section class="evidence-section">
          <div class="evidence-section-title">
            <span>问数配置与强制口径</span>
            <span class="evidence-chip">${escapeHtml(filters.length ? `${filters.length} 个过滤` : "无强制过滤")}</span>
          </div>
          <div class="evidence-section-body">
              <div class="evidence-kv-grid">
                <div class="evidence-kv"><span>问数配置</span><strong>${escapeHtml(qaConfigEvidenceText(result.qaConfig))}</strong></div>
              <div class="evidence-kv"><span>强制规则</span><strong>${escapeHtml(context?.rule_labels || compactEvidenceList(ruleKeys, 4) || "无")}</strong></div>
            </div>
            ${filters.length ? `
              <table class="evidence-table">
                <thead><tr><th>来源</th><th>原因</th><th>落实到 SQL</th></tr></thead>
                <tbody>
                  ${filters.map(item => `
                    <tr>
                      <td>${escapeHtml(item.source || "-")}</td>
                      <td>${escapeHtml(item.reason || "-")}</td>
                      <td><code>${escapeHtml(normalizeEvidenceText(item.sql || ""))}</code></td>
                    </tr>
                  `).join("")}
                </tbody>
              </table>
            ` : ""}
            ${warnings.length ? `<div class="qa-warning">${warnings.map(escapeHtml).join("<br>")}</div>` : ""}
          </div>
        </section>
      `;
    }

    function renderMetricEvidence(metric, result, metricList = []) {
      if (!metric) {
        return `
          <section class="evidence-section">
            <div class="evidence-section-title">本次取数口径</div>
            <div class="evidence-section-body">

    function visibleEntryIndexes() {
      return metrics
        .map((metric, index) => ({ metric, index }))
        .filter(item => semanticEntryType(item.metric) === activeSemanticType && isMetricInCurrentKnowledgeBase(item.metric))
        .map(item => item.index);
    }

    function ensureVisibleSelection() {
      const indexes = visibleEntryIndexes();
      if (!indexes.includes(selectedIndex)) selectedIndex = indexes[0] ?? 0;

    function field(label, value, key, type = "input", placeholder = "") {
      const html = type === "textarea"
        ? `<textarea data-key="${key}" placeholder="${escapeHtml(placeholder)}">${value || ""}</textarea>`
        : `<input data-key="${key}" value="${value || ""}" placeholder="${escapeHtml(placeholder)}" />`;
      return `<div class="field"><label>${label}</label>${html}</div>`;
    }

    function selectField(label, value, key, options) {
      const choices = [...new Set([value, ...options].filter(Boolean))];
      const html = `
        <select data-key="${key}">
          ${choices.map(option => `<option value="${option}" ${option === value ? "selected" : ""}>${option}</option>`).join("")}
        </select>
      `;
      return `<div class="field"><label>${label}</label>${html}</div>`;
    }

    function displayField(field, sourceTable) {
      const found = knownFieldsForTable(sourceTable).find(item => item.field === field);
      return found ? `${found.label} · ${found.field}` : field;
    }

    function smartSelectField(label, value, key, options) {
      const normalized = options.map(option => typeof option === "string" ? { value: option, label: option } : option);
      if (value && !normalized.some(option => option.value === value)) normalized.unshift({ value, label: value });
      const html = `
        <select data-key="${key}">
          ${normalized.map(option => `<option value="${option.value}" ${option.value === value ? "selected" : ""}>${option.label}</option>`).join("")}
        </select>
      `;
      return `<div class="field"><label>${label}</label>${html}</div>`;
    }

    function smartCoefficientField(label, value, key) {
      return `
        <div class="field">
          <label>${label}</label>
          <div class="coefficient-control">
            <span class="coefficient-prefix">×</span>
            <input data-key="${key}" type="number" step="any" value="${value || 1}" />
          </div>
        </div>
      `;
    }

    function currentKnowledgeTableNamesForOptions() {
      const tables = new Set(selectedKnowledgeBaseTables());
      currentKnowledgeBaseEntries().forEach(metric => {
        relatedTables(metric).forEach(table => tables.add(table));
        if (metric.sourceTable) tables.add(metric.sourceTable);
      });
      if (!tables.size) Object.keys(tableCatalog).forEach(table => tables.add(table));
      return [...tables].filter(Boolean);
    }

    function knownFieldsForTable(sourceTable) {
      const byField = new Map();
      (tableCatalog[sourceTable]?.fields || []).forEach(item => {
        byField.set(item.field, {
          field: item.field,
          label: item.label || item.field
        });
      });
      metrics
        .filter(metric => semanticEntryType(metric) === "table_column_note" && metric.sourceTable === sourceTable)
        .forEach(metric => {
          (metric.columns || []).forEach(column => {
            if (!column.name) return;
            byField.set(column.name, {
              field: column.name,
              label: column.description || byField.get(column.name)?.label || column.name
            });
          });
        });
      return [...byField.values()];
    }

    function tableOptions() {
      return currentKnowledgeTableNamesForOptions().map(value => ({
        value,
        label: value
      }));
    }

    function fieldOptions(sourceTable) {
      return knownFieldsForTable(sourceTable).map(item => ({
        value: item.field,
        label: item.label && item.label !== item.field ? `${item.field}（${item.label}）` : item.field,
        note: item.label && item.label !== item.field ? item.label : ""
      }));
    }

    function preferredMeasureFields(sourceTable) {
      const map = {
        bpc_consolidated_report: ["b28_s_sdata"],
        expense_detail_voucher: ["wsl", "tsl"],
        inventory_pc: ["库存金额字段待确认", "库存数量字段待确认", "聚合字段待确认"]
      };
      return map[sourceTable] || [];
    }

    function rawMeasureFieldOptions(metric) {
      const options = fieldOptions(metric.sourceTable);
      const preferred = preferredMeasureFields(metric.sourceTable);
      return [
        ...preferred.flatMap(field => options.filter(item => item.value === field)),
        ...options.filter(item => !preferred.includes(item.value))
      ];
    }

    function withCurrentFieldOption(options, currentField) {
      const normalized = options.map(item => typeof item === "string"
        ? { value: item, label: item }
        : item
      );
      if (currentField && !normalized.some(item => item.value === currentField)) {
        normalized.push({
          value: currentField,
          label: currentField,
          note: "当前配置字段"
        });
      }
      return normalized;
    }

    function measureFieldOptions(metric) {
      return withCurrentFieldOption(rawMeasureFieldOptions(metric), metric.measureField);
    }

    function defaultMeasureFieldForTable(sourceTable) {
      return rawMeasureFieldOptions({ sourceTable, measureField: "" })[0]?.value
        || fieldOptions(sourceTable)[0]?.value
        || "";
    }

    function metricTypeLabel(metric) {
      return metric.calculationType === "derived" ? "派生指标" : "基础指标";
    }

    function metricSourceLabel(metric) {
      return metric.sourceTable;
    }

    function resultFormula(metric) {
      if (metric.calculationType === "derived") return metric.expression || "";
      const multiplier = metricResultMultiplier(metric);
      const aggregation = normalizedAggregation(metric);
      const field = metric.measureField || "字段待选";
      const inner = aggregation === "COUNT_DISTINCT"
        ? `COUNT(DISTINCT ${field})`
        : `${aggregation}(${field})`;
      return multiplier === -1 ? `-1 * ${inner}` : inner;
    }

    function renderSummary(metric) {
      return `
        <div class="summary-strip">
          <div class="summary-item">
            <div class="summary-label">类型</div>
            <div class="summary-value">${metricTypeLabel(metric)}</div>
          </div>
          <div class="summary-item">
            <div class="summary-label">数据来源</div>
            <div class="summary-value">${metricSourceLabel(metric) || "未填写"}</div>
          </div>
          <div class="summary-item">
            <div class="summary-label">结果表达式</div>
            <div class="summary-value">${resultFormula(metric) || "未填写"}</div>
          </div>
        </div>
      `;
    }

    function renderIdentity(metric) {
      const kind = metric.calculationType === "derived" ? "derived" : "direct";
      return `
        <section class="panel">
          <div class="panel-head">
            <h3 class="section-title"><span class="step">1</span>指标身份</h3>

              </button>

                <div class="choice-title">派生指标</div>

              </button>
            </div>
            <div class="form-grid">
              ${field("指标名称", metric.name, "name")}
              ${field("指标编码", metric.code, "code")}
